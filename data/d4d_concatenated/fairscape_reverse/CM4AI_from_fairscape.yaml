completeness: These data are not yet in completed final form, and some datasets are
  under temporary pre-publication embargo. Protein-protein interaction (SEC-MS), protein
  localization (IF imaging), and CRISPRi perturbSeq data interrogate sets of proteins
  which incompletely overlap. Computed cell maps not included in this release.
