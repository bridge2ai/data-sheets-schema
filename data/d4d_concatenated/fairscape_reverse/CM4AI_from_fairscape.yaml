intended_uses: 'AI-ready datasets to support research in functional genomics, AI/machine
  learning model training, cellular process analysis, cell architectural changes,
  and interactions in presence of specific disease processes, treatment conditions,
  or genetic perturbations. A major goal is to enable biologically-driven, interpretable
  ML applications, for example as proposed in Ma et al. 2018 (PMID: 29505029) and
  Kuenzi et al. 2020 (PMID: 33096023).'
known_biases: Data in this release was derived from commercially available de-identified
  human cell lines, and does not represent all biological variants which may be seen
  in the population at large.
known_limitations: This is an interim release. It does not contain predicted cell
  maps, which will be added in future releases. The current release is most suitable
  for bioinformatics analysis of the individual datasets. Requires domain expertise
  for meaningful analysis.
acquisition_methods: 'Data collection processes are generally described in Clark T
  et al. (2024) "Cell Maps for Artificial Intelligence: AI-Ready Maps of Human Cell
  Architecture from Disease-Relevant Cell Lines" bioRxiv 2024.05.21.589311; doi: https://doi.org/10.1101/2024.05.21.589311.
  Additional data collection details will be subsequently published once finalized. '
