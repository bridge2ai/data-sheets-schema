# Composition
instances:
  - id: cm4ai:instance:1
    description: >
      MDA-MB-468: Triple negative breast cancer cell line (RRID:CVCL_0419) established from a
      metastatic site pleural effusion of a 51-year-old black female with a metastatic mammary
      adenocarcinoma, available from ATCC. This cell line has been extensively used to study
      triple-negative breast cancer and is well characterized with transcriptomic, mutational profile,
      and whole-genome sequencing data available. Cells are analyzed under three conditions:
      untreated, paclitaxel-treated, and vorinostat-treated.
  - id: cm4ai:instance:2
    description: >
      KOLF2.1J: Human induced pluripotent stem cell (iPSC) line (RRID:CVCL_B5P3) derived from a
      healthy male Northern European donor, available from the Human Induced Pluripotent Stem Cells
      Initiative (HipSci) resource. Available for access by non-for-profit organizations via a
      simple MTA. Analyzed in undifferentiated state and after differentiation into neurons,
      neural progenitor cells (NPCs), and cardiomyocytes.
  - id: cm4ai:instance:3
    description: >
      100 Chromatin Regulators: Near-comprehensive set of chromatin regulators encoded by the human
      genome analyzed via AP-MS, SEC-MS, IF imaging, and CRISPR perturbation screens across different
      cell states and treatment conditions. 17 genes endogenously tagged in MDA-MB-468 with AP-MS data
      under three conditions, with 34 additional genes in process. SEC-MS identified 72/100 chromatin
      modifiers, with 52 being integral components of protein complexes.
  - id: cm4ai:instance:4
    description: >
      100 Metabolic Enzymes: Set of metabolic enzymes involved in cancer, neuropsychiatric, and
      cardiac disorders analyzed via multimodal interrogation including mass spectrometry, imaging,
      and perturbation screens.

sampling_strategies:
  - id: cm4ai:sampling:1
    description: >
      Purposive selection of two disease-relevant cell lines: MDA-MB-468 triple negative breast
      cancer cell line for cancer research, and KOLF2.1J iPSCs for neuropsychiatric and cardiac
      disorder research. Both cell lines ethically sourced and well-characterized in the literature.
      Selection criteria: (1) MDA-MB-468 chosen for triple-negative breast cancer research
      applications; (2) KOLF2.1J chosen as reference iPSC line for large-scale collaborative
      studies; (3) both have extensive existing characterization data and are commercially available
      and ethically sourced.
    is_sample: false
    is_random: false
    is_representative: false

subpopulations:
  - id: cm4ai:subpop:1
    description: "MDA-MB-468 Untreated: MDA-MB-468 breast cancer cells in control/untreated condition"
  - id: cm4ai:subpop:2
    description: "MDA-MB-468 Paclitaxel-Treated: MDA-MB-468 breast cancer cells treated with paclitaxel chemotherapy"
  - id: cm4ai:subpop:3
    description: "MDA-MB-468 Vorinostat-Treated: MDA-MB-468 breast cancer cells treated with vorinostat chemotherapy"
  - id: cm4ai:subpop:4
    description: "KOLF2.1J Undifferentiated iPSCs: KOLF2.1J induced pluripotent stem cells in undifferentiated/naive state"
  - id: cm4ai:subpop:5
    description: "KOLF2.1J iPSC-Derived Neurons: KOLF2.1J iPSCs differentiated into neurons"
  - id: cm4ai:subpop:6
