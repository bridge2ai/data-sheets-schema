    and potential dual licensing for commercial use. Copyright (c) 2025 The Regents of the
    University of California except where otherwise noted. Spatial proteomics raw image data is
    copyright (c) 2025 The Board of Trustees of the Leland Stanford Junior University.

distribution_formats:
  - id: cm4ai:format:1
    description: >
      RO-Crate Packages with Provenance: All CM4AI output data packaged as Research Object Crate
      (RO-Crate) packages containing datasets, metadata, provenance graphs, and software (or
      resolvable references). RO-Crates assigned persistent globally unique identifiers (ARK scheme,
      DOIs planned for publishable work) that resolve to machine- and human-readable landing pages
      with metadata in JSON-LD using Schema.org and EVI vocabularies. Available at
      https://doi.org/10.18130/V3/DXWOS5, https://doi.org/10.18130/V3/B35XWX,
      https://doi.org/10.18130/V3/F3TD5R, https://doi.org/10.18130/V3/K7TGEM, and
      https://www.cm4ai.org.
  - id: cm4ai:format:2
    description: >
      Mass Spectrometry Data in MassIVE: Mass spectrometry data deposited to MassIVE Repository
      (Proteomics community-supported repository). Separate depositions for human iPSC data and
      human cancer cell data (SEC-MS for KOLF2.1J iPSCs and MDA-MB-468 cancer cells). Data will
      be uploaded to PRIDE when available.
  - id: cm4ai:format:3
    description: >
      Sequence Data in NCBI SRA: Raw sequence data from CRISPR perturbation screens deposited to
      NCBI BioProject/Sequence Read Archive (SRA). Genome-scale CRISPRi perturbation cell atlas
      raw sequences and processed data available.
  - id: cm4ai:format:4
    description: >
      Hierarchical Cell Maps in NDEx: Cell maps shared via Network Data Exchange (NDEx) at
      https://www.ndexbio.org for visualization and access. Maps can be visualized in web browser
      or accessed via tools such as Cytoscape, HiView, and Python ndex2 library.
  - id: cm4ai:format:5
    description: >
      University of Virginia Dataverse: Archived RO-Crates available in University of Virginia's
      LibraData data archive (instance of Harvard's Dataverse, an NIH-approved generalist
      repository). Long-term preservation supported by committed institutional funds. Quarterly
      updates through November 2026. Available at https://doi.org/10.18130/V3/DXWOS5.

distributions:
  - id: cm4ai:dist:1
    description: >
      Primary RO-Crate release package (Beta V2.1) containing spatial proteomics IF images,
      SEC-MS protein interaction data, CRISPR perturbation screen results, and RO-Crate metadata
      with provenance graphs. Packaged as ZIP archive with JSON-LD metadata (ro-crate-metadata.json).
    format: ZIP
    media_type: application/zip
    path: https://doi.org/10.18130/V3/DXWOS5
  - id: cm4ai:dist:2
    description: >
      March 2025 Beta release V1.4 (doi:10.18130/V3/B35XWX): includes perturb-seq in KOLF2.1J
      iPSCs, SEC-MS in iPSCs and derivatives, and IF images in MDA-MB-468 under three conditions.
      Packaged as RO-Crate (ZIP with JSON-LD metadata).
    format: ZIP
    media_type: application/zip
    path: https://doi.org/10.18130/V3/B35XWX
  - id: cm4ai:dist:3
    description: >
      June 2025 Beta release V2.1 (doi:10.18130/V3/F3TD5R): revision adds RGB IF images,
      RO-Crate metadata corrections, naming convention changes, and SEC-MS for MDA-MB-468.
      Packaged as RO-Crate (ZIP with JSON-LD metadata).
    format: ZIP
    media_type: application/zip
    path: https://doi.org/10.18130/V3/F3TD5R
  - id: cm4ai:dist:4
    description: >
      October 2025 Beta release (doi:10.18130/V3/K7TGEM): adds Perturb-seq for MDA-MB-468
      breast cancer cells and additional SEC-MS data. Packaged as RO-Crate (ZIP with JSON-LD
      metadata).
    format: ZIP
    media_type: application/zip
    path: https://doi.org/10.18130/V3/K7TGEM

# Maintenance
maintainers:
  - id: cm4ai:maintainer:1
    description: >
      CM4AI Consortium: Multidisciplinary consortium managing dataset maintenance including
      University of California San Diego (lead), University of California San Francisco, Stanford
      University, University of Virginia, Yale University, University of Alabama at Birmingham,
      Simon Fraser University, and The Hastings Center. Data Governance Committee led by Jillian
      Parker (jillianparker@health.ucsd.edu). Ethical Review by Vardit Ravitsky
      (ravitskyv@thehastingscenter.org) and Jean-Christophe Belisle-Pipon
      (jean-christophe_belisle-pipon@sfu.ca).

updates:
  id: cm4ai:updates:1
  description: >
    Dataset regularly updated and augmented through end of project in November 2026. Beta releases
    on quarterly basis with periodic data augmentation. Initial alpha release (v0.5) provided as
    supplemental data. March 2025 Beta (V1.4) includes perturb-seq in KOLF2.1J iPSCs, SEC-MS in
    iPSCs and derivatives, and IF images in MDA-MB-468 under three conditions. June 2025 Beta
    (V2.1) revision adds RGB IF images, ro-crate metadata corrections, and naming convention
    changes, plus SEC-MS for MDA-MB-468. October 2025 Beta adds Perturb-seq for MDA-MB-468 breast
    cancer cells and additional SEC-MS data. Future releases will include computed cell maps and
    complete integration of all data streams. Long-term preservation in University of Virginia
    Dataverse with committed institutional support.

retention_limit:
  id: cm4ai:retention:1
  description: >
    Digital data maintained according to NIH data sharing policies with long-term preservation in
    University of Virginia's LibraData repository supported by committed institutional funds. No
    planned sunset for data availability. Archived RO-Crates with persistent identifiers (ARK,
    future DOIs) ensure long-term accessibility and citability.

# Ethics and Human Subjects
human_subject_research:
  id: cm4ai:hsr:1
  description: >
    CM4AI data are distinctive within Bridge2AI in that they are non-clinical data from tissue
    cultures and are considered to be de-identified as they cannot be matched, with current
    knowledge, to a human subject. Both cell lines (MDA-MB-468 and KOLF2.1J) are commercially
    available, ethically sourced, de-identified cell lines. MDA-MB-468 available from ATCC.
    KOLF2.1J available from HipSci resource for non-profit organizations via simple MTA. Human
    Subjects: No. De-identified Samples: Yes. FDA Regulated: No.

sensitive_elements:
  - id: cm4ai:sensitive:1
    description: >
      Cell Line Origin Metadata: While cell lines are de-identified and cannot be matched to
      specific individuals, metadata about cell line origins (age, sex, race of original donor)
      is retained for scientific context. This metadata does not constitute identifiable human
      subjects data under current knowledge. Data derived from commercially available de-identified
      human cell lines and does not represent all biological variants in the population at large.

is_deidentified:
  id: cm4ai:deidentified:1
  description: >
    CM4AI datasets are derived from commercially available, de-identified human cell lines
    (MDA-MB-468 from ATCC; KOLF2.1J from HipSci). Data cannot be matched to individual human
    subjects with current knowledge. Cell line origin metadata (donor age, sex, race) is retained
    for scientific context only and does not constitute identifiable human subjects data.
    De-identification confirmed by CM4AI Ethics Module and Data Access Committee.

# Data Governance
ip_restrictions:
  id: cm4ai:ip:1
  description: >
    Data licensed under CC BY-NC-SA 4.0. Commercial use requires separate license negotiation
    with copyright holders (UCSD, Stanford, and/or UCSF, depending on specific data package).
    Spatial proteomics raw image data copyright (c) 2025 The Board of Trustees of the Leland
    Stanford Junior University. Other data copyright (c) 2025 The Regents of the University of
    California. Data Access Committee (Jillian Parker) supervises ethical distribution matters
    and potential dual licensing for commercial use.

regulatory_restrictions:
  id: cm4ai:regulatory:1
  description: >
    Data are non-clinical research data from tissue cultures and are not subject to FDA regulatory
    oversight. NIH data sharing policy compliance required. No HIPAA obligations (de-identified
    cell lines, not from living individuals under active care). Data Access Committee oversight
    required for commercial use licensing. NIH grant terms apply to funded research uses.

