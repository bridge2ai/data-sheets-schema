    description: >
      Integrate the use of voice as a biomarker of health in clinical care by generating a
      substantial multi-institutional, ethically sourced, and diverse voice database linked to
      multimodal health biomarkers to fuel voice AI research and build predictive models to assist
      in screening, diagnosis, and treatment of a broad range of diseases.
    response: >
      Integrate the use of voice as a biomarker of health in clinical care by generating a
      substantial multi-institutional, ethically sourced, and diverse voice database linked to
      multimodal health biomarkers to fuel voice AI research and build predictive models to assist
      in screening, diagnosis, and treatment of a broad range of diseases.
  - id: voice:purpose:2
    description: >
      Create an ethically sourced flagship dataset of 10,000 voices linked to health information
      to enable future research in artificial intelligence and support critical insights into the
      use of voice as a biomarker of health, addressing the pressing need for large, high quality,
      multi-institutional and diverse voice databases linked to other health biomarkers.
    response: >
      Create an ethically sourced flagship dataset of 10,000 voices linked to health information
      to enable future research in artificial intelligence and support critical insights into the
      use of voice as a biomarker of health.
  - id: voice:purpose:3
    description: >
      Establish standards, best practices, and guidelines for voice data collection and analysis
      to advance the field of acoustic biomarkers by developing new standards that are AI/ML
      friendly and enable voice to emerge as a biomarker of health.
    response: >
      Establish standards, best practices, and guidelines for voice data collection and analysis
      to advance the field of acoustic biomarkers.
  - id: voice:purpose:4
    description: >
      Address ethical, legal, and social challenges surrounding voice AI including risks of voice
      re-identification, vulnerabilities like voice AI hacking, concerns around voice data sharing
      and privacy, and the influence of gender and racial diversity on voice AI.
    response: >
      Address ethical, legal, and social challenges surrounding voice AI including risks of voice
