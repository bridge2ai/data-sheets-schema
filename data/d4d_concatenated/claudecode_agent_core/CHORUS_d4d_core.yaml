# D4D Core Datasheet for CHORUS Dataset
# Schema: D4D Core (CoreDataset class) — semantic exchange layer subset
# Schema path: src/data_sheets_schema/schema/data_sheets_schema_core.yaml
# Source: data/d4d_concatenated/claudecode_agent/CHORUS_d4d.yaml
# Generated: 2026-04-10

id: https://chorus4ai.org/
name: CHoRUS
title: Patient-Focused Collaborative Hospital Repository Uniting Standards (CHoRUS) for Equitable AI
description: >
  CHoRUS for Equitable AI is a Bridge2AI data generation project developing the most diverse,
  high-resolution, ethically sourced, AI-ready critical care dataset to answer the grand
  challenge of improving recovery from acute illness. The project spans 20 academic centers
  (14 data acquisition centers) and is building a publicly available dataset targeting over
  100,000 critically ill patients with multi-modal data including structured EHR, waveform
  telemetry, medical imaging, EEG, and clinical notes. All structured data is standardized
  to the OMOP Common Data Model with additional formats (DICOM, WFDB, OHNLP tokenization)
  and comprehensive metadata schemas. Patient-focused efforts determine ethical and legal
  approaches to manage privacy and bias while accounting for Social Determinants of Health.
  A visualization and annotation environment labels data with targets important for prediction.
  The project emphasizes skills and workforce development for a next generation of diverse
  academic and community AI scientists through training programs and partnerships with
  AIM-AHEAD. As of August 2025, the dataset covers 14 different hospitals with over 45,000
  unique admissions and includes 50,000 patient admissions from ICU, PICU, and NICU, 1.6
  billion rows of EHR OMOP data, 7,642 admissions with radiology data, and 23 TB of
  waveform data.
page: https://chorus4ai.org/
language: en
license: Controlled Access - Data Use Agreement Required (OT2OD032701)
publisher: CHoRUS Consortium / Massachusetts General Hospital
is_tabular: false
keywords:
  - CHoRUS
  - Bridge2AI
  - critical care
  - acute illness
