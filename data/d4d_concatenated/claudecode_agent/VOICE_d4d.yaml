    Access License. Only registered users who sign the specified Data Use Agreement (Bridge2AI
    Voice Registered Access Agreement) can access files. Data covered under Certificate of
    Confidentiality which must be asserted against compulsory legal demands. Raw audio available
    through controlled access only via Data Access Compliance Office (DACO) requiring distinct
    application and DTUA signed by institutional official. Recipient must adhere to PhysioNet
    requirements managed by MIT Laboratory for Computational Physiology. Recipient encouraged
    to publish results in open-access journals. No export controls apply. Commercial and
    non-commercial research use permitted for Authorized Researchers.

distribution_formats:
  - id: voice:format:1
    name: Parquet format for spectrograms and derived features
    description: >
      Time-varying features (spectrograms, mel spectrograms, MFCCs, pitch contour, SPARC
      features, PPGs) stored in Parquet format compatible with Python datasets library.
      Each element contains participant_id, session_id, task_name, and feature arrays.
      Excluded for open-response tasks in public release.
  - id: voice:format:2
    name: TSV/JSON for phenotype and static features
    description: >
      Phenotype data in tab-delimited format (confounders.tsv, demographics.tsv, diagnosis/
      *.tsv, enrollment/*.tsv, questionnaire/*.tsv, task/*.tsv) with JSON data dictionaries
      per file. Static acoustic features (OpenSMILE, Praat, Parselmouth, torchaudio) in
      static_features.tsv with static_features.json data dictionary. One row per participant
      or recording as appropriate. BIDS v1.9.0 compliant structure.
  - id: voice:format:3
    name: WAV audio format (controlled access only)
    description: >
      Original raw audio waveforms in WAV format following BIDS structure:
      sub-{participant_id}/ses-{session_id}/audio/sub{id}_ses{id}_task-{task_name}.wav
      with companion JSON metadata. Available through controlled access only.
      Contact DACO@b2ai-voice.org to request access.

distribution_dates:
  - id: voice:distdate:1
    description: >
      Dataset first published and made available late November 2024 through Health Data Nexus.
      PhysioNet releases: v1.0 January 17, 2025 (306 participants, 12,523 recordings);
      v1.1 January 17, 2025 (added MFCC features); v2.0.0 April 16, 2025; v2.0.1 August 18,
      2025; v3.0.0 released 2025 (833 adult participants, ~61,937 recordings). Semi-annual
      releases planned. Pediatric v1.0 available separately.

third_party_sharing:
  - id: voice:thirdparty:1
    description: >
      Dataset distributed broadly to individuals outside the creating entity through PhysioNet
      (registered and controlled access) and Health Data Nexus. Collaborators at other research
      organizations must apply independently and sign a DTUA. Recipient shall not disclose,
      release, sell, rent, or lease data to third parties without prior written consent of
      Provider. Authorized Persons at Recipient institution may access data under same agreement.

# Maintenance
maintainers:
  - id: voice:maintainer:1
    description: >
      Bridge2AI-Voice Consortium (University of South Florida, lead institution) supported by NIH
      Bridge2AI program. Contact: [email protected]. Responsible for dataset curation, standards
      development, ethics oversight, versioning, and updates. Data Access Compliance Office (DACO)
      manages controlled access applications. Contact: DACO@b2ai-voice.org.
  - id: voice:maintainer:2
    description: >
      PhysioNet (MIT Laboratory for Computational Physiology, supported by NIBIB NIH grant
      R01EB030362) serves as primary distribution platform for registered access dataset.
      Provides technical infrastructure and access management.
  - id: voice:maintainer:3
    description: >
      Health Data Nexus (Temerty Centre for Artificial Intelligence Research and Education
      in Medicine, T-CAIREM, University of Toronto) maintains alternative platform providing
      cloud compute alongside dataset. Earlier dataset versions available here. Contact:
      [email protected].

updates:
  id: voice:updates:1
  name: Versioned releases with ongoing data collection
  description: >
    Dataset updated with versioned static releases semi-annually as data collection progresses.
    Users notified through news items on platforms and standard communication channels. v1.0
    released January 17, 2025 (306 participants, 12,523 recordings); v1.1 added MFCC features;
    v2.0.0 April 16, 2025; v2.0.1 August 18, 2025; v3.0.0 released 2025 (833 adults,
    ~61,937 recordings). Pediatric v1.0 released separately. Data collection ongoing through
    November 30, 2026. Target: 10,000 participants by 2027. Future releases will expand
    Spanish language protocols and add additional multimodal data (imaging, genomics).
    Version-specific DOIs maintained. Older versions continue to be supported and hosted.

retention_limit:
  id: voice:retention:1
  name: Data retention and disposition policy
  description: >
    Data Transfer and Use Agreement (DTUA) specifies two-year agreement term from start date.
    Upon termination or expiration (two years, project completion, ethics approval expiration,
    or provider termination, whichever occurs first), data shall be destroyed per provider
    instructions with written certification required within 30 days. Recipient may retain one
    copy to comply with records retention requirements under law, regulation, institutional
    policy, and for research integrity and verification. Ongoing restrictions apply to retained
    copies. Provider may unilaterally amend agreement if federal sponsor requires revision.
    Health Data Nexus retains dataset as long as useful for research purposes, possibly
    indefinitely. Version-specific DOIs maintained for all historical versions.

version_access:
  id: voice:versionaccess:1
  name: Version access policy
  description: >
    All dataset versions available through PhysioNet at https://physionet.org/content/b2ai-voice/
    with version-specific DOIs. DOI for latest version: https://doi.org/10.13026/37yb-1t42.
    Earlier versions also available on Health Data Nexus at https://healthdatanexus.ai/content/b2ai-voice/1.0/.
    By default, older versions continue to be supported, hosted, and made available. Dataset
    publishers reserve right to remove access to older versions. Each version has unique DOI.

extension_mechanism:
  id: voice:extension:1
  name: Dataset extension and contribution mechanisms
  description: >
    Derivative datasets can be published on Health Data Nexus referencing original source
    under same access conditions. Open-source repositories (b2aiprep, SenseLab) have discussion
    forums, issue pages, and pull request mechanisms for contributing improvements to
    preprocessing code. REDCap data dictionary available at https://github.com/eipm/bridge2ai-redcap
    with MIT license. Bridge2AI-Voice documentation at https://github.com/eipm/bridge2ai-docs.
    Future augmentations to voice collection protocol coordinated through consortium.

# Ethics and Human Subjects
human_subject_research:
  id: voice:hsr:1
  name: Bridge2AI-Voice Human Subjects Research
  description: >
    Observational study (cross-sectional design) involving direct collection of voice recordings,
    questionnaire responses, and EHR linkage from human participants. Prospective informed
    consent obtained from all participants. IRB approved by University of South Florida Single
    IRB with subsite IRBs through Single IRB process. Not a drug or medical device study.
    No data monitoring committee appointed. Study ID: OT2OD032720.
  involves_human_subjects: true
  irb_approval:
    - University of South Florida Single IRB approval with subsite IRB approvals through Single IRB process
  ethics_review_board:
    - University of South Florida Institutional Review Board (Single IRB)
  special_populations:
    - Pediatric participants (aged 2-18 years) at Hospital for Sick Children with age-appropriate protocols
  regulatory_compliance:
    - HIPAA Safe Harbor de-identification standards applied
    - Certificate of Confidentiality covering dataset against compulsory legal demands
    - 45 CFR 46 (Common Rule) compliance
    - Data covered as Personally Identifiable Information per OMB Memorandum M-07-16

collection_consents:
  - id: voice:consent:1
    description: >
      All participants duly informed and provided prospective informed consent for data collection
      and use via IRB-approved consent process. Consent includes: authorization for voice data
      collection and speaking tasks, demographic and medical history questionnaires, disease-
      specific validated questionnaires, access to medical information through EHR platforms,
      and permission to share research data. Data that poses low risk of re-identification
      shared in registered access; heightened re-identification risk data shared through
      controlled access mechanism. No restriction on commercial vs. non-commercial use;
      no geographic restriction; no restriction to specific research type.

consent_revocations:
  - id: voice:revocation:1
    description: >
      Participants informed they may withdraw from study at any point. If withdrawal occurs
      during or before voice data collection, data not included in database. Participants
      informed that research data (including voice recordings) cannot be removed from the
      database once the voice data collection process is completed. Mechanism: direct
      communication with research team during collection session.

collection_notifications:
  - id: voice:notification:1
    description: >
      Participants notified and consented through IRB-approved consent process before data
      collection. Consent process described eligibility, voluntary participation, data uses,
      sharing mechanisms, privacy protections, and withdrawal rights. English language used
      for all communications in current releases.

ethical_reviews:
  - id: voice:ethicalreview:1
    description: >
      IRB review and approval obtained from University of South Florida Single IRB with subsite
      IRB approvals. Study reviewed and approved for human subjects research. Bioethics guidance
      integrated throughout study design and conduct by consortium bioethicists (Belisle-Pipon,
      Ravitsky). Ethics module develops new guidelines for consenting to voice data collection,
      voice data sharing, and utilization in context of voice AI technology. Project addresses
      ethical issues from voice data generation through clinical adoption and downstream health
      decisions.

sensitive_elements:
  - id: voice:sensitive:1
    description: >
      Voice recordings considered biometric identifiers under HIPAA. Raw audio waveforms
      excluded from public release; available only through controlled access with DACO
      approval and institutional DTUA. Risks include voice re-identification, voice AI hacking,
      and illicit or unauthorized use of voice data.
  - id: voice:sensitive:2
    description: >
      Electronic health record (EHR) data accessed with participant consent for gold standard
      validation of diagnoses and symptoms. Sensitive health information including diagnoses,
      symptoms, disease-specific clinical data, and multimodal health biomarkers.
  - id: voice:sensitive:3
    description: >
      Dataset contains sensitive demographic information: racial and ethnic origins, sexual
      orientation, financial and socioeconomic status, and health data. All direct identifiers
      removed; indirect identifiers removed where creating significant re-identification risk.
  - id: voice:sensitive:4
    description: >
      Free speech task transcriptions may contain potentially identifying information or
      external voices. All open-response audio features (spectrograms, MFCCs, mel spectrograms,
      transcriptions, EMAs, PPGs) removed from public feature-only dataset.
  - id: voice:sensitive:5
    description: >
      Dataset covered under Certificate of Confidentiality protecting against compulsory legal
      demands such as court orders and subpoenas for identifying information or characteristics
      of research participants. Provides additional legal protections beyond standard
      de-identification.

is_deidentified:
  id: voice:deident:1
  name: HIPAA Safe Harbor de-identification
  description: >
    HIPAA Safe Harbor de-identification applied. All direct identifiers removed (names, civic
    addresses, social security numbers). Indirect identifiers removed where creating significant
    re-identification risk (geographic/demographic identifiers, household composition, cultural
    identity). Non-identifying sensitive information removed (household income, mental health
    status, traumatic life experiences). All raw voice data removed from public release.
    Sensitive fields per REDCap data dictionary removed. Direct identifiers removed: Yes.
    HIPAA de-identification rules applied: Yes. Dates rebased: Yes. Geographic information
    removed/generalized: Yes. Narrative text fields removed: Yes. K-anonymization: No.

participant_privacy:
  - id: voice:privacy:1
    description: >
      Multiple layered privacy protections: (1) HIPAA Safe Harbor de-identification; (2)
      removal of all raw audio from public dataset; (3) removal of open-response features
      from public dataset; (4) Certificate of Confidentiality; (5) registered access requiring
      DUA signature; (6) controlled access for raw audio requiring institutional DTUA;
      (7) federated learning technology planned for multi-institutional analysis minimizing
      data sharing; (8) secure storage requirements in DTUA (administrative, physical, and
      technical safeguards). No analysis of potential re-identification impact conducted.

at_risk_populations:
  id: voice:atrisk:1
  name: Pediatric participants protection
  description: >
    Pediatric participants (aged 2-18) require additional protections. Pediatric data collected
    exclusively at Hospital for Sick Children (SickKids) with age-appropriate protocols.
    Distinct IRB considerations for pediatric cohort. Pediatric questionnaires and acoustic
    tasks specifically designed for different age groups (2-4, 4-6, 6-10, 10+ years).
    Minimum age for adult dataset is 18 years. Pediatric dataset released separately
    with additional privacy precautions.

participant_compensation:
  - id: voice:compensation:1
    description: >
      Adult participants compensated via electronic gift cards: $40 for data collection sessions
      under 90 minutes; $80 for sessions over 90 minutes. Maximum 3 sessions and maximum total
      compensation of $120 per participant. Research staff (clinicians, co-investigators)
      compensated through consortium-level publication authorship.

