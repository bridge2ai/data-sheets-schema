# Composition
instances:
  - id: voice:instance:1
    description: >
      Adult participants presenting at specialty clinics (high volume expert clinics) across
      multiple sites in North America. Participants selected based on membership to five
      predetermined disease cohort groups: Voice Disorders, Neurological and Neurodegenerative
      Disorders, Mood and Psychiatric Disorders, Respiratory Disorders, and Pediatric Voice
      and Speech Disorders. Version 3.0 contains approximately 833 adult participants with
      ~61,937 voice-derived recordings. Pediatric dataset v1.0 adds 300 participants.
      Enrollment anticipated to reach 10,000 participants by 2027.
    instance_type: Human participants with clinical diagnoses recruited from specialty clinics
    counts: 833
    label: true
    label_description: >
      Diagnostic labels assigned by clinical assessment at each site. Clinicians provided
      diagnoses based on clinical interview and appropriate work-up including laryngoscopy,
      stroboscopy, MRI, CT, whole genome sequencing, EHR records, and medication prescriptions.
      Labels include diagnostic categories: vocal pathologies, neurological disorders,
      psychiatric conditions, respiratory disorders, and pediatric voice/speech disorders.
      Per Bridge2AI protocols and ICD-10 codes. Single labeler per participant (site clinician).

subsets:
  - id: voice:subset:1
    name: Featurized Dataset (Registered Access)
    description: >
      Contains AI-ready derived features from voice recordings distributed through PhysioNet
      under registered access. Features include: OpenSMILE eGeMaps features per audio file,
      Parselmouth/Praat speech features, speech intelligibility metrics, torchaudio-based pitch
      contour, spectrograms, mel spectrograms, MFCCs, SPARC-based features including EMA
      estimates, phonetic posteriorgrams (PPGs). Phenotype data includes demographics, acoustic
      confounders, validated questionnaires, and clinical diagnoses in BIDS-compliant format.
      HIPAA Safe Harbor identifiers removed. Free speech transcripts and open-response audio
      features removed to protect privacy. Spectrograms, MFCCs, mel spectrograms, transcriptions,
      EMAs, and PPGs from open-response prompts removed.
  - id: voice:subset:2
    name: Raw Audio Dataset (Controlled Access)
    description: >
      Original raw audio waveforms available through controlled access only to protect participant
      privacy. Users must email DACO@b2ai-voice.org and complete a Data Access Request Form
      (DARF), Data Use Agreement (DUA), and institutional Data Use and Transfer Agreement (DTUA)
      signed by authorized official. Raw audio has been used in Bridge2AI Summer School and
      hackathon. Data stored in BIDS v1.9.0 compliant format with WAV audio files and JSON
      metadata per participant session and acoustic task.
  - id: voice:subset:3
    name: Pediatric Dataset (Registered Access)
    description: >
      Pediatric dataset v1.0 containing data from 300 pediatric participants. Collected
      exclusively at Hospital for Sick Children (SickKids) using reproschema-ui with the
      Bridge2AI-Voice pediatric protocol. Participants grouped by age (2-4, 4-6, 6-10, 10+
      years). Contains 36 pediatric-specific acoustic tasks and pediatric validated questionnaires
      (C-VHI-10, PVOS, PVRQOL, PHQ-A). Available through PhysioNet under separate registered
      access link.

sampling_strategies:
  - id: voice:sampling:1
    description: >
      Non-probability purposive sampling from specialty clinics (high volume expert clinics -
      outpatient clinics seeing >50 patients per month from same disease category). Patients
      presenting at clinics screened for eligibility per inclusion/exclusion criteria outlined
      in protocol Table 1. Not representative of general population due to limited geographic
      locations and clinic-based recruitment. Current v3.0 dataset is a sample of an ongoing
      collection targeting 10,000 participants by 2027. English-speaking adult participants
      (18-120 years); Spanish protocols under development for future releases.
    is_sample: true
    is_random: false
    is_representative: false
    why_not_representative:
      - Data collected at limited number of geographic locations (five sites)
      - Clinic-based recruitment introduces selection bias toward treatment-seeking populations
      - Remote data collection not included in initial releases
      - Groups with less trust in medical system or less proximal to collection sites underrepresented
      - Current releases contain only English-speaking participants
      - Public releases do not contain equal distribution across disease categories
    strategies:
      - Targeted recruitment from high volume expert specialty clinics
      - Inclusion/exclusion criteria per Bridge2AI-Voice protocol Table 1 for each disease cohort
      - Multi-institutional enrollment across North American sites
      - IRB-approved prospective consent process
      - Pediatric participants exclusively from Hospital for Sick Children (SickKids)

subpopulations:
  - id: voice:subpop:1
    name: Voice Disorders cohort
    description: >
      Participants with laryngeal disorders including laryngeal cancer (T1-T4, biopsy proven),
      laryngitis (acute, chronic, bacterial, fungal, autoimmune), pre-cancerous lesions
      (keratosis, leukoplakia), benign vocal cord lesions (nodules, polyps, cysts, Reinke's
      edema, recurrent laryngeal papilloma), muscle tension dysphonia, spasmodic dysphonia
      and laryngeal tremor, unilateral vocal fold paralysis, and glottic insufficiency/
      presbyphonia. Validated by laryngoscopy images and stroboscopy videos.
  - id: voice:subpop:2
    name: Neurological and Neurodegenerative Disorders cohort
    description: >
      Participants aged 44-85 with clinical diagnoses including mild cognitive impairment,
      Alzheimer's disease, other dementias (frontotemporal, Lewy body, vascular, mixed,
      alcohol-induced), ALS (sporadic, familial, spinal/limb-onset, bulbar-onset), and
      Parkinson's disease (idiopathic PD, multiple system atrophy, progressive supranuclear
      palsy, corticobasal degeneration). Must be able to read and speak English. Validated
      by CT Brain, MRI Brain, serum biomarkers (Ptau proteins for AD), and whole genome
      sequencing. Participants enrolled in deep brain stimulation studies noted.
  - id: voice:subpop:3
    name: Mood and Psychiatric Disorders cohort
    description: >
      Participants with clinical diagnoses including depression/major depressive disorder,
      bipolar I/II disorder, anxiety disorder, schizophrenia, ADHD (comorbid), PTSD (comorbid),
      OCD (comorbid), panic disorder (comorbid), borderline personality disorder (comorbid),
      eating disorder (comorbid), insomnia/sleep disorder (comorbid), social anxiety disorder
      (comorbid), autism spectrum disorder (comorbid), alcohol/substance use disorder (comorbid),
      and other psychiatric disorders. Validated by electronic health summary, clinical diagnosis
      from psychiatrist, and medication history. Uses GAD-7, PHQ-9, PTSD, ADHD, DSM-5 adult
      questionnaires among others.
  - id: voice:subpop:4
    name: Respiratory Disorders cohort
    description: >
      Participants with respiratory conditions including airway stenosis (bilateral vocal fold
      paralysis, supraglottic, glottic, posterior glottic, subglottic, tracheal stenosis,
      multi-level upper airway stenosis) and chronic cough (bothersome cough >8 weeks).
      Validated by spirometry, flow volume loops, and CT scan of neck/chest. Dyspnea Index
      and Leicester Cough Questionnaire administered.
  - id: voice:subpop:5
    name: Pediatric cohort
    description: >
      Pediatric participants aged 2-18 with voice and speech disorders recruited exclusively
      from Hospital for Sick Children (SickKids). Grouped by age: 2-4, 4-6, 6-10, 10+ years.
      Data collected using reproschema-ui with Bridge2AI-Voice pediatric protocol. Includes
      36 pediatric-specific acoustic tasks and specialized questionnaires (C-VHI-10, PVOS,
      PVRQOL, PHQ-A). Pediatric dataset v1.0 available separately from adult dataset.
  - id: voice:subpop:6
    name: Control participants
    description: >
      Healthy volunteer control participants who complete common questionnaires and voice tasks
      (Voice Handicap Index-10, PHQ-9, GAD-7, Winograd) to provide normative comparisons.

# Collection Process
collection_mechanisms:
  - id: voice:collection:1
    description: >
      Voice data collected in clinic using custom Bridge2AI-Voice App on iPad (9th or 10th
      generation) or iPad Air (5th generation) with Avid AE-36 microphone and Apple dongle
      connector. App collects breathing sounds and voice, speech, and linguistic tasks along
      with health information through surveys and validated questionnaires. Research assistant
      present during collection. Future remote data collection planned but not included in
      current releases.
  - id: voice:collection:2
    description: >
      Pediatric data collected using reproschema-ui with Bridge2AI-Voice pediatric protocol.
      Same iPad hardware as adult protocol with age-appropriate tasks grouped by age range
      (2-4, 4-6, 6-10, 10+ years). Questions read to participants when needed.
  - id: voice:collection:3
    description: >
      Clinical data including EHR information, imaging (laryngoscopy, stroboscopy, MRI, CT),
      and genomic data extracted from sites independently and uploaded through REDCap database.
      No external multimodal data released in current dataset versions.

acquisition_methods:
  - id: voice:acquisition:1
    description: >
      22 acoustic tasks recorded through Bridge2AI-Voice App for adult participants including:
      Non-Voice (Respiration, Cough, Breath Sounds, Voluntary Cough); Voice/Non-Speech
      (Prolonged Vowel /e/, Maximum Phonation Time, Glides, Loudness /Hey/, Diadochokinesis
      /pa/ta/ka/); Speech (Rainbow Passage, Caterpillar Passage, Cape-V Sentences, Free Speech,
      Picture Description, Story Recall, Animal Fluency, Open Response Questions, Word-Color
      Stroop, Productive Vocabulary, Random Item Generation, Cinderella Story). Tasks vary
      by disease cohort (Part A/Voice/Resp/Mood/Neuro).
  - id: voice:acquisition:2
    description: >
      36 pediatric acoustic tasks collected via reproschema-ui including: Speech tasks (ABC's,
      Ready for School, Favorite Show, Favorite Food, Outside of School, Months, Counting,
      Naming Animals, Naming Food, Identifying Pictures, Picture Description, Caterpillar
      Passage, Repeat Words, Role Naming, Repeat Sentences); Voice/Non-Speech tasks (Long
      Sounds, Noisy Sounds, Silly Sounds /PUH TUH KUH/).
  - id: voice:acquisition:3
    description: >
      Self-reported demographic data and medical history questionnaires administered through
      app. Validated questionnaires integrated for each disease cohort including: VHI-10,
      PHQ-9, GAD-7, PANAS, Custom Affect Scale, PTSD Adult, ADHD Adult, DSM-5 Adult,
      Dyspnea Index, Leicester Cough Questionnaire, Winograd Questionnaire, MOCA,
      C-VHI-10 (peds), PVOS (peds), PVRQOL (peds), PHQ-A (peds). Confounders questionnaire
      about smoking history, drinking history, and other acoustic confounders.
  - id: voice:acquisition:4
    description: >
      Electronic health record (EHR) access for consenting participants permitting investigators
      to access medical information through EHR platforms to perform gold standard validation
      of diagnoses and symptoms. Linkage to multimodal health biomarkers including laryngoscopy
      imaging, radiomics, genomics, respiratory function tests.

data_collectors:
  - id: voice:datacollector:1
    description: >
      Research teams at each of the five North American collection sites, including medical
      graduate, and undergraduate students coordinating with site clinicians and doctors.
      Clinicians and doctors listed under IRB as co-investigators and added to consortium.
      Participants compensated via electronic gift cards: $40 for sessions under 90 minutes,
      $80 for sessions over 90 minutes, maximum 3 sessions and $120 total compensation.

collection_timeframes:
  - id: voice:timeframe:1
    description: >
      Data collection ongoing from September 2022 through November 2026 (project end date).
      Initial dataset releases began in late 2024. Version 1.0 released January 17, 2025
      (306 participants). Version 3.0 released 2025 (833 adult participants). Semi-annual
      releases planned. Enrollment anticipated to reach 10,000 participants by 2027.

direct_collection:
  - id: voice:directcoll:1
    description: >
      Data collected directly from individuals in clinic settings by trained research assistants
      using the Bridge2AI-Voice App. Participants notified and consented through IRB-approved
      process. Clinical diagnoses and EHR data obtained with participant consent from site
      clinicians. Data collected in USA and Canada.

# Preprocessing, Cleaning, and Labeling
preprocessing_strategies:
  - id: voice:preproc:1
    description: >
      Raw audio preprocessing using b2aiprep library: conversion to monaural audio, resampling
      to 16 kHz with Butterworth anti-aliasing filter. Standardization ensures consistent
      format across all recordings for downstream feature extraction.
  - id: voice:preproc:2
    description: >
      Spectrogram extraction using short-time Fast Fourier Transform (FFT): 25ms window size,
      10ms hop length, 512-point FFT. Output spectrograms have 513xN dimensions where N is
      proportional to audio length. Stored in Parquet format.
  - id: voice:preproc:3
    description: >
      Mel-frequency cepstral coefficients (MFCC) extraction: 60 MFCCs extracted from
      spectrograms capturing perceptually-relevant spectral envelope characteristics. Output
      dimension 60xN. Stored in Parquet format.
  - id: voice:preproc:4
    description: >
      OpenSMILE eGeMaps acoustic feature extraction capturing temporal dynamics and acoustic
      characteristics. One row per unique recording in static_features.tsv.
  - id: voice:preproc:5
    description: >
      Parselmouth and Praat phonetic and prosodic feature computation providing fundamental
      frequency (F0), formants, and voice quality measures. Documented in static_features.json
      data dictionary.
  - id: voice:preproc:6
    description: >
      Torchaudio-based feature extraction including pitch contour, spectrograms, mel spectrograms,
      MFCCs. SPARC-based features including electromagnetic articulography (EMA) estimates,
      loudness, periodicity, and pitch measures. Phonetic posteriorgrams (PPGs). Stored in
      two formats: fixed static format and temporal format varying by recording length.
  - id: voice:preproc:7
    description: >
      Transcription generation using OpenAI Whisper model applied to audio recordings. Raw
      audio transcripts reviewed and any recordings containing potentially identifying information
      or external voices removed. All transcriptions, EMAs, and PPGs from open-response prompts
      removed from public feature-only dataset.
  - id: voice:preproc:8
    description: >
      REDCap and reproschema-ui data exported and converted to BIDS v1.9.0 format using b2aiprep
      open-source library. Phenotype data organized in tab-delimited files with JSON data
      dictionaries. Pediatric data first extracted from reproschema-ui to REDCap format then
      converted to BIDS.

cleaning_strategies:
  - id: voice:cleaning:1
    description: >
      HIPAA Safe Harbor de-identification for public release: removed direct identifiers (names,
      civic addresses, social security numbers), indirect identifiers creating significant
      re-identification risk (select geographic/demographic identifiers, household composition,
      cultural identity), and sensitive information (household income, mental health status,
      traumatic life experiences). Geographic data limited; state/province removed, country
      retained.
  - id: voice:cleaning:2
    description: >
      Audio privacy protection for public release: all raw audio waveforms excluded from
      public dataset. All spectrograms, MFCCs, mel spectrograms, transcriptions, EMAs, and
      PPGs from open-response prompts removed from feature-only dataset. Free speech transcripts
      removed. Raw audio available only through controlled access with DACO approval. Raw data
      stored and retained separately for verified researchers.
  - id: voice:cleaning:3
    description: >
      Sensitive field removal based on REDCap data dictionary: all fields encoded as sensitive
      (column "Identifier?" in REDCap data dictionary CSV) removed from dataset.
  - id: voice:cleaning:4
    description: >
      Audit protocol applied: missingness tables generated and included with dataset; distribution
      and outlier checks; categorical responses checked against schema; audio quality control
      metrics including silence amount, duration, and speech-to-passage accuracy checks.
      Processing using b2aiprep and SenseLab toolkits.

labeling_strategies:
  - id: voice:labeling:1
    description: >
      Diagnostic labels assigned by site clinicians based on clinical assessment and gold standard
      validation methods per Bridge2AI-Voice protocol Table 1 and ICD-10 codes. For voice disorders:
      laryngoscopy and stroboscopy. For neurological disorders: CT Brain, MRI Brain, genome
      sequencing, serum biomarkers. For mood/psychiatric disorders: EHR records, psychiatrist
      diagnosis, medication history. For respiratory disorders: spirometry, flow volume loops,
      CT scan. Single labeler (site clinician) per participant. Future labels should include
      description of exact variables used for determination.

# Uses
intended_uses:
  - id: voice:use:1
    description: >
      Primary intended use: development and validation of AI/ML models for voice as a biomarker
      of health, supporting screening, diagnosis, and treatment of voice disorders, neurological
      disorders, mood disorders, respiratory disorders, and pediatric speech disorders through
      model pretraining, fine-tuning, benchmarking, and validation.
  - id: voice:use:2
    description: >
      Research into acoustic biomarkers and development of standards for voice data collection
      and analysis. Establishing best practices for AI/ML-friendly voice datasets and contributing
      to the field's maturation as a clinical diagnostic modality.
  - id: voice:use:3
    description: >
      Training and education in voice AI research through workforce development initiatives,
      curriculum creation on FAIR and CARE voice AI model development, and fostering
      collaborations between medical voice researchers, acoustic engineers, and AI/ML
      specialists, especially from underserved communities.
  - id: voice:use:4
    description: >
      Multimodal health research combining voice data with EHR information, radiomics, genomics,
      imaging, and other health biomarkers to understand complex disease relationships and
      improve diagnostic accuracy.

existing_uses:
  - id: voice:existinguse:1
    description: >
      A restricted version of the dataset containing raw audio has been used in the Bridge2AI
      Summer School and hackathon for education and research training purposes.

discouraged_uses:
  - id: voice:discouraged:1
    description: >
      Non-clinical applications such as hiring decisions, insurance premium adjustments, or
      any form of surveillance that could lead to discrimination or harm based on health
      conditions or voice characteristics. These applications could negatively impact individuals.
  - id: voice:discouraged:2
    description: >
      Any attempt to re-identify research participants or use data in ways that could foreseeably
      cause harm or stigmatization to research participants, their families, communities, or
      specific populations. Dataset covered under Certificate of Confidentiality.
  - id: voice:discouraged:3
    description: >
      Development or use of intellectual property protections, database rights, or related rights
      in ways that would prevent or block access to any element of the dataset or conclusions
      derived from it. Must respect Fort Lauderdale Agreement and Open Science principles.

prohibited_uses:
  - id: voice:prohibited:1
    description: >
      Use of the dataset outside of authorized research purposes as defined in the Bridge2AI
      Voice Registered Access Agreement. The dataset is intended solely for commercial and
      non-commercial research by Authorized Researchers. Sale of all or part of the data on
      any media is prohibited. Re-identification attempts are prohibited.

