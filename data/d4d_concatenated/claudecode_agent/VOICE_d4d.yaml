# Motivation
purposes:
  - id: voice:purpose:1
    response: >
      Integrate the use of voice as a biomarker of health in clinical care by generating a
      substantial multi-institutional, ethically sourced, and diverse voice database linked to
      multimodal health biomarkers to fuel voice AI research and build predictive models to assist
      in screening, diagnosis, and treatment of a broad range of diseases.
  - id: voice:purpose:2
    response: >
      Create an ethically sourced flagship dataset of 10,000 voices linked to health information
      to enable future research in artificial intelligence and support critical insights into the
      use of voice as a biomarker of health, addressing the pressing need for large, high quality,
      multi-institutional and diverse voice databases linked to other health biomarkers.
  - id: voice:purpose:3
    response: >
      Establish standards, best practices, and guidelines for voice data collection and analysis
      to advance the field of acoustic biomarkers by developing new standards that are AI/ML
      friendly and enable voice to emerge as a biomarker of health.
  - id: voice:purpose:4
    response: >
      Address ethical, legal, and social challenges surrounding voice AI including risks of voice
      re-identification, vulnerabilities like voice AI hacking, concerns around voice data sharing
      and privacy, and the influence of gender and racial diversity on the development and
      application of voice AI technologies.

tasks:
  - id: voice:task:1
    response: >
      Enable development of AI/ML predictive models for screening, diagnosis, and treatment of
      voice disorders including laryngeal cancers, vocal fold paralysis, muscle tension dysphonia,
      laryngeal dystonia, benign laryngeal lesions, and pre-cancerous lesions, leveraging acoustic
      changes in phonation resulting from changes in vocal fold vibratory function.
  - id: voice:task:2
    response: >
      Support machine learning models for neurological and neurodegenerative disorders including
      Alzheimer's disease, Parkinson's disease, mild cognitive impairment, other dementias,
      and ALS, detecting voice and speech changes such as slowed speech, low frequency,
      monotonous speech, vocal tremor, dysarthria, and aphasia. Validation uses CT, MRI, and
      whole genome sequencing data.
  - id: voice:task:3
    response: >
      Develop AI algorithms for mood and psychiatric disorder detection including depression,
      schizophrenia, bipolar disorder, anxiety disorders, ADHD, PTSD, OCD, and borderline
      personality disorder, identifying vocal markers through clinical diagnosis, EHR records,
      and medication history.
  - id: voice:task:4
    response: >
      Create machine learning models for respiratory disorder screening and therapeutic monitoring
      using respiratory sounds, cough sounds, and voice, applicable to conditions such as chronic
      cough, COPD, airway stenosis, and other respiratory conditions using spirometry, flow volume
      loops, and CT imaging for validation.
  - id: voice:task:5
    response: >
      Build AI models for pediatric voice and speech disorder detection using 36 pediatric-specific
      acoustic tasks and specialized questionnaires, addressing the relative scarcity of pediatric
      voice data for participants aged 2-18 from the Hospital for Sick Children (SickKids).
  - id: voice:task:6
    response: >
      Promote application of AI/ML for voice research through workforce development, curriculum
      creation on voice biomarkers of health for FAIR and CARE AI models, and fostering
      collaborations especially with researchers from underserved communities, building bridges
      between medical voice research, acoustic engineers, and the AI/ML community.
  - id: voice:task:7
    response: >
      Enable AI model pretraining, fine-tuning, benchmarking, and validation using the
      standardized BIDS-compliant dataset structure with features extracted via b2aiprep,
      SenseLab, OpenSMILE, Parselmouth, Praat, and torchaudio toolkits.

addressing_gaps:
  - id: voice:gap:1
    response: >
      Address the lack of large, high quality, multi-institutional and diverse voice databases
      linked to multimodal health biomarkers (demographics, imaging, genomics, risk factors)
      necessary to fuel voice AI research and answer tangible clinical questions. Previous studies
      had sample sizes too small or lacked metadata needed for robust, clinically useful models.
  - id: voice:gap:2
    response: >
      Overcome limitations in existing voice and psychiatric disorder research that has relied on
      small datasets with limited demographic diversity reporting, lack of standardized data
      collection protocols precluding meta-analysis, and possible confounders limiting external
      validity and clinical usability.
  - id: voice:gap:3
    response: >
      Fill the gap in pediatric voice and speech analysis research, which is sparser partly due
      to ethical concerns and challenges in data acquisition for this cohort, particularly for
      autism spectrum disorder and speech delay detection.
  - id: voice:gap:4
    response: >
      Establish missing standards for voice data collection, acoustic analysis, and ethical
      frameworks for consenting to voice data collection, sharing, and utilization in the context
      of voice AI technology development and clinical adoption.
  - id: voice:gap:5
    response: >
      Develop software and cloud infrastructure for automated voice data collection through a
      smartphone application (Bridge2AI-Voice App) that allows non-invasive, user-friendly, high
      quality voice data collection while minimizing human manipulation and implementing federated
      learning technology to minimize data sharing while preserving patient privacy.

