# Composition
instances:
  - id: cm4ai:instance:1
    description: >
      MDA-MB-468: Triple negative breast cancer cell line (RRID:CVCL_0419) established from a
      metastatic site pleural effusion of a 51-year-old black female with a metastatic mammary
      adenocarcinoma, available from ATCC. This cell line has been extensively used to study
      triple-negative breast cancer and is well characterized with transcriptomic, mutational profile,
      and whole-genome sequencing data available. Cells are analyzed under three conditions:
      untreated, paclitaxel-treated, and vorinostat-treated.
  - id: cm4ai:instance:2
    description: >
      KOLF2.1J: Human induced pluripotent stem cell (iPSC) line (RRID:CVCL_B5P3) derived from a
      healthy male Northern European donor, available from the Human Induced Pluripotent Stem Cells
      Initiative (HipSci) resource. Available for access by non-for-profit organizations via a
      simple MTA. Analyzed in undifferentiated state and after differentiation into neurons,
      neural progenitor cells (NPCs), and cardiomyocytes.
  - id: cm4ai:instance:3
    description: >
      100 Chromatin Regulators: Near-comprehensive set of chromatin regulators encoded by the human
      genome analyzed via AP-MS, SEC-MS, IF imaging, and CRISPR perturbation screens across different
      cell states and treatment conditions. 17 genes endogenously tagged in MDA-MB-468 with AP-MS data
      under three conditions, with 34 additional genes in process. SEC-MS identified 72/100 chromatin
      modifiers, with 52 being integral components of protein complexes.
  - id: cm4ai:instance:4
    description: >
      100 Metabolic Enzymes: Set of metabolic enzymes involved in cancer, neuropsychiatric, and
      cardiac disorders analyzed via multimodal interrogation including mass spectrometry, imaging,
      and perturbation screens.

subsets:
  - id: cm4ai:subset:1
    description: >
      Spatial Proteomics IF Images - MDA-MB-468: Immunofluorescence-based staining (ICC-IF) and
      confocal microscopy images displaying spatial localization of proteins of interest in MDA-MB-468
      breast cancer cells under three conditions: untreated, paclitaxel-treated, and vorinostat-treated.
      March 2025 Beta release included 563 proteins; June 2025 Beta V2.1 revision includes 464 proteins
      with RGB images. Nuclei stained with DAPI (blue channel), endoplasmic reticulum with calreticulin
      antibody (yellow channel), microtubules with tubulin antibody (red channel), and antibody against
      protein of interest (green channel). Generated by Lundberg Lab at Stanford University using
      automated fixation and permeabilization protocols.
  - id: cm4ai:subset:2
    description: >
      Protein-Protein Interaction AP-MS Data: Affinity purification mass spectrometry (AP-MS) data
      on endogenously tagged cell lines mapping protein-protein interactions of chromatin regulators.
      17 genes endogenously tagged in MDA-MB-468 with data acquired under three conditions (untreated,
      paclitaxel, vorinostat). Orthogonal approach to SEC-MS for PPI mapping.
  - id: cm4ai:subset:3
    description: >
      Protein-Protein Interaction SEC-MS Data: Size exclusion chromatography coupled to mass
      spectrometry (SEC-MS) for proteome-wide complex/interaction mapping. Performed on MDA-MB-468
      cells under three conditions (untreated, paclitaxel, vorinostat) and on KOLF2.1J iPSCs and
      derivatives (undifferentiated, NPCs, neurons, cardiomyocytes). Detected PPI profiles of over
      1,000 complexes in MDA-MB-468 cells and over 700 protein complexes in iPSCs and differentiated
      neurons. Identified 72/100 chromatin modifiers with 52 being integral components of protein
      complexes. October 2025 release adds SEC-MS for MDA-MB-468 breast cancer cells.
  - id: cm4ai:subset:4
    description: >
      CRISPR Perturbation Cell Atlas: Genome-scale CRISPRi perturbation cell atlas in undifferentiated
      KOLF2.1J human induced pluripotent stem cells (hiPSCs) mapping transcriptional and fitness
      phenotypes associated with 11,739 targeted genes. Single-cell CRISPR screens performed using
      10x Genomics 3'HT kit with CRISPR lentiviral library targeting 100 chromatin factors with 6
      guide RNAs per gene. Screens conducted in MDA-MB-468 cells under 3 conditions (no treatment,
      paclitaxel, vorinostat) and KOLF2.1J iPSC in undifferentiated state. October 2025 release
      adds Perturb-seq data for MDA-MB-468 breast cancer cells. Includes raw sequence data and
      processed cell atlas data.
  - id: cm4ai:subset:5
    description: >
      Hierarchical Cell Maps via MuSIC: Integrated hierarchical cell maps produced by Multi-Scale
      Integrated Cell (MuSIC) pipeline from fusion of protein localization (IF images) and
      protein-protein interaction data (AP-MS and SEC-MS). Cell maps are hierarchical directed acyclic
      graphs (DAG) where each node represents an assembly of proteins in proximity at a given scale,
      spanning from large assemblies representing cell compartments to small assemblies of protein
      complexes. Maps contain 10 layers of depth representing communities at multiple resolutions,
      with communities at smaller distance nested inside larger communities. Nature publication
      (Schaffer, Hu et al., April 2025) presents first fully integrated multimodal cell maps.

sampling_strategies:
  - id: cm4ai:sampling:1
    description: >
      Purposive selection of two disease-relevant cell lines: MDA-MB-468 triple negative breast
      cancer cell line for cancer research, and KOLF2.1J iPSCs for neuropsychiatric and cardiac
      disorder research. Both cell lines ethically sourced and well-characterized in the literature.
      Selection criteria: (1) MDA-MB-468 chosen for triple-negative breast cancer research
      applications; (2) KOLF2.1J chosen as reference iPSC line for large-scale collaborative
      studies; (3) both have extensive existing characterization data and are commercially available
      and ethically sourced.
    is_sample: false
    is_random: false
    is_representative: false
    strategies:
      - Selection of commercially available, ethically sourced cell lines
      - MDA-MB-468 chosen for triple-negative breast cancer research applications
      - KOLF2.1J chosen as reference iPSC line for large-scale collaborative studies
      - Both cell lines have extensive existing characterization data

