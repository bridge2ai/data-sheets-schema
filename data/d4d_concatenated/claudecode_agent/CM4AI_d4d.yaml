# Collection Process
collection_mechanisms:
  - id: cm4ai:collection:1
    description: >
      Immunofluorescence Spatial Proteomics Imaging: Automated fixation and permeabilization
      protocols using pipetting robot for MDA-MB-468 and KOLF2.1J cell lines. Immunofluorescence-based
      staining (ICC-IF) with confocal microscopy to capture spatial subcellular organization. Completed
      spatial proteomics mapping of 100 chromatin regulators in MDA-MB-468 cells under three conditions
      (untreated, paclitaxel, vorinostat), with 500 additional proteins pending from genetic
      perturbations and PPI results. Antibodies from Human Protein Atlas resource. Generated by
      Lundberg Lab at Stanford University.
  - id: cm4ai:collection:2
    description: >
      Affinity Purification Mass Spectrometry: Endogenous tagging of genes in cell lines followed
      by affinity purification mass spectrometry (AP-MS) to map protein-protein interactions. 17 genes
      endogenously tagged in MDA-MB-468 with AP-MS data acquired under three conditions (untreated,
      paclitaxel, vorinostat). 34 additional genes currently in tagging process. Orthogonal approach
      to SEC-MS for comprehensive PPI mapping.
  - id: cm4ai:collection:3
    description: >
      Size Exclusion Chromatography Mass Spectrometry: Size exclusion chromatography coupled to mass
      spectrometry (SEC-MS) for proteome-wide complex/interaction mapping. Performed in Krogan
      Laboratory at UCSF. Conducted on MDA-MB-468 cells under three conditions and on KOLF2.1J iPSCs
      and derivatives (undifferentiated, NPCs, neurons, cardiomyocytes). Enabled detection of over
      1,000 protein complexes in MDA-MB-468 cells and over 700 complexes in iPSCs, with thousands of
      proteins exhibiting differential elution profiles between control and treated cells.
  - id: cm4ai:collection:4
    description: >
      CRISPR Perturbation Screens: Single-cell CRISPR screens using CRISPR lentiviral library
      targeting 100 chromatin factors with 6 guide RNAs per gene. Generated and characterized
      MDA-MB-468 and KOLF2.1J CRISPR lines expressing inducible dCas9. Screens performed in
      MDA-MB-468 cells under 3 conditions (no treatment, paclitaxel, vorinostat) and in
      undifferentiated KOLF2.1J iPSCs using 10x Genomics 3'HT kit. Genome-scale screens mapping
      transcriptional and fitness phenotypes for 11,739 targeted genes.

acquisition_methods:
  - id: cm4ai:acquisition:1
    description: >
      Confocal Microscopy for Subcellular Imaging: High-resolution confocal microscopy of
      immunofluorescence-stained cells capturing four channels: DAPI (nuclei, blue), calreticulin
      antibody (ER, yellow), tubulin antibody (microtubules, red), and antibody against protein of
      interest (green). Images processed using Human Protein Atlas deep learning model to reduce
      dimensionality, producing image embeddings containing information about protein localization.
  - id: cm4ai:acquisition:2
    description: >
      Mass Spectrometry for Protein Interactions: State-of-the-art mass spectrometry-based proteomics
      including AP-MS on endogenously tagged cell lines and SEC-MS for proteome-wide complex mapping.
      PPI networks processed using node2vec deep learning model to reduce dimensionality, producing PPI
      embeddings containing information about protein interactions.
  - id: cm4ai:acquisition:3
    description: >
      Single-Cell RNA Sequencing for Perturbation Mapping: Single-cell RNA sequencing using 10x
      Genomics 3'HT kit to capture transcriptional states following CRISPR perturbations. Generates
      genome-scale perturbation cell atlas mapping transcriptional and fitness phenotypes. Raw
      sequence data deposited to NCBI BioProject/Sequence Read Archive (SRA).
  - id: cm4ai:acquisition:4
    description: >
      MuSIC Pipeline Integration: Multi-Scale Integrated Cell (MuSIC) pipeline integrates PPI
      embeddings and image embeddings using contrastive deep learning to obtain co-embeddings for
      each protein. Community detection performed based on all-by-all similarities of protein pairs
      in co-embedding space, producing hierarchical cell maps as final output. Maps annotated using
      Gene Ontology, Reactome pathways, and large language model approaches.

# Preprocessing, Cleaning, and Labeling
preprocessing_strategies:
  - id: cm4ai:preproc:1
    description: >
      Deep Learning Embedding Generation: PPI networks processed using node2vec deep learning model
      to reduce dimensionality and produce PPI embeddings. IF images processed using Human Protein
      Atlas deep learning model to reduce dimensionality and produce image embeddings. PPI and image
      embeddings integrated to obtain co-embeddings using contrastive deep learning, learning
      co-embeddings such that original embeddings can be reconstructed with minimal information loss.
    preprocessing_details:
      - node2vec deep learning for PPI network dimensionality reduction
      - Human Protein Atlas deep learning model for image embedding
      - Contrastive deep learning for PPI and image embedding integration
      - Co-embedding optimization to minimize information loss
  - id: cm4ai:preproc:2
    description: >
      Hierarchical Community Detection: Community detection performed on co-embedding space using
      multiscale community detection algorithms implemented in Cytoscape. Produces hierarchical
      directed acyclic graphs (DAG) of protein assemblies at multiple resolutions, with 10 layers of
      depth representing communities from large cell compartments to small protein complexes.
    preprocessing_details:
      - All-by-all similarity computation in co-embedding space
      - Multiscale community detection using Cytoscape algorithms
      - Hierarchical structure generation as directed acyclic graphs
      - 10-layer depth hierarchy from compartments to complexes
  - id: cm4ai:preproc:3
    description: >
      Cell Map Annotation: Two-pronged annotation approach: (1) Alignment to known protein function
      and pathway resources including Gene Ontology (GO) and Reactome to determine protein assemblies
      with high overlap with known cell biology, and (2) Large language model (LLM) approach to name
      sets of proteins and assign name confidence scores.
    preprocessing_details:
      - Alignment to Gene Ontology for functional annotation
      - Alignment to Reactome pathways for pathway annotation
      - LLM-based naming of protein assemblies with confidence scores
      - Validation of assemblies against known cell biology
  - id: cm4ai:preproc:4
    description: >
      Quality Control for Imaging Data: Standardized automated fixation and permeabilization
      protocols using pipetting robot. Consistent staining protocols across conditions using Human
      Protein Atlas antibodies. Quality control of imaging data before release and processing
      through MuSIC pipeline.
    preprocessing_details:
      - Automated protocols for consistency
      - Standardized staining across all conditions
      - Quality checks before downstream processing
      - Release only after quality validation
  - id: cm4ai:preproc:5
    description: >
      Quality Control for Mass Spectrometry Data: Quality control and validation of AP-MS and
      SEC-MS data before public release. Mass spectrometry data for human iPSCs deposited to
      MassIVE Repository, and data for human cancer cells also deposited to MassIVE Repository.
    preprocessing_details:
      - QC procedures for AP-MS data
      - QC procedures for SEC-MS data
      - Validation before public release
      - Deposition to MassIVE repositories with persistent identifiers
  - id: cm4ai:preproc:6
    description: >
      Integrative Structure Modeling: Bioinformatics pipeline for annotating MuSIC communities by
      available structural information about community members and their interactions. Structural
      information includes PDB, AlphaFold Protein Structure Database, crosslinking mass spectrometry,
      and prediction of disordered sequence segments. Communities ranked by structural information
      amount as proxy for integrative modeling feasibility. Modeling protocol scripted using Python
      Modeling Interface package based on Integrative Modeling Platform (IMP) version 2.18.
    preprocessing_details:
      - PDB structural information integration
      - AlphaFoldDB structure integration
      - Crosslinking mass spectrometry data incorporation
      - Disordered region prediction using sequence analysis
      - Feasibility ranking for structure modeling
      - IMP-based structural model generation

cleaning_strategies:
  - id: cm4ai:cleaning:1
    description: >
      FAIRSCAPE AI-Readiness Packaging: All datasets packaged using FAIRSCAPE framework which creates
      RO-Crate packages with datasets, metadata, provenance graphs, and software. FAIRSCAPE-CLI
      validates inputs and creates output RO-Crate packages. FAIRSCAPE server assigns persistent
      resolvable globally unique identifiers (ARK scheme), decomposes RO-Crates into components, and
      computes end-to-end provenance entailments using EVI Evidence Graph Ontology.
    cleaning_details:
      - RO-Crate packaging with metadata and provenance
      - JSON-Schema validation of all datasets
      - ARK persistent identifier assignment
      - Provenance graph computation and linking
      - Machine-readable metadata in JSON-LD with Schema.org, EVI vocabularies
  - id: cm4ai:cleaning:2
    description: >
      Data Standard Mapping: Data mapped to applicable standards and ontologies including Gene
      Ontology (GO), Reactome, Protein Data Bank (PDB), AlphaFold Protein Structure Database,
      Schema.org, and EVI Evidence Graph Ontology. Keywords mapped to controlled vocabularies from
      NCI Thesaurus, BioAssay Ontology, Cell Ontology, CHEBI, EFO, and other ontologies.
    cleaning_details:
      - GO mapping for protein functions
      - Reactome mapping for pathways
      - PDB and AlphaFold for structural information
      - Schema.org and EVI for metadata
      - Controlled vocabulary mapping for all keywords
      - NCI Thesaurus, BAO, Cell Ontology, CHEBI ontology mappings

# Uses
intended_uses:
  - id: cm4ai:use:1
    description: >
      AI Model Training for Functional Genomics: Primary intended use is training and development
      of artificial intelligence and machine learning models for functional genomics research.
      AI-ready datasets with full provenance, metadata, and validation enable immediate use in
      AI/ML pipelines without reformatting.
  - id: cm4ai:use:2
    description: >
      Visible Neural Network Development: Development of visible neural networks (VNNs) that use
      hierarchical cell maps as interpretable model architectures. Unlike black box models, VNNs
      built on cell maps allow interrogation of how protein assemblies affect cell-level phenotypes,
      enabling interpretation of genetic variants and mutations in the context of cellular mechanisms.
  - id: cm4ai:use:3
    description: >
      Genotype-Phenotype Mapping Research: Research into interpretable genotype-phenotype learning
      using multi-scale cell maps. Enables understanding of mechanisms by which genotypes translate
      to phenotypes, supporting precision medicine applications and genomic variant interpretation.
  - id: cm4ai:use:4
    description: >
      Drug Response and Synergy Prediction: Analysis of cellular responses to drug treatments
      (paclitaxel, vorinostat) to predict drug response and synergy. Cell maps under different
      treatment conditions enable visible machine learning for drug discovery and personalized
      medicine applications.
  - id: cm4ai:use:5
    description: >
      Disease Mechanism Research: Study of disease mechanisms in cancer, neuropsychiatric disorders,
      and cardiac disorders through analysis of chromatin modifiers and metabolic enzymes in
      disease-relevant cell contexts. Supports understanding of disease pathways and identification
      of therapeutic targets.
  - id: cm4ai:use:6
    description: >
      Structural and Functional Genomics: Use as foundation for integrative structure modeling of
      protein communities, combining multimodal cell maps with PDB, AlphaFoldDB, and crosslinking
      mass spectrometry data to determine structural models of protein assemblies, as demonstrated
      in Nature publication (Schaffer, Hu et al., April 2025).
  - id: cm4ai:use:7
    description: >
      Model for AI-Ready Biomedical Dataset Development: Use as exemplar for future AI-ready
      biomedical dataset development, demonstrating best practices in FAIR principles implementation,
      provenance tracking, ethical data governance, and AI-readiness packaging using RO-Crate
      and FAIRSCAPE frameworks.

discouraged_uses:
  - id: cm4ai:discouraged:1
    description: >
      Clinical Decision-Making Without Validation: Laboratory data from cell lines are not to be
      used in clinical decision-making or any context involving patient care without appropriate
      regulatory oversight and approval. Requires domain expertise and clinical validation before
      any clinical applications. Explicitly prohibited per dataset terms.
  - id: cm4ai:discouraged:2
    description: >
      Use During Incomplete Data Release: This is an interim/beta release with data not yet in
      completed final form. Some datasets are under temporary pre-publication embargo, protein
      interrogation sets incompletely overlap across data modalities, and computed cell maps not
      yet included in releases. Full integration and final cell maps will be available in future
      releases through November 2026.
  - id: cm4ai:discouraged:3
    description: >
      Analysis Without Domain Expertise: Datasets require domain expertise for meaningful analysis
      and interpretation. Current release is most suitable for bioinformatics analysis of individual
      datasets. Not suitable for use without understanding of functional genomics, proteomics, cell
      biology, and AI/ML methodologies. Training resources available through CM4AI Skills and
      Workforce Development module.

# Distribution
license: CC BY-NC-SA 4.0
license_and_use_terms:
  id: cm4ai:license:1
  description: >
    Data licensed for reuse under Creative Commons Attribution-NonCommercial-ShareAlike 4.0
    International license (https://creativecommons.org/licenses/by-nc-sa/4.0/). Attribution is
    required to the copyright holders and the Cell Maps for Artificial Intelligence project.
    Any publications referencing this data or derived products should cite the Nature article
    (Schaffer LV, Hu M, et al. Multimodal cell maps as a foundation for structural and functional
    genomics. Nature. 2025. doi:10.1038/s41586-025-08878-3) and the bioRxiv preprint (Clark T,
    et al. Cell Maps for Artificial Intelligence: AI-Ready Maps of Human Cell Architecture from
    Disease-Relevant Cell Lines. BioRXiv, May 2024. doi:10.1101/2024.05.21.589311) and directly
    cite the data collection. Commercial use requires separate license negotiation with copyright
    holder (UCSD, Stanford, and/or UCSF depending upon specific data package). A Data Access
    Committee (led by Jillian Parker) supervises ethical matters related to dataset distribution
    and potential dual licensing for commercial use. Copyright (c) 2025 The Regents of the
    University of California except where otherwise noted. Spatial proteomics raw image data is
    copyright (c) 2025 The Board of Trustees of the Leland Stanford Junior University.
  license_terms:
    - Attribution required to copyright holders and authors
    - Non-commercial use only (commercial requires separate license)
    - Share-alike - derivative works must use same license
    - Must cite Nature publication and bioRxiv preprint and data collection DOI
    - Data Access Committee oversight for ethical distribution

distribution_formats:
  - id: cm4ai:format:1
    description: >
      RO-Crate Packages with Provenance: All CM4AI output data packaged as Research Object Crate
      (RO-Crate) packages containing datasets, metadata, provenance graphs, and software (or
      resolvable references). RO-Crates assigned persistent globally unique identifiers (ARK scheme,
      DOIs planned for publishable work) that resolve to machine- and human-readable landing pages
      with metadata in JSON-LD using Schema.org and EVI vocabularies.
    access_urls:
      - https://doi.org/10.18130/V3/DXWOS5
      - https://doi.org/10.18130/V3/B35XWX
      - https://doi.org/10.18130/V3/F3TD5R
      - https://doi.org/10.18130/V3/K7TGEM
      - https://www.cm4ai.org
  - id: cm4ai:format:2
    description: >
      Mass Spectrometry Data in MassIVE: Mass spectrometry data deposited to MassIVE Repository
      (Proteomics community-supported repository). Separate depositions for human iPSC data and
      human cancer cell data (SEC-MS for KOLF2.1J iPSCs and MDA-MB-468 cancer cells). Data will
      be uploaded to PRIDE when available.
    access_urls:
      - MassIVE Repository (human iPSCs - SEC-MS)
      - MassIVE Repository (human cancer cells - SEC-MS)
  - id: cm4ai:format:3
    description: >
      Sequence Data in NCBI SRA: Raw sequence data from CRISPR perturbation screens deposited to
      NCBI BioProject/Sequence Read Archive (SRA). Genome-scale CRISPRi perturbation cell atlas
      raw sequences and processed data available.
    access_urls:
      - NCBI BioProject
      - Sequence Read Archive (SRA)
  - id: cm4ai:format:4
    description: >
      Hierarchical Cell Maps in NDEx: Cell maps shared via Network Data Exchange (NDEx) for
      visualization and access. Maps can be visualized in web browser or accessed via tools such
      as Cytoscape, HiView, and Python ndex2 library.
    access_urls:
      - https://www.ndexbio.org
  - id: cm4ai:format:5
    description: >
      University of Virginia Dataverse: Archived RO-Crates available in University of Virginia's
      LibraData data archive (instance of Harvard's Dataverse, an NIH-approved generalist
      repository). Long-term preservation supported by committed institutional funds. Quarterly
      updates through November 2026.
    access_urls:
      - https://doi.org/10.18130/V3/DXWOS5
      - LibraData University of Virginia

