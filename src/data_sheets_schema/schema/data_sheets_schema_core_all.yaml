        alias: regulatory_restrictions
        owner: ExportControlRegulatoryRestrictions
        domain_of:
        - ExportControlRegulatoryRestrictions
        - CoreDataset
        range: string
        multivalued: true
      hipaa_compliant:
        name: hipaa_compliant
        description: Indicates compliance with the Health Insurance Portability and
          Accountability Act (HIPAA). HIPAA applies to protected health information
          in the United States.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/data-governance
        slot_uri: d4d:hipaaCompliant
        alias: hipaa_compliant
