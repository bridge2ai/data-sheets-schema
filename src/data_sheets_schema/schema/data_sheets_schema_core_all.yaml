subsets:
  Motivation:
    name: Motivation
    description: The questions in this section are primarily intended to encourage
      dataset creators to clearly articulate their reasons for creating the dataset
      and to promote transparency about funding interests. The latter may be particularly
      relevant for datasets created for research purposes.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
  Composition:
    name: Composition
    description: The questions in this section are intended to provide dataset consumers
      with the information they need to make informed decisions about using the dataset
      for their chosen tasks. Some of the questions are designed to elicit information
      about compliance with applicable data protection regulations and privacy requirements.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
  Collection:
    name: Collection
    description: The questions in this section are designed to elicit information
      that may help researchers and practitioners to create alternative datasets with
      similar characteristics.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
  Preprocessing-Cleaning-Labeling:
    name: Preprocessing-Cleaning-Labeling
    description: The questions in this section are intended to provide dataset consumers
      with the information they need to determine whether the "raw" data has been
      processed in ways that are compatible with their chosen tasks.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
  Uses:
    name: Uses
    description: The questions in this section are intended to encourage dataset creators
      to reflect on the tasks for which the dataset should and should not be used.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
  Distribution:
    name: Distribution
    description: The questions in this section pertain to dataset distribution.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
  Maintenance:
    name: Maintenance
    description: The questions in this section are intended to encourage dataset creators
      to plan for dataset maintenance and communicate this plan to dataset consumers.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
  Ethics:
    name: Ethics
    description: The questions in this section address ethical and data-protection
      concerns, including review by institutional bodies, consent and notification
      to data subjects, and potential impacts on data-protection rights.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
  DataGovernance:
    name: DataGovernance
    description: 'The questions in this section relate to how the dataset is governed:
      how it is distributed, licensed, and maintained over time, plus third-party
      restrictions and update policies.'
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
types:
  string:
    name: string
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    base: str
    uri: xsd:string
    repr: str
