        description: The date and time when the resource was created.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        slot_uri: dcterms:created
        alias: created_on
        owner: CoreDataset
        domain_of:
        - Information
        - CoreDatasetCollection
        range: datetime
      doi:
        name: doi
        description: Digital Object Identifier (DOI) in format 10.xxxx/xxxxx providing
          persistent identification (e.g., '10.1038/s41586-020-2649-2', '10.5281/zenodo.1234567').
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        exact_mappings:
        - schema:identifier
        broad_mappings:
        - dcterms:identifier
        slot_uri: d4d:doiIdentifier
        alias: doi
        owner: CoreDataset
        domain_of:
        - Information
        - CoreDatasetCollection
        range: string
        pattern: 10\.\d{4,}\/.+
      download_url:
        name: download_url
        description: URL from which the data can be downloaded. This is not the same
          as the landing page, which is a page that describes the dataset. Rather,
          this URL points directly to the data itself.
