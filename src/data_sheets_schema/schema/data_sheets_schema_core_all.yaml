  ExportControlRegulatoryRestrictions:
    name: ExportControlRegulatoryRestrictions
    description: 'Do any export controls or other regulatory restrictions apply to
      the dataset or to individual instances? Includes compliance tracking for regulations
      like HIPAA and other US regulations. If so, please describe these restrictions
      and provide a link or copy of any supporting documentation. Maps to DUO terms
      related to ethics approval, geographic restrictions, and institutional requirements.

      '
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    is_a: DatasetProperty
    attributes:
      regulatory_restrictions:
        name: regulatory_restrictions
        description: One or more export controls or regulatory restrictions applicable
          to the dataset (e.g., HIPAA, ITAR, GDPR).
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/data-governance
