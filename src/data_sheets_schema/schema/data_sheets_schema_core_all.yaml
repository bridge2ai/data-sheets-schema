    name: CRediTRoleEnum
    description: Contributor roles based on the CRediT (Contributor Roles Taxonomy).
      See https://credit.niso.org/
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      conceptualization:
        text: conceptualization
        description: Ideas; formulation or evolution of overarching research goals
          and aims.
      methodology:
        text: methodology
        description: Development or design of methodology; creation of models.
      software:
        text: software
        description: Programming, software development; designing computer programs.
      validation:
        text: validation
        description: Verification of the overall replication/reproducibility of results.
      formal_analysis:
        text: formal_analysis
        description: Application of statistical, mathematical, or other formal techniques.
      investigation:
        text: investigation
        description: Conducting the research and investigation process.
      resources:
        text: resources
        description: Provision of study materials, reagents, patients, laboratory
          samples, etc.
      data_curation:
        text: data_curation
        description: Management activities to annotate, scrub data and maintain research
          data.
      writing_original_draft:
        text: writing_original_draft
        description: Preparation, creation and/or presentation of the published work.
      writing_review_editing:
        text: writing_review_editing
        description: Critical review, commentary or revision of the work.
      visualization:
        text: visualization
        description: Preparation, creation and/or presentation of visualizations/data
          presentation.
      supervision:
        text: supervision
        description: Oversight and leadership responsibility for the research activity.
      project_administration:
        text: project_administration
        description: Management and coordination responsibility for the research activity.
      funding_acquisition:
        text: funding_acquisition
        description: Acquisition of the financial support for the project.
  BiasTypeEnum:
    name: BiasTypeEnum
    description: Types of bias that may be present in datasets. Values are mapped
      to the Artificial Intelligence Ontology (AIO) bias taxonomy from BioPortal.
      See https://bioportal.bioontology.org/ontologies/AIO
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      selection_bias:
        text: selection_bias
        description: Bias arising from non-random selection of data or participants.
        broad_mappings:
        - AIO:SelectionAndSamplingBias
      measurement_bias:
        text: measurement_bias
        description: Bias in how data is measured or recorded. Occurs when features
          and labels are proxies for desired quantities, potentially leading to differential
          performance.
        meaning: AIO:MeasurementBias
      historical_bias:
        text: historical_bias
        description: Bias reflecting historical inequities or societal biases. Long-standing
          biases encoded in society over time.
        meaning: AIO:HistoricalBias
      representation_bias:
        text: representation_bias
        description: Certain groups are over- or under-represented in the data. Results
          from non-random sampling of subgroups making trends non-generalizable to
          new populations.
        meaning: AIO:RepresentationBias
      aggregation_bias:
        text: aggregation_bias
        description: Bias from inappropriately combining distinct groups. Related
          to making inferences about individuals based on their group membership.
        broad_mappings:
        - AIO:EcologicalFallacyBias
      algorithmic_bias:
        text: algorithmic_bias
        description: Bias introduced or amplified by algorithmic processing. Computational
          bias from data analysis processes and methods.
        broad_mappings:
        - AIO:ProcessingBias
        - AIO:ComputationalBias
      sampling_bias:
        text: sampling_bias
        description: Bias from sampling methodology not representative of the population.
        broad_mappings:
        - AIO:SelectionAndSamplingBias
      annotation_bias:
        text: annotation_bias
        description: Bias introduced during data labeling or annotation. Occurs when
          annotators rely on heuristics or exhibit systematic patterns in labeling.
        broad_mappings:
        - AIO:AnnotatorReportingBias
      confirmation_bias:
        text: confirmation_bias
        description: Bias from seeking data that confirms pre-existing beliefs. Tendency
          to prefer information that confirms existing beliefs, influencing the search
          for, interpretation of, and recall of information.
        meaning: AIO:ConfirmationBias
  LimitationTypeEnum:
    name: LimitationTypeEnum
    description: Types of limitations that may affect dataset use or interpretation.
      Distinct from biases (systematic errors) and anomalies (data quality issues).
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      scope_limitation:
        text: scope_limitation
        description: Dataset does not cover all intended use cases or populations.
          The scope of the dataset is narrower than the intended application domain.
      temporal_limitation:
        text: temporal_limitation
        description: Dataset is limited to specific time periods. Data may not reflect
          current conditions or may not be applicable to other time periods.
      coverage_limitation:
        text: coverage_limitation
        description: Dataset has incomplete coverage of target domain. Missing data
          points, categories, or geographic regions within the intended scope.
      methodological_limitation:
        text: methodological_limitation
        description: Data collection methodology introduces constraints. Limitations
          arising from how data was gathered, measured, or processed.
      representativeness_limitation:
        text: representativeness_limitation
        description: Dataset may not be representative of target population. Sample
          may not accurately reflect the broader population of interest.
      resolution_limitation:
        text: resolution_limitation
        description: Data granularity or resolution is insufficient for some uses.
          Level of detail may not support fine-grained analysis or specific applications.
      integration_limitation:
        text: integration_limitation
        description: Challenges in combining with other data sources. Incompatibilities
          in formats, identifiers, or schemas that hinder data integration.
  VersionTypeEnum:
    name: VersionTypeEnum
    description: Type of version change using semantic versioning principles. See
      https://semver.org/
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      MAJOR:
        text: MAJOR
        description: Incompatible changes, breaking backward compatibility.
      MINOR:
        text: MINOR
        description: Backward-compatible new functionality or enhancements.
      PATCH:
        text: PATCH
        description: Backward-compatible bug fixes or minor corrections.
  CreatorOrMaintainerEnum:
    name: CreatorOrMaintainerEnum
    description: Types of agents (persons or organizations) involved in dataset creation
      or maintenance. Mapped to schema.org organization types.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      data_subject:
        text: data_subject
        description: A person whose information is recorded in the dataset.
      third_party:
        text: third_party
        description: A third party not involved in the direct creation or maintenance.
      researcher:
        text: researcher
        description: A researcher involved in dataset creation or maintenance.
        broad_mappings:
        - schema:Person
      industry:
        text: industry
        description: Industry professional involved in dataset creation or maintenance.
        broad_mappings:
        - schema:Person
      academic_institution:
        text: academic_institution
        description: Academic institution responsible for dataset.
        broad_mappings:
        - schema:EducationalOrganization
      government_agency:
        text: government_agency
        description: Government agency responsible for dataset.
        broad_mappings:
        - schema:GovernmentOrganization
      commercial_entity:
        text: commercial_entity
        description: Commercial entity responsible for dataset.
        broad_mappings:
        - schema:Corporation
      non_profit_organization:
        text: non_profit_organization
        description: Non-profit organization responsible for dataset.
        broad_mappings:
        - schema:Organization
      crowdsourced:
        text: crowdsourced
        description: Dataset created through crowdsourcing efforts with multiple contributors.
      automated_system:
        text: automated_system
        description: Automated system or process responsible for dataset.
      other:
        text: other
        description: Other type of creator or maintainer not listed.
  Boolean:
    name: Boolean
    description: Three-valued boolean logic supporting true, false, and unknown states.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      'true':
        text: 'true'
        description: Affirmative or positive value.
        title: 'True'
      'false':
        text: 'false'
        description: Negative or false value.
        title: 'False'
      unknown:
        text: unknown
        description: Unknown, uncertain, or not applicable value.
        title: Unknown
  DatasetRelationshipTypeEnum:
    name: DatasetRelationshipTypeEnum
    description: Standardized types of relationships between datasets, based on DataCite
      Metadata Schema RelationType controlled vocabulary and Dublin Core relationship
      terms. See https://datacite-metadata-schema.readthedocs.io/ and http://purl.org/dc/terms/
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      derives_from:
        text: derives_from
        description: This dataset is derived from the target dataset through processing,
          analysis, or transformation. Equivalent to DataCite IsDerivedFrom.
        broad_mappings:
        - dcterms:source
      supplements:
        text: supplements
        description: This dataset supplements or adds to the target dataset. Equivalent
          to DataCite IsSupplementTo.
        broad_mappings:
        - dcterms:relation
      is_supplemented_by:
        text: is_supplemented_by
        description: This dataset is supplemented by the target dataset. Equivalent
          to DataCite IsSupplementedBy.
        broad_mappings:
        - dcterms:relation
      is_version_of:
        text: is_version_of
        description: This dataset is a version of the target dataset (e.g., updated,
          corrected, or revised version). Equivalent to DataCite IsVersionOf.
        exact_mappings:
        - dcterms:isVersionOf
      is_new_version_of:
        text: is_new_version_of
        description: This dataset is a new version that replaces or updates the target
          dataset. Equivalent to DataCite IsNewVersionOf.
        exact_mappings:
        - dcterms:isVersionOf
        broad_mappings:
        - dcterms:replaces
      replaces:
        text: replaces
        description: This dataset replaces or supersedes the target dataset. Equivalent
          to DataCite Obsoletes.
        exact_mappings:
        - dcterms:replaces
      is_replaced_by:
        text: is_replaced_by
        description: This dataset is replaced or superseded by the target dataset.
          Equivalent to DataCite IsObsoletedBy.
        exact_mappings:
        - dcterms:isReplacedBy
      is_required_by:
        text: is_required_by
        description: This dataset is required by the target dataset. Equivalent to
          DataCite IsRequiredBy.
        exact_mappings:
        - dcterms:isRequiredBy
      requires:
        text: requires
        description: This dataset requires the target dataset. Equivalent to DataCite
          Requires.
        exact_mappings:
        - dcterms:requires
      is_part_of:
        text: is_part_of
        description: This dataset is part of the target dataset (e.g., subset, component).
          Equivalent to DataCite IsPartOf.
        exact_mappings:
        - dcterms:isPartOf
      has_part:
        text: has_part
        description: This dataset has the target dataset as a part. Equivalent to
          DataCite HasPart.
        exact_mappings:
        - dcterms:hasPart
      is_referenced_by:
        text: is_referenced_by
        description: This dataset is referenced or cited by the target dataset. Equivalent
          to DataCite IsReferencedBy.
        exact_mappings:
        - dcterms:isReferencedBy
      references:
        text: references
        description: This dataset references or cites the target dataset. Equivalent
          to DataCite References.
        exact_mappings:
        - dcterms:references
      is_identical_to:
        text: is_identical_to
        description: This dataset is identical to the target dataset (e.g., mirror,
          copy). Equivalent to DataCite IsIdenticalTo.
        broad_mappings:
        - dcterms:relation
  ComplianceStatusEnum:
    name: ComplianceStatusEnum
    description: Compliance status for regulatory frameworks. Indicates the extent
      to which a dataset complies with specific regulations (e.g., HIPAA, 45 CFR 46).
      These are workflow status values that may evolve as regulations are assessed
      or as the dataset is modified.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      compliant:
        text: compliant
        description: Dataset is compliant with the regulation. All requirements are
          met and documented.
        broad_mappings:
        - dcterms:conformsTo
      partially_compliant:
        text: partially_compliant
        description: Dataset is partially compliant, with known limitations or gaps
          in compliance. Some but not all requirements are met.
        broad_mappings:
        - dcterms:conformsTo
      not_compliant:
        text: not_compliant
        description: Dataset does not comply with the regulation. Significant requirements
          are not met.
      not_applicable:
        text: not_applicable
        description: Regulation does not apply to this dataset based on scope, jurisdiction,
          or subject matter.
      under_review:
        text: under_review
        description: Compliance status is currently under review or assessment. Final
          determination has not been made.
  ConfidentialityLevelEnum:
    name: ConfidentialityLevelEnum
    description: 'Confidentiality classification levels for datasets indicating the
      degree of access restrictions and data sensitivity.

      NOTE: This enum classifies data sensitivity and access control (WHO can access),
      which is orthogonal to DataUsePermissionEnum that specifies use restrictions
      (WHAT authorized users can do with data). ConfidentialityLevelEnum determines
      access requirements, while DataUsePermissionEnum uses DUO terms to specify permitted
      uses once access is granted.'
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      unrestricted:
        text: unrestricted
        description: No confidentiality restrictions. Data is publicly available with
          no access controls required. Equivalent to public or open access data.
      restricted:
        text: restricted
        description: Restricted access requiring approval or registration. Data contains
          sensitive information requiring controlled access. May require account creation,
          data use agreement, or institutional approval.
      confidential:
        text: confidential
        description: Highly confidential with strict access controls. Data contains
          highly sensitive information with significant privacy or security implications.
          Typically requires IRB approval, formal data use agreements, institutional
          authorization, or other formal vetting processes.
  DataUsePermissionEnum:
    name: DataUsePermissionEnum
    description: Data use permissions and restrictions based on the Data Use Ontology
      (DUO). DUO is a standardized ontology for representing data use conditions developed
      by GA4GH. See https://github.com/EBISPOT/DUO
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      no_restriction:
        text: no_restriction
        description: No restriction on data use.
        meaning: DUO:0000004
      general_research_use:
        text: general_research_use
        description: Data available for any research purpose (GRU).
        meaning: DUO:0000042
      health_medical_biomedical_research:
        text: health_medical_biomedical_research
        description: Data limited to health, medical, or biomedical research (HMB).
        meaning: DUO:0000006
      disease_specific_research:
        text: disease_specific_research
        description: Data limited to research on specified disease(s) (DS).
        meaning: DUO:0000007
      population_origins_ancestry_research:
        text: population_origins_ancestry_research
        description: Data limited to population origins or ancestry research (POA).
        meaning: DUO:0000011
      clinical_care_use:
        text: clinical_care_use
        description: Data available for clinical care and applications (CC).
        meaning: DUO:0000043
      no_commercial_use:
        text: no_commercial_use
        description: Data use limited to non-commercial purposes (NCU).
        meaning: DUO:0000046
      non_profit_use_only:
        text: non_profit_use_only
        description: Data use limited to not-for-profit organizations (NPU).
        meaning: DUO:0000045
      non_profit_use_and_non_commercial_use:
        text: non_profit_use_and_non_commercial_use
        description: Data limited to not-for-profit organizations and non-commercial
          use (NPUNCU).
        meaning: DUO:0000018
      no_methods_development:
        text: no_methods_development
        description: Data cannot be used for methods or software development (NMDS).
        meaning: DUO:0000015
      genetic_studies_only:
        text: genetic_studies_only
        description: Data limited to genetic studies only (GSO).
        meaning: DUO:0000016
      ethics_approval_required:
        text: ethics_approval_required
        description: Ethics approval (e.g., IRB/ERB) required for data use (IRB).
        meaning: DUO:0000021
      collaboration_required:
        text: collaboration_required
        description: Collaboration with primary investigator required (COL).
        meaning: DUO:0000020
      publication_required:
        text: publication_required
        description: Results must be published/shared with research community (PUB).
        meaning: DUO:0000019
      geographic_restriction:
        text: geographic_restriction
        description: Data use limited to specific geographic region (GS).
        meaning: DUO:0000022
      institution_specific:
        text: institution_specific
        description: Data use limited to approved institutions (IS).
        meaning: DUO:0000028
      project_specific:
        text: project_specific
        description: Data use limited to approved project(s) (PS).
        meaning: DUO:0000027
      user_specific:
        text: user_specific
        description: Data use limited to approved users (US).
        meaning: DUO:0000026
      time_limit:
        text: time_limit
        description: Data use approved for limited time period (TS).
        meaning: DUO:0000025
      return_to_database:
        text: return_to_database
        description: Derived data must be returned to database/resource (RTN).
        meaning: DUO:0000029
      publication_moratorium:
        text: publication_moratorium
        description: Publication restricted until specified date (MOR).
        meaning: DUO:0000024
      no_population_ancestry_research:
        text: no_population_ancestry_research
        description: Population/ancestry research prohibited (NPOA).
        meaning: DUO:0000044
  VariableTypeEnum:
    name: VariableTypeEnum
    description: Common data types for variables. Values are mapped to schema.org
      DataType vocabulary. See https://schema.org/DataType
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    permissible_values:
      integer:
        text: integer
        description: Whole numbers.
        broad_mappings:
        - schema:Integer
      float:
        text: float
        description: Floating-point numbers (single precision).
        broad_mappings:
        - schema:Float
      double:
        text: double
        description: Double-precision floating-point numbers.
        broad_mappings:
        - schema:Number
      string:
        text: string
        description: Text strings.
        broad_mappings:
        - schema:Text
      boolean:
        text: boolean
        description: True/false values.
        broad_mappings:
        - schema:Boolean
      date:
        text: date
        description: Date values (without time).
        broad_mappings:
        - schema:Date
      datetime:
        text: datetime
        description: Date and time values.
        broad_mappings:
        - schema:DateTime
      categorical:
        text: categorical
        description: Categorical/factor variables with finite set of discrete values.
          Often used for nominal data (unordered categories).
        broad_mappings:
        - schema:Text
      ordinal:
        text: ordinal
        description: Ordered categorical variables where values have a meaningful
          sequence (e.g., low/medium/high, strongly disagree/disagree/agree/strongly
          agree).
        broad_mappings:
        - schema:Text
      identifier:
        text: identifier
        description: Unique identifiers or keys for records or entities.
        broad_mappings:
        - schema:Text
        - schema:identifier
      json:
        text: json
        description: JSON-encoded data structures.
        broad_mappings:
        - schema:Text
      array:
        text: array
        description: Arrays or lists of values. May contain elements of the same or
          different types.
        broad_mappings:
        - schema:ItemList
      object:
        text: object
        description: Complex structured objects or nested data structures.
        broad_mappings:
        - schema:StructuredValue
slots:
  title:
    name: title
    description: The official title of the element.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: dcterms:title
    domain_of:
    - Information
    - CoreDatasetCollection
  language:
    name: language
    description: Language in which the information is expressed.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:inLanguage
    slot_uri: dcterms:language
    domain_of:
    - Information
    - CoreDatasetCollection
  publisher:
    name: publisher
    annotations:
      d4d:docExample:
        tag: d4d:docExample
        value: 'ror:04t3en479  # use a ROR ID, DOI, or URL — not a plain name'
    description: The organization or entity responsible for making the resource available.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: dcterms:publisher
    domain_of:
    - Information
    - CoreDatasetCollection
    range: uriorcurie
  issued:
    name: issued
    description: Date of formal issuance or publication of the resource.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: dcterms:issued
    domain_of:
    - Information
    - CoreDatasetCollection
    range: datetime
  page:
    name: page
    description: A landing page or web page providing access to or information about
      the resource.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: dcat:landingPage
    domain_of:
    - Information
    - CoreDatasetCollection
  dialect:
    name: dialect
    description: Specific format dialect or variation (e.g., CSV dialect, JSON-LD
      profile).
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: schema:encodingFormat
  bytes:
    name: bytes
    description: Size of the data in bytes.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: dcat:byteSize
    domain_of:
    - CoreDistribution
    range: integer
  path:
    name: path
    description: The file path or URL where the content is located.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: schema:contentUrl
    domain_of:
    - CoreDistribution
  download_url:
    name: download_url
    description: URL from which the data can be downloaded. This is not the same as
      the landing page, which is a page that describes the dataset. Rather, this URL
      points directly to the data itself.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:url
    slot_uri: dcat:downloadURL
    domain_of:
    - Information
    - CoreDatasetCollection
    range: uri
  format:
    name: format
    description: The file format, physical medium, or dimensions of a resource. This
      should be a file extension or MIME type.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: dcterms:format
    domain_of:
    - CoreDistribution
    range: FormatEnum
  encoding:
    name: encoding
    description: The character encoding of the data.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: d4d:characterEncoding
    domain_of:
    - CoreDistribution
    range: EncodingEnum
  compression:
    name: compression
    description: Compression format used, if any (e.g., gzip, bzip2, zip).
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: dcat:compressFormat
    domain_of:
    - Information
    - CoreDistribution
    - CoreDatasetCollection
    range: CompressionEnum
  media_type:
    name: media_type
    description: The media type of the data. This should be a MIME type.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:encodingFormat
    slot_uri: dcat:mediaType
    domain_of:
    - CoreDistribution
    range: MediaTypeEnum
  hash:
    name: hash
    description: 'Cryptographic hash value of the data for integrity verification
      (e.g., SHA-256: ''e3b0c44298fc1c149afb...'', MD5: ''d41d8cd98f00b204e9800998ecf8427e'').'
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    broad_mappings:
    - dcterms:identifier
    slot_uri: d4d:hashValue
    domain_of:
    - CoreDistribution
  md5:
    name: md5
    description: MD5 hash value of the data (128-bit cryptographic hash).
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    broad_mappings:
    - dcterms:identifier
    slot_uri: d4d:md5Checksum
    domain_of:
    - CoreDistribution
  sha256:
    name: sha256
    description: SHA-256 hash value of the data (256-bit cryptographic hash, recommended).
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: schema:sha256
    domain_of:
    - CoreDistribution
  conforms_to:
    name: conforms_to
    description: An established standard, specification, or schema to which the resource
      conforms.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    slot_uri: dcterms:conformsTo
    domain_of:
    - Information
    - CoreDatasetCollection
  conforms_to_schema:
    name: conforms_to_schema
    description: The schema or data model to which the resource conforms.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    broad_mappings:
    - dcterms:conformsTo
    slot_uri: d4d:conformsToSchema
    domain_of:
    - Information
    - CoreDatasetCollection
  conforms_to_class:
    name: conforms_to_class
    description: The specific class or type within a schema to which the resource
      conforms.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    broad_mappings:
    - dcterms:conformsTo
    slot_uri: d4d:conformsToClass
    domain_of:
    - Information
    - CoreDatasetCollection
  license:
    name: license
    description: The legal license under which the resource is made available (e.g.,
      "MIT", "CC-BY-4.0").
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
