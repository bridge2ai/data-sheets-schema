  EthicalReview:
    name: EthicalReview
    description: 'Were any ethical or compliance review processes conducted (e.g.,
      by an institutional review board)? If so, please provide a description of these
      review processes, including the frequency of review and documentation of outcomes,
      as well as a link or other access point to any supporting documentation.

      '
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    is_a: DatasetProperty
    attributes:
      contact_person:
        name: contact_person
        description: Contact person for questions about ethical review. Provides structured
          contact information including name, email, affiliation, and optional ORCID.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/ethics
        broad_mappings:
        - schema:contactPoint
        slot_uri: d4d:ethicsContactPoint
        alias: contact_person
        owner: EthicalReview
        domain_of:
        - EthicalReview
        - LicenseAndUseTerms
        range: Person
      reviewing_organization:
        name: reviewing_organization
        description: Organization that conducted the ethical review (e.g., Institutional
          Review Board, Ethics Committee, Research Ethics Board). Provides information
          about the body responsible for ethical oversight.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/ethics
        exact_mappings:
        - schema:provider
        slot_uri: schema:provider
        alias: reviewing_organization
        owner: EthicalReview
        domain_of:
        - EthicalReview
        range: Organization
      review_details:
        name: review_details
        description: 'Free-text description of the ethical review process, board decisions,
          outcomes, and any supporting documentation (e.g., IRB approval number, ethics
          committee name).

