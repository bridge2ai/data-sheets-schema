  Person:
    name: Person
    description: An individual human being. This class represents a person in the
      context of a specific dataset. Attributes like affiliation and email represent
      the person's current or most relevant contact information for this dataset.
      For stable cross-dataset identification, use the ORCID field. Note that contributor
      roles (CRediT) are specified in the usage context (e.g., Creator class) rather
      than on the Person directly, since roles vary by dataset.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    is_a: NamedThing
    attributes:
      affiliation:
        name: affiliation
        description: The organization(s) to which the person belongs in the context
          of this dataset. May vary across datasets; multivalued to support multiple
          affiliations.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/base
        slot_uri: schema:affiliation
        alias: affiliation
        owner: Person
        domain_of:
        - Person
        range: Organization
        multivalued: true
      email:
        name: email
        description: The email address of the person. Represents current/preferred
          contact information in the context of this dataset.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/base
        slot_uri: schema:email
        alias: email
        owner: Person
        domain_of:
        - Person
        range: string
      orcid:
        name: orcid
        annotations:
          d4d:docExample:
            tag: d4d:docExample
            value: 0000-0001-2345-6789
        description: 'ORCID (Open Researcher and Contributor ID) - a persistent digital
          identifier for researchers. Format: 0000-0000-0000-0000 (16 digits in groups
          of 4). Use this for stable cross-dataset identification.'
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/base
        broad_mappings:
        - schema:identifier
        slot_uri: d4d:orcidIdentifier
        alias: orcid
        owner: Person
        domain_of:
        - Person
        range: string
        pattern: ^\d{4}-\d{4}-\d{4}-\d{3}[0-9X]$
      id:
        name: id
        annotations:
          d4d:docExample:
            tag: d4d:docExample
            value: https://example.org/dataset/my-dataset-001
