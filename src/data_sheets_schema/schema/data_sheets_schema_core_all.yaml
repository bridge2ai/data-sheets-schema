    attributes:
      compression:
        name: compression
        description: Compression format used, if any (e.g., gzip, bzip2, zip).
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        slot_uri: dcat:compressFormat
        alias: compression
        owner: Information
        domain_of:
        - Information
        - CoreDistribution
        - CoreDatasetCollection
        range: CompressionEnum
      conforms_to:
        name: conforms_to
        description: An established standard, specification, or schema to which the
          resource conforms.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        slot_uri: dcterms:conformsTo
        alias: conforms_to
        owner: Information
        domain_of:
        - Information
        - CoreDatasetCollection
        range: string
      conforms_to_class:
        name: conforms_to_class
        description: The specific class or type within a schema to which the resource
          conforms.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        broad_mappings:
        - dcterms:conformsTo
        slot_uri: d4d:conformsToClass
        alias: conforms_to_class
        owner: Information
        domain_of:
        - Information
        - CoreDatasetCollection
        range: string
      conforms_to_schema:
        name: conforms_to_schema
        description: The schema or data model to which the resource conforms.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        broad_mappings:
        - dcterms:conformsTo
        slot_uri: d4d:conformsToSchema
        alias: conforms_to_schema
        owner: Information
        domain_of:
        - Information
        - CoreDatasetCollection
        range: string
      created_by:
        name: created_by
        description: The person or organization primarily responsible for creating
          the resource.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        slot_uri: dcterms:creator
        alias: created_by
        owner: Information
        domain_of:
        - Information
        - CoreDatasetCollection
        range: string
      created_on:
        name: created_on
        description: The date and time when the resource was created.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        slot_uri: dcterms:created
        alias: created_on
        owner: Information
        domain_of:
        - Information
        - CoreDatasetCollection
        range: datetime
      doi:
        name: doi
        description: Digital Object Identifier (DOI) in format 10.xxxx/xxxxx providing
          persistent identification (e.g., '10.1038/s41586-020-2649-2', '10.5281/zenodo.1234567').
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
        exact_mappings:
        - schema:identifier
        broad_mappings:
        - dcterms:identifier
        slot_uri: d4d:doiIdentifier
        alias: doi
        owner: Information
        domain_of:
        - Information
