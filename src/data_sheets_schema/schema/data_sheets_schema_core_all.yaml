  VariableMetadata:
    name: VariableMetadata
    description: Metadata describing an individual variable, field, or column in a
      dataset. Variables may represent measurements, observations, derived values,
      or categorical attributes.
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    exact_mappings:
    - schema:PropertyValue
    is_a: DatasetProperty
    attributes:
      variable_name:
        name: variable_name
        description: The name or identifier of the variable as it appears in the data
          files.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        broad_mappings:
        - schema:name
        - schema:identifier
        slot_uri: d4d:variableName
        alias: variable_name
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: string
        required: true
      data_type:
        name: data_type
        description: The data type of the variable (e.g., integer, float, string,
          boolean, date, categorical). Use standard type names when possible.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        exact_mappings:
        - schema:DataType
        slot_uri: schema:DataType
        alias: data_type
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: VariableTypeEnum
      unit:
        name: unit
        description: 'The unit of measurement for the variable, preferably using QUDT
          units (http://qudt.org/vocab/unit/). Examples: qudt:Kilogram, qudt:Meter,
          qudt:DegreeCelsius.'
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        exact_mappings:
        - qudt:hasUnit
        - schema:unitCode
        slot_uri: qudt:unit
        alias: unit
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: uriorcurie
      missing_value_code:
        name: missing_value_code
        description: 'Code(s) used to represent missing values for this variable.
          Examples: "NA", "-999", "null", "". Multiple codes may be specified.'
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        slot_uri: d4d:missingValueCode
        alias: missing_value_code
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: string
        multivalued: true
      minimum_value:
        name: minimum_value
        annotations:
          d4d:docExample:
            tag: d4d:docExample
            value: '0.0'
        description: The minimum value that the variable can take. Applicable to numeric
          variables.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        slot_uri: schema:minValue
        alias: minimum_value
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: float
      maximum_value:
        name: maximum_value
        annotations:
          d4d:docExample:
            tag: d4d:docExample
            value: '100.0'
        description: The maximum value that the variable can take. Applicable to numeric
          variables.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        slot_uri: schema:maxValue
        alias: maximum_value
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: float
      categories:
        name: categories
        description: One or more permitted categories or values for a categorical
          variable. Each entry should describe a possible value and its meaning.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        slot_uri: schema:valueReference
        alias: categories
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: string
        multivalued: true
      examples:
        name: examples
        description: Example values for this variable to illustrate typical data.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        slot_uri: skos:example
        alias: examples
        owner: VariableMetadata
        domain_of:
        - ExistingUse
        - IntendedUse
        - VariableMetadata
        range: string
        multivalued: true
      is_identifier:
        name: is_identifier
        description: Indicates whether this variable serves as a unique identifier
          or key for records in the dataset.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        slot_uri: d4d:isIdentifier
        alias: is_identifier
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: boolean
      is_sensitive:
        name: is_sensitive
        description: Indicates whether this variable contains sensitive information
          (e.g., personal data, protected health information).
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
        slot_uri: d4d:isSensitive
        alias: is_sensitive
        owner: VariableMetadata
        domain_of:
        - VariableMetadata
        range: boolean
      precision:
        name: precision
        annotations:
          d4d:docExample:
            tag: d4d:docExample
            value: 2 (two decimal places, e.g., 3.14)
        description: The precision or number of decimal places for numeric variables.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/variables
