      schema. Includes the 95 fields from the curated SKOS alignment with schema.org,
      RAI, EVI, and DCAT, enabling cross-system interoperability.  Fields not in the
      exchange layer mapping (e.g., file_collections, relationships, splits, consent
      workflow) are intentionally excluded; use the full data_sheets_schema.yaml for
      those.
