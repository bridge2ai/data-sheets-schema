  InstanceAcquisition:
    name: InstanceAcquisition
    description: 'Describes how data associated with each instance was acquired (e.g.,
      directly observed, reported by subjects, inferred).

      '
    from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core-schema
    is_a: DatasetProperty
    attributes:
      was_directly_observed:
        name: was_directly_observed
        description: True if the data was directly observed by a researcher or instrument;
          false if it was obtained through other means (e.g., reported, inferred).
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/collection
        slot_uri: d4d:wasDirectlyObserved
        alias: was_directly_observed
        owner: InstanceAcquisition
        domain_of:
        - InstanceAcquisition
        range: boolean
      was_reported_by_subjects:
        name: was_reported_by_subjects
        description: True if the data was self-reported directly by the subjects themselves
          (e.g., survey responses, questionnaires); false otherwise.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/collection
        slot_uri: d4d:wasReportedBySubjects
        alias: was_reported_by_subjects
        owner: InstanceAcquisition
        domain_of:
        - InstanceAcquisition
        range: boolean
      was_inferred_derived:
        name: was_inferred_derived
        description: True if the data was computationally inferred or derived from
          other data (e.g., model outputs, imputed values); false otherwise.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/collection
        slot_uri: d4d:wasInferred
