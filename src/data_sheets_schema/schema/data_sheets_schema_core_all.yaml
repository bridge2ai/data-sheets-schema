        slot_uri: d4d:dataProtectionImpacts
        alias: data_protection_impacts
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: DataProtectionImpact
        multivalued: true
        inlined_as_list: true
      human_subject_research:
        name: human_subject_research
        description: Information about whether dataset involves human subjects research.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - d4d:humanSubject
        slot_uri: d4d:humanSubjectResearch
        alias: human_subject_research
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: HumanSubjectResearch
        inlined: true
      informed_consent:
        name: informed_consent
        description: Details about informed consent procedures.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - d4d:informedConsent
        slot_uri: d4d:informedConsent
        alias: informed_consent
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: InformedConsent
        multivalued: true
        inlined_as_list: true
      at_risk_populations:
        name: at_risk_populations
        description: Information about protections for at-risk populations.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - d4d:atRiskPopulations
        slot_uri: d4d:atRiskPopulations
        alias: at_risk_populations
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: AtRiskPopulations
        inlined: true
      license_and_use_terms:
        name: license_and_use_terms
        description: License and usage terms governing dataset access and use.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        slot_uri: schema:license
        alias: license_and_use_terms
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: LicenseAndUseTerms
        inlined: true
      ip_restrictions:
        name: ip_restrictions
        description: Intellectual property restrictions on dataset use or redistribution.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - schema:conditionsOfAccess
        slot_uri: d4d:ipRestrictions
        alias: ip_restrictions
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: IPRestrictions
        inlined: true
      regulatory_restrictions:
        name: regulatory_restrictions
        description: Regulatory and export control restrictions applicable to the
          dataset.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - schema:conditionsOfAccess
        slot_uri: d4d:regulatoryRestrictions
        alias: regulatory_restrictions
        owner: CoreDataset
        domain_of:
        - ExportControlRegulatoryRestrictions
        - CoreDataset
        range: ExportControlRegulatoryRestrictions
        inlined: true
      is_deidentified:
        name: is_deidentified
        description: De-identification status and procedures applied to the dataset.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - rai:confidentialityLevel
        slot_uri: d4d:isDeidentified
        alias: is_deidentified
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: Deidentification
        inlined: true
      is_tabular:
        name: is_tabular
        description: Whether the dataset is in tabular format (rows and columns).
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - schema:encodingFormat
        slot_uri: d4d:isTabular
        alias: is_tabular
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: boolean
      dialect:
        name: dialect
        description: Format dialect or variation describing structural details such
          as CSV delimiters, header presence, and quote characters. Maps to the exchange
          layer as format + schema (headers T/F, separator).
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - schema:encodingFormat
        slot_uri: schema:encodingFormat
        alias: dialect
        owner: CoreDataset
        domain_of:
        - CoreDataset
        range: FormatDialect
        inlined: true
      external_resources:
        name: external_resources
        description: External resources referenced at the dataset level.
        from_schema: https://w3id.org/bridge2ai/data-sheets-schema/core
        broad_mappings:
        - schema:relatedLink
        slot_uri: schema:relatedLink
        alias: external_resources
        owner: CoreDataset
        domain_of:
        - ExternalResource
        - CoreDataset
        range: ExternalResource
        multivalued: true
        inlined_as_list: true
      resources:
