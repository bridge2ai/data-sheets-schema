id: "https://w3id.org/bridge2ai/data-sheets-schema/maintenance"
name: "data-sheets-schema-maintenance"
title: "Datasheets for Datasets – Maintenance Module"
description: >
  Subschema for maintenance-related information in Datasheets for Datasets.
  The questions in this section are intended to encourage dataset creators to
  plan for dataset maintenance and communicate this plan to dataset consumers.
annotations:
  "d4d:section_question": "Who will be supporting, hosting, or maintaining the dataset?"
license: MIT
see_also:
  - "https://bridge2ai.github.io/data-sheets-schema"


imports:
  - D4D_Base_import


# Subsets are defined in the main schema


prefixes:
  d4d: "https://w3id.org/bridge2ai/data-sheets-schema/"
  linkml: "https://w3id.org/linkml/"
  d4dmaintenance: "https://w3id.org/bridge2ai/data-sheets-schema/maintenance#"
  schema: "http://schema.org/"
  dcterms: "http://purl.org/dc/terms/"


default_prefix: "d4dmaintenance"


# ------------------------------------------------------------------------------
# Classes
# ------------------------------------------------------------------------------


classes:


  Maintainer:
    description: >
      Who will be supporting/hosting/maintaining the dataset?
    is_a: DatasetProperty
    attributes:
      role:
        description: >
          Role of the maintainer (e.g., researcher, platform, organization).
        range: CreatorOrMaintainerEnum
        slot_uri: schema:maintainer
      maintainer_details:
        description: >
          Free-text description of the organization, team, or individual responsible for
          maintaining the dataset, including contact information and hosting arrangements.
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "AI-READI Data Coordinating Center, University of Washington"


  Erratum:
    description: >
      Is there an erratum? If so, please provide a link or other access point.
    is_a: DatasetProperty
    attributes:
      erratum_url:
        description: "URL or access point for the erratum."
        slot_uri: d4d:erratumURL
        range: uri
        annotations:
          "d4d:docExample": "https://example.org/dataset/errata/2024-01-15"
      erratum_details:
        description: >
          Free-text description of the error, its scope, the affected data or records,
          and the correction applied.
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "v1.0.1: Corrected mislabeled CGM device serial numbers for 12 participants"


  UpdatePlan:
    description: >
      Will the dataset be updated (e.g., to correct labeling errors, add new
      instances, delete instances)? If so, how often, by whom, and how will
      these updates be communicated?
    is_a: DatasetProperty
    exact_mappings:
      - rai:dataReleaseMaintenancePlan
    attributes:
      frequency:
        description: "How often updates are planned (e.g., quarterly, annually)."
        slot_uri: d4d:frequency
        range: string
        annotations:
          "d4d:docExample": "Quarterly"
      update_details:
        description: >
          Free-text description of planned update types (e.g., corrections, additions,
          deletions), responsible parties, and how updates will be communicated to users.
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "Quarterly releases with approximately 500 new participants per release"


  RetentionLimits:
    description: >
      If the dataset relates to people, are there applicable limits on the
      retention of their data (e.g., were individuals told their data would
      be deleted after a certain time)? If so, please describe these limits
      and how they will be enforced.
    is_a: DatasetProperty
    attributes:
      retention_period:
        description: "Time period for data retention."
        slot_uri: d4d:retentionPeriod
        range: string
        annotations:
          "d4d:docExample": "10 years minimum"
      retention_details:
        description: >
          Free-text description of applicable retention limits, legal or ethical basis
          for those limits, and how they will be enforced (e.g., automated deletion,
          anonymization after the retention period).
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "Data retained for minimum 10 years per NIH data sharing policy"


  VersionAccess:
    description: >
      Will older versions of the dataset continue to be supported/hosted/maintained?
      If so, how? If not, how will obsolescence be communicated to dataset consumers?
    is_a: DatasetProperty
    attributes:
      latest_version_doi:
        description: "DOI or URL identifying the latest version of this dataset (e.g., '10.5281/zenodo.1234567' for a DOI or 'https://doi.org/10.5281/zenodo.1234567' for a full URL). Use CURIE format for DOIs (e.g., 'doi:10.5281/zenodo.1234567')."
        slot_uri: dcterms:hasVersion
        range: uriorcurie
      versions_available:
        description: "List of available versions with metadata."
        slot_uri: d4d:versionsAvailable
        range: string
        multivalued: true
        annotations:
          "d4d:docExample": "v1.0 (2023-11), v1.1 (2024-02), v2.0 (2024-11)"
      version_details:
        description: >
          Free-text description of version support policies, how long older versions will
          be hosted, and how dataset consumers will be notified when versions become obsolete.
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "All versions available at fairhub.io; older versions archived on Zenodo"


  ExtensionMechanism:
    description: >
      If others want to extend/augment/build on/contribute to the dataset,
      is there a mechanism for them to do so? If so, please describe how
      those contributions are validated and communicated.
    is_a: DatasetProperty
    attributes:
      contribution_url:
        description: "URL for contribution guidelines or process."
        slot_uri: d4d:contributionURL
        range: uri
        annotations:
          "d4d:docExample": "https://example.org/dataset/contributing"
      extension_details:
        description: >
          Free-text description of how third parties can contribute to the dataset,
          how contributions are validated (e.g., peer review, automated tests),
          and how accepted contributions will be communicated to the community.
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "New modalities added via versioned data releases; schema extensions via GitHub PRs"