id: https://w3id.org/bridge2ai/data-sheets-schema/collection
name: d4d-collection
title: "D4D Collection Subset"
description: >
  A LinkML schema subset for capturing how data was collected, including 
  who collected it, over what timeframe, whether consent was gathered, 
  notifications were provided, etc. Based on the “Collection” subset 
  from the full Data Sheets for Datasets (D4D) schema.
license: MIT


prefixes:
  d4d: https://w3id.org/bridge2ai/data-sheets-schema/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#


imports:
  - D4D_Base_import


# Subsets are defined in the main schema


#------------------------------------------------------------------------------
# Minimal "foundation" classes (you can omit if imported from a core schema)
#------------------------------------------------------------------------------


classes:

  InstanceAcquisition:
    is_a: DatasetProperty
    description: >
      Describes how data associated with each instance was acquired
      (e.g., directly observed, reported by subjects, inferred).
    attributes:
      was_directly_observed:
        description: >-
          True if the data was directly observed by a researcher or instrument;
          false if it was obtained through other means (e.g., reported, inferred).
        slot_uri: d4d:wasDirectlyObserved
        range: boolean
      was_reported_by_subjects:
        description: >-
          True if the data was self-reported directly by the subjects themselves
          (e.g., survey responses, questionnaires); false otherwise.
        slot_uri: d4d:wasReportedBySubjects
        range: boolean
      was_inferred_derived:
        description: >-
          True if the data was computationally inferred or derived from other data
          (e.g., model outputs, imputed values); false otherwise.
        slot_uri: d4d:wasInferred
        range: boolean
      was_validated_verified:
        description: >-
          True if the data underwent a validation or verification process
          (e.g., expert review, cross-checking with ground truth); false otherwise.
        slot_uri: d4d:wasValidated
        range: boolean
      acquisition_details:
        description: >
          Free-text description of how data was acquired for each instance, including
          instruments, protocols, and any manual steps involved.
        range: string
        multivalued: true
        slot_uri: dcterms:description


  CollectionMechanism:
    is_a: DatasetProperty
    description: >
      What mechanisms or procedures were used to collect the data (e.g., hardware,
      manual curation, software APIs)? Also covers how these mechanisms were validated.
    exact_mappings:
      - rai:dataCollection
    attributes:
      mechanism_details:
        description: >
          Free-text description of the specific mechanisms or procedures used to collect
          the data (e.g., hardware model, software API, manual curation process),
          including how those mechanisms were validated.
        range: string
        multivalued: true
        slot_uri: dcterms:description


  DataCollector:
    is_a: DatasetProperty
    description: >
      Who was involved in the data collection (e.g., students, crowdworkers, contractors),
      and how they were compensated.
    attributes:
      role:
        description: Role of the data collector (e.g., researcher, crowdworker).
        slot_uri: schema:roleName
        range: string
      collector_details:
        description: >
          Free-text description of who was involved in data collection (e.g., students,
          crowdworkers, contractors), their training or qualifications, and how they
          were compensated.
        range: string
        multivalued: true
        slot_uri: dcterms:description


  CollectionTimeframe:
    is_a: DatasetProperty
    description: >
      Over what timeframe was the data collected, and does this timeframe match the
      creation timeframe of the underlying data?
    exact_mappings:
      - rai:dataCollectionTimeframe
    attributes:
      start_date:
        description: Start date of data collection.
        slot_uri: schema:startDate
        range: date
      end_date:
        description: End date of data collection.
        slot_uri: schema:endDate
        range: date
      timeframe_details:
        description: >
          Free-text description of the data collection period and whether this timeframe
          matches the creation timeframe of the underlying data (e.g., historical records,
          prospective collection).
        range: string
        multivalued: true
        slot_uri: dcterms:description


  DirectCollection:
    is_a: DatasetProperty
    description: >
      Indicates whether the data was collected directly from the individuals in question
      or obtained via third parties/other sources.
    attributes:
      is_direct:
        description: Whether collection was direct from individuals.
        slot_uri: d4d:isDirect
        range: boolean
      collection_details:
        description: >
          Free-text description of whether data was collected directly from individuals
          or obtained via third parties or other indirect sources, and what those sources are.
        range: string
        multivalued: true
        slot_uri: dcterms:description


  MissingDataDocumentation:
    is_a: DatasetProperty
    description: >
      Documentation of missing data in the dataset, including patterns,
      causes, and strategies for handling missing values.
    exact_mappings:
      - rai:dataCollectionMissingData
    attributes:
      missing_data_patterns:
        description: >
          Description of patterns in missing data (e.g., missing completely at random,
          missing at random, missing not at random).
        slot_uri: d4d:missingDataPatterns
        range: string
        multivalued: true
      missing_data_causes:
        description: >
          Known or suspected causes of missing data (e.g., sensor failures,
          participant dropout, privacy constraints).
        slot_uri: d4d:missingDataCauses
        range: string
        multivalued: true
      handling_strategy:
        description: >
          The primary strategy used to handle missing data (e.g., listwise deletion,
          mean imputation, multiple imputation, flagging with sentinel values).
        slot_uri: d4d:handlingStrategy
        range: string


  RawDataSource:
    is_a: DatasetProperty
    description: >
      Description of raw data sources before preprocessing, cleaning, or labeling.
      Documents where the original data comes from and how it can be accessed.
    exact_mappings:
      - rai:dataCollectionRawData
    attributes:
      source_description:
        description: >
          Detailed description of where raw data comes from (e.g., sensors,
          databases, web APIs, manual collection).
        slot_uri: dcterms:description
        range: string
        required: true
      source_type:
        description: >
          One or more types of raw source (e.g., sensor, database, user input, web scraping).
        slot_uri: d4d:sourceType
        range: string
        multivalued: true
        broad_mappings:
          - dcterms:type
      access_details:
        description: >
          Information on how to access or retrieve the raw source data.
        slot_uri: d4d:accessDetails
        range: string
      raw_data_format:
        description: >
          One or more formats of the raw data before any preprocessing (e.g., CSV, DICOM, JSON).
        slot_uri: d4d:rawDataFormat
        range: string
        multivalued: true






