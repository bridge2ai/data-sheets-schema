id: "https://w3id.org/bridge2ai/data-sheets-schema/distribution"
name: "data-sheets-schema-distribution"
title: "Datasheets for Datasets – Distribution Module"
description: >
  Subschema for distribution-related information in Datasheets for Datasets.
  The questions in this section pertain to how the dataset is distributed,
  including whether it will be shared with third parties, under what license,
  and any regulatory restrictions.


license: MIT
see_also:
  - "https://bridge2ai.github.io/data-sheets-schema"


imports:
  # Import the main schema so that we can reference DatasetProperty, etc.
  - D4D_Base_import


# Subsets are defined in the main schema


prefixes:
  linkml: "https://w3id.org/linkml/"
  d4ddistribution: "https://w3id.org/bridge2ai/data-sheets-schema/distribution#"
  schema: "http://schema.org/"
  dcterms: "http://purl.org/dc/terms/"
  dcat: "http://www.w3.org/ns/dcat#"


default_prefix: "d4ddistribution"


# ------------------------------------------------------------------------------
# Classes
# ------------------------------------------------------------------------------


classes:


  ThirdPartySharing:
    description: >
      Will the dataset be distributed to third parties outside of the entity
      (e.g., company, institution, organization) on behalf of which the dataset
      was created?
    is_a: DatasetProperty
    attributes:
      is_shared:
        description: >
          Boolean indicating whether the dataset is distributed to
          parties external to the dataset-creating entity.
        range: boolean
        slot_uri: d4d:isExternallyShared


  DistributionFormat:
    description: >
      How will the dataset be distributed (e.g., tarball on a website,
      API, GitHub)?
    is_a: DatasetProperty
    attributes:
      access_urls:
        description: "One or more URLs providing access to the distribution channel(s) or format(s)."
        range: uri
        multivalued: true
        slot_uri: dcat:accessURL
        annotations:
          "d4d:docExample": "https://example.org/dataset/download"


  DistributionDate:
    description: >
      When will the dataset be distributed?
    is_a: DatasetProperty
    attributes:
      release_dates:
        description: >
          One or more dates or timeframes for dataset release, in ISO 8601 format
          (e.g., "2024-03-15") or as a descriptive string (e.g., "Q2 2024").
          Use multiple values for staged or scheduled releases.
        range: string
        multivalued: true
        slot_uri: dcterms:available


