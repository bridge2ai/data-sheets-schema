id: https://w3id.org/bridge2ai/d4d-evaluation-summary
name: D4D_Evaluation_Summary
title: D4D Evaluation Summary Schema
description: |
  Schema for structured D4D evaluation summaries comparing generation methods
  across rubrics, projects, and input types.

prefixes:
  d4d: https://w3id.org/bridge2ai/data-sheets-schema/
  d4deval: https://w3id.org/bridge2ai/d4d-evaluation-summary/
  linkml: https://w3id.org/linkml/

default_prefix: d4deval
default_range: string

imports:
  - linkml:types

classes:
  EvaluationSummary:
    description: Complete evaluation summary for a rubric system.
    attributes:
      rubric_type:
        description: Type of rubric used (rubric10 or rubric20).
        range: RubricTypeEnum
        required: true

      rubric_description:
        description: "Free-text description of the rubric structure, scoring criteria, and scale used in this evaluation (e.g., 'Rubric10: 10 elements × 5 sub-elements, binary scoring, max 50 points')."
        range: string
        required: true

      total_files_evaluated:
        description: Total number of D4D files evaluated.
        range: integer
        required: true

      concatenated_file_count:
        description: Number of concatenated D4D files.
        range: integer

      individual_file_count:
        description: Number of individual D4D files.
        range: integer

      overall_performance:
        description: Summary statistics of evaluation performance across all D4D files.
        range: OverallPerformance
        required: true

      method_comparison:
        description: Performance comparison across generation methods.
        range: MethodPerformance
        multivalued: true
        required: true

      project_comparison:
        description: Performance comparison across Bridge2AI projects.
        range: ProjectPerformance
        multivalued: true
        required: true

      top_performers:
        description: List of top performing D4D files.
        range: TopPerformer
        multivalued: true

      element_performance:
        description: Performance by rubric element (rubric10 only).
        range: ElementPerformance
        multivalued: true

      category_performance:
        description: Performance by category (rubric20 only).
        range: CategoryPerformance
        multivalued: true

      common_weaknesses:
        description: Common weaknesses across all evaluations.
        range: CommonWeakness
        multivalued: true

      common_strengths:
        description: Common strengths across all evaluations.
        range: CommonStrength
        multivalued: true

      key_insights:
        description: Key analytical insights from evaluation.
        range: KeyInsight
        multivalued: true

      input_type_comparison:
        description: Concatenated vs individual file performance.
        range: InputTypeComparison

      files_generated:
        description: Output files generated by evaluation.
        range: GeneratedFile
        multivalued: true

  OverallPerformance:
    description: Overall performance statistics across all files.
    attributes:
      average_score:
        description: Average score across all files.
        range: float
        required: true

      average_percentage:
        description: Average score expressed as a percentage of maximum possible score.
        range: float
        required: true

      max_score:
        description: Maximum possible score for the rubric being evaluated.
        range: integer
        required: true

      best_score:
        description: Highest score achieved across all evaluated D4D files.
        range: float
        required: true

      best_percentage:
        description: Highest score expressed as a percentage of maximum possible score.
        range: float
        required: true

      best_performer:
        description: Identifier of the project, method, or file type that achieved the best score.
        required: true

      worst_score:
        description: Lowest score achieved across all evaluated D4D files.
        range: float
        required: true

      worst_percentage:
        description: Lowest score expressed as a percentage of maximum possible score.
        range: float
        required: true

      worst_performer:
        description: Identifier of the project, method, or file type that achieved the worst score.

  MethodPerformance:
    description: Performance metrics for a specific generation method.
    attributes:
      method:
        description: The D4D generation method used to create the datasheets (e.g., claudecode_agent, gpt5).
        range: GenerationMethodEnum
        required: true

      input_type:
        description: Type of input files used for generation (concatenated or individual source documents).
        range: InputTypeEnum

      file_count:
        description: Number of D4D files evaluated using this generation method.
        range: integer
        required: true

      average_score:
        description: Mean score achieved across all files generated with this method.
        range: float
        required: true

      average_percentage:
        description: Mean score expressed as a percentage of maximum possible for this method.
        range: float
        required: true

      max_score:
        description: Maximum possible score for the rubric being evaluated.
        range: integer

      best_score:
        description: Highest score achieved by any file using this method.
        range: float

      worst_score:
        description: Lowest score achieved by any file using this method.
        range: float

      rank:
        description: Ranking position of this method among all methods (1 = best performing).
        range: integer

  ProjectPerformance:
    description: Performance metrics for a Bridge2AI Grand Challenge project.
    attributes:
      project:
        description: The Bridge2AI Grand Challenge project for which D4D datasheets were evaluated (e.g., AI_READI, VOICE).
        range: Bridge2AIProjectEnum
        required: true

      file_count:
        description: Number of D4D files evaluated for this specific Bridge2AI project.
        range: integer
        required: true

      average_score:
        description: Mean score achieved across all D4D files for this project.
        range: float
        required: true

      average_percentage:
        description: Mean score expressed as a percentage of maximum possible for this project.
        range: float
        required: true

      max_score:
        description: Maximum possible score for the rubric being evaluated.
        range: integer

      rank:
        description: Ranking position of this project among all projects (1 = best performing).
        range: integer

  TopPerformer:
    description: Information about a top-performing D4D file.
    attributes:
      rank:
        description: Position in the top performers list (1 = highest score).
        range: integer
        required: true

      project:
        description: The Bridge2AI project associated with this top-performing datasheet.
        range: Bridge2AIProjectEnum
        required: true

      method:
        description: The D4D generation method used to create this top-performing file.
        range: GenerationMethodEnum
        required: true

      input_type:
        description: Type of input used for generation (concatenated or individual source documents).
        range: InputTypeEnum
        required: true

      score:
        description: Raw score achieved by this D4D file on the rubric.
        range: float
        required: true

      percentage:
        description: Score expressed as a percentage of the maximum possible score.
        range: float
        required: true

      max_score:
        description: Maximum possible score for the rubric being evaluated.
        range: integer
        required: true

      elements_passing:
        description: Number of rubric elements that met or exceeded the passing threshold (rubric10 only).
        range: integer

      file_name:
        description: Filename of the top-performing D4D datasheet.

  ElementPerformance:
    description: Performance for a specific rubric element (rubric10).
    attributes:
      element_id:
        description: Numeric identifier of the rubric element being evaluated (1-10 for rubric10).
        range: integer
        required: true

      element_name:
        description: Human-readable name of the rubric element (e.g., "Motivation", "Composition").
        required: true

      max_score:
        description: Maximum possible score for this specific rubric element.
        range: integer
        required: true

      average_score:
        description: Mean score achieved for this element across all evaluated files.
        range: float
        required: true

      average_percentage:
        description: Mean score for this element expressed as a percentage of maximum possible.
        range: float

      strength_level:
        description: Qualitative assessment of performance level for this element (strongest, strong, weak, weakest).
        range: StrengthLevelEnum

      description:
        description: Description of what this element measures.

  CategoryPerformance:
    description: Performance for a rubric category (rubric20).
    attributes:
      category_id:
        description: Numeric identifier of the rubric category being evaluated (1-4 for rubric20).
        range: integer
        required: true

      category_name:
        description: Human-readable name of the category (e.g., "Dataset Motivation", "Data Composition").
        required: true

      max_score:
        description: Maximum possible score for all questions within this category.
        range: integer
        required: true

      average_score:
        description: Mean score achieved for this category across all evaluated files.
        range: float
        required: true

      average_percentage:
        description: Mean score for this category expressed as a percentage of maximum possible.
        range: float

      rank:
        description: Ranking position of this category among all categories (1 = best performing).
        range: integer

      question_count:
        description: Total number of evaluation questions within this category.
        range: integer

  CommonWeakness:
    description: Common weakness identified across evaluations.
    attributes:
      weakness_type:
        description: Classification of the weakness observed across multiple D4D files.
        range: WeaknessTypeEnum
        required: true

      description:
        description: Detailed explanation of the weakness pattern and its manifestation.
        required: true

      frequency:
        description: How frequently this weakness appears across the evaluated dataset.
        slot_uri: d4d:frequency
        range: FrequencyEnum

      affected_element_or_question:
        description: Specific rubric element or question where this weakness commonly occurs.

      typical_score:
        description: Representative numeric score (float) typically achieved in areas affected by this weakness.
        range: float

  CommonStrength:
    description: Common strength identified across evaluations.
    attributes:
      strength_type:
        description: Classification of the strength pattern observed across multiple D4D files.
        range: StrengthTypeEnum
        required: true

      description:
        description: Detailed explanation of the strength pattern and its positive impact.
        required: true

      frequency:
        description: How frequently this strength appears across the evaluated dataset.
        slot_uri: d4d:frequency
        range: FrequencyEnum

      affected_element_or_question:
        description: Specific rubric element or question where this strength commonly occurs.

      typical_score:
        description: Representative numeric score (float) typically achieved in areas demonstrating this strength.
        range: float

  KeyInsight:
    description: Key analytical insight from evaluation.
    attributes:
      insight_type:
        description: Classification of the analytical insight (e.g., trend, comparison, finding).
        range: InsightTypeEnum
        required: true

      title:
        description: Concise summary title capturing the essence of the insight.
        required: true

      description:
        description: Comprehensive explanation of the insight and its implications.
        required: true

      supporting_data:
        description: Quantitative or qualitative evidence supporting this analytical insight.
        multivalued: true

      comparison_metric:
        description: Numerical comparison metric quantifying the insight (e.g., "2.4× better", "30% improvement").

  InputTypeComparison:
    description: Comparison between concatenated and individual file performance.
    attributes:
      concatenated_performance:
        description: Performance metrics for D4D files generated from concatenated source documents.
        range: InputTypePerformance
        required: true

      individual_performance:
        description: Performance metrics for D4D files generated from individual source documents.
        range: InputTypePerformance
        required: true

      synthesis_advantage:
        description: "Free-text explanation of the performance difference observed between multi-document synthesis (concatenated files) and individual source documents for this comparison, including any advantage or disadvantage."
        range: string

  InputTypePerformance:
    description: Performance metrics for an input type.
    attributes:
      input_type:
        description: Type of input (concatenated or individual).
        range: InputTypeEnum
        required: true

      file_count:
        description: Number of files of this type.
        range: integer

      average_score:
        description: Average score for this input type.
        range: float

      average_percentage:
        description: Average percentage for this input type.
        range: float

      score_range:
        description: Range of scores observed for this input type (minimum to maximum values).

      best_method:
        description: Generation method that achieved the highest performance for this input type.
        range: GenerationMethodEnum

  GeneratedFile:
    description: Information about generated output file.
    attributes:
      file_path:
        description: Filesystem path to the generated evaluation output file.
        required: true

      file_type:
        description: File format type of the generated output (CSV, JSON, or Markdown).
        range: EvaluationOutputFormatEnum
        required: true

      description:
        description: Explanation of the file contents and what data it contains.
        required: true

      row_count:
        description: Number of data rows or entries in the file (applicable to CSV and JSON formats).
        range: integer

enums:
  RubricTypeEnum:
    description: Types of evaluation rubrics.
    permissible_values:
      rubric10:
        description: 10-element hierarchical rubric (50 sub-elements, max 50 points)
      rubric20:
        description: 20-question detailed rubric (4 categories, max 84 points)

  GenerationMethodEnum:
    description: D4D generation methods.
    permissible_values:
      curated:
        description: Manually curated comprehensive datasheets.
      gpt5:
        description: Generated using GPT-5 API.
      claudecode:
        description: Direct synthesis at temperature=0.0 (concatenated only).
      claudecode_agent:
        description: Claude Code agent-based generation.
      claudecode_assistant:
        description: Claude Code assistant-based generation.

  Bridge2AIProjectEnum:
    description: Bridge2AI Grand Challenge projects.
    permissible_values:
      AI_READI:
        description: AI-READI - AI-Ready and Equitable Atlas for Diabetes Insights.
      CHORUS:
        description: CHoRUS - Collaborative Hospital Repository Uniting Standards.
      CM4AI:
        description: CM4AI - Cell Maps for AI.
      VOICE:
        description: VOICE - Voice as a Biomarker of Health.

  InputTypeEnum:
    description: Types of input files for D4D generation.
    permissible_values:
      concatenated:
        description: Multiple source documents concatenated, requires synthesis.
      individual:
        description: Single source document, single-source extraction.

  StrengthLevelEnum:
    description: Assessment of element/category strength.
    permissible_values:
      strongest:
        description: Highest performing element/category.
      strong:
        description: Above average performance.
      weak:
        description: Below average performance.
      weakest:
        description: Lowest performing element/category.

  WeaknessTypeEnum:
    description: Types of common weaknesses.
    permissible_values:
      missing_field:
        description: Required or important field is missing.
      incomplete_content:
        description: Field present but content is incomplete.
      low_quality:
        description: Content quality is below standard.
      inconsistent:
        description: Information is inconsistent across fields.
      generic:
        description: Content is too generic/boilerplate.

  StrengthTypeEnum:
    description: Types of common strengths.
    permissible_values:
      comprehensive:
        description: Comprehensive coverage of topic.
      high_quality:
        description: High quality detailed content.
      consistent:
        description: Consistent information across fields.
      well_structured:
        description: Well-structured and organized.

  FrequencyEnum:
    description: Frequency of occurrence.
    permissible_values:
      always:
        description: Appears in all or nearly all files.
      frequently:
        description: Appears in majority of files.
      sometimes:
        description: Appears in some files.
      rarely:
        description: Appears in few files.

  InsightTypeEnum:
    description: Types of analytical insights.
    permissible_values:
      method_comparison:
        description: Comparison between generation methods.
      synthesis_advantage:
        description: Advantage of synthesis vs single-source.
      performance_gap:
        description: Gap between best and worst performers.
      common_pattern:
        description: Pattern observed across evaluations.
      improvement_opportunity:
        description: Opportunity for improvement.

  EvaluationOutputFormatEnum:
    description: Types of generated output files.
    permissible_values:
      csv:
        description: CSV file with tabular data.
      json:
        description: JSON file with structured data.
      markdown:
        description: Markdown file with formatted text.
