---
id: https://w3id.org/bridge2ai/data-sheets-schema
name: data-sheets-schema
title: data-sheets-schema
description: |-
  A LinkML schema for Datasheets for Datasets.
license: MIT
see_also:
  - https://bridge2ai.github.io/data-sheets-schema

prefixes:
  AIO: https://w3id.org/aio/
  biolink: https://w3id.org/biolink/vocab/
  d4d: https://w3id.org/bridge2ai/data-sheets-schema/
  data_sheets_schema: https://w3id.org/bridge2ai/data-sheets-schema/
  datasets: https://w3id.org/linkml/report
  dcat: http://www.w3.org/ns/dcat#
  dcterms: http://purl.org/dc/terms/
  example: https://example.org/
  linkml: https://w3id.org/linkml/
  mediatypes: https://www.iana.org/assignments/media-types/
  prov: http://www.w3.org/ns/prov#
  qudt: http://qudt.org/schema/qudt/
  schema: http://schema.org/
  sh: https://w3id.org/shacl/
  skos: http://www.w3.org/2004/02/skos/core#
  B2AI_TOPIC: https://w3id.org/bridge2ai/b2ai-standards-registry/
  B2AI_STANDARD: https://w3id.org/bridge2ai/b2ai-standards-registry/
  B2AI_SUBSTRATE: https://w3id.org/bridge2ai/b2ai-standards-registry/
default_prefix: data_sheets_schema
default_range: string

imports:
  - linkml:types
  # Base schema with shared definitions
  - D4D_Base_import
  # D4D Modules in original paper order
  - D4D_Motivation
  - D4D_Composition
  - D4D_Collection
  - D4D_Preprocessing
  - D4D_Uses
  - D4D_Distribution
  - D4D_Maintenance
  # Additional extended modules
  - D4D_Ethics
  - D4D_Human
  - D4D_Data_Governance
  - D4D_Variables
  - D4D_FileCollection

## TYPES ##


# SUBSETS are now defined in D4D_Base_import.yaml

## CLASSES ##
classes:

  # Base classes (NamedThing, Organization, DatasetProperty, Software, Person, 
  # Information, FormatDialect) are now imported from D4D_Base_import.yaml

  DatasetCollection:
    aliases:
      - file collection
      - dataset collection
      - data resource collection
    tree_root: true
    description: >-
      A collection of related datasets, likely containing multiple files
      of multiple potential purposes and properties.
    exact_mappings:
      - dcat:Dataset
    close_mappings:
      - dcat:Catalog
    is_a: Information
    slots:
      - resources
    slot_usage:
      resources:
        inlined_as_list: true

  # TODO: consider how to distinguish between metadata only vs
  # instances where data file is present (and we can extract metadata)
  Dataset:
    aliases:
      - data resource
      - data file
      - data package
    class_uri: dcat:Distribution
    exact_mappings:
      - schema:DataDownload
    description: >-
      A single component of related observations and/or information that can be
      read, manipulated, transformed, and otherwise interpreted.
    is_a: Information
    slots:
      - external_resources
      - resources
    slot_usage:
      external_resources:
        description: >-
          External resources referenced at the dataset level (e.g., related publications,
          repositories, documentation). For file-level external resources, use
          FileCollection.external_resources.
        range: ExternalResource
        multivalued: true
        inlined_as_list: true
      resources:
        description: >-
          Sub-resources or component datasets that are part of this dataset.
          Note: For file collections, use the file_collections attribute instead.
        range: Dataset
        multivalued: true
        inlined_as_list: true
    attributes:
      # FileCollection module
      file_collections:
        description: >-
          Collections of files within this dataset. Each collection represents
          a logical grouping of files with shared characteristics (e.g., all
          training data, all image files, all raw data files). Maps to nested
          RO-Crate Dataset entities via schema:hasPart in RO-Crate converters.
        slot_uri: d4d:fileCollections
        range: FileCollection
        multivalued: true
        inlined_as_list: true
        exact_mappings:
          - dcat:distribution
      total_file_count:
        description: >-
          Total number of files across all file collections in this dataset.
          Can be aggregated from file_collections[].file_count.
        range: integer
        slot_uri: d4d:totalFileCount
        annotations:
          "d4d:docExample": "156"
      total_size_bytes:
        description: >-
          Total size of all files in bytes across all file collections.
          Can be aggregated from file_collections[].total_bytes.
        range: integer
        slot_uri: dcat:byteSize
        annotations:
          "d4d:docExample": "10737418240 (10 GiB = 10 × 1024³ bytes)"
      # Motivation module classes
      purposes:
        description: >-
          Purposes for which the dataset was created. List of Purpose objects
          from the Motivation module, each describing a specific creation goal
          or intended application.
        slot_uri: d4d:purposes
        range: Purpose
        multivalued: true
        inlined_as_list: true
      tasks:
        description: >-
          Tasks the dataset is intended to support. List of Task objects
          from the Motivation module describing specific machine learning,
          research, or analytical tasks.
        slot_uri: d4d:tasks
        range: Task
        multivalued: true
        inlined_as_list: true
      addressing_gaps:
        description: >-
          Research or practical gaps this dataset addresses. List of
          AddressingGap objects from the Motivation module, each describing
          a gap in existing datasets or knowledge that this dataset fills.
        slot_uri: d4d:addressingGaps
        range: AddressingGap
        multivalued: true
        inlined_as_list: true
      creators:
        description: >-
          Individuals or organizations who created the dataset. List of
          Creator objects describing authorship, roles, and affiliations
          of dataset creators.
        slot_uri: schema:creator
        range: Creator
        multivalued: true
        inlined_as_list: true
      funders:
        description: >-
          Funding mechanisms that supported dataset creation. List of
          FundingMechanism objects describing grants, contracts, or other
          funding sources including grantors and grant identifiers.
        slot_uri: schema:funder
        range: FundingMechanism
        multivalued: true
        inlined_as_list: true
      # Composition module classes
      subsets:
        description: >-
          Subsets or splits of this dataset. List of DataSubset objects
          from the Composition module, each representing a logical partition
          such as training, validation, or test splits, or demographic subgroups.
        range: DataSubset
        multivalued: true
        inlined_as_list: true
        slot_uri: d4d:dataSubset
      instances:
        description: >-
          Individual data instances or records in the dataset. List of
          Instance objects from the Composition module describing what
          each data point represents, its type, and associated label information.
        slot_uri: d4d:instances
        range: Instance
        multivalued: true
        inlined_as_list: true
      anomalies:
        description: >-
          Known data quality issues, errors, or irregularities in the dataset.
          List of DataAnomaly objects from the Composition module, each
          documenting a specific anomaly and its potential impact.
        slot_uri: d4d:anomalies
        range: DataAnomaly
        multivalued: true
        inlined_as_list: true
      known_biases:
        description: >-
          Known biases present in the dataset that may affect fairness,
          representativeness, or model performance. Uses BiasTypeEnum for
          standardized bias categorization mapped to the AI Ontology (AIO).
        slot_uri: d4d:known_biases
        range: DatasetBias
        multivalued: true
        inlined_as_list: true
      known_limitations:
        description: >-
          Known limitations of the dataset that may affect its use or interpretation.
          Distinct from biases (systematic errors) and anomalies (data quality issues).
        slot_uri: d4d:known_limitations
        range: DatasetLimitation
        multivalued: true
        inlined_as_list: true
      confidential_elements:
        description: >-
          Confidential or restricted information within the dataset that
          requires access controls. List of Confidentiality objects describing
          what is confidential and why it cannot be released.
        slot_uri: d4d:confidentialElements
        range: Confidentiality
        multivalued: true
        inlined_as_list: true
      content_warnings:
        description: >-
          Content warnings for potentially harmful, offensive, or disturbing
          material in the dataset. List of ContentWarning objects alerting
          users to sensitive content categories.
        slot_uri: d4d:contentWarnings
        range: ContentWarning
        multivalued: true
        inlined_as_list: true
      subpopulations:
        description: >-
          Subpopulations represented within the dataset. List of Subpopulation
          objects from the Composition module describing demographic or other
          groups, their representation, and any imbalances.
        slot_uri: d4d:subpopulations
        range: Subpopulation
        multivalued: true
        inlined_as_list: true
      sensitive_elements:
        description: >-
          Sensitive data elements requiring special handling or access controls.
          List of SensitiveElement objects identifying sensitive attributes
          such as personal identifiers, protected health information, or
          legally sensitive content.
        slot_uri: d4d:sensitiveElements
        range: SensitiveElement
        multivalued: true
        inlined_as_list: true
      relationships:
        description: >-
          Explicit relationships between individual instances in the dataset.
          List of Relationships objects from the Composition module describing
          how instances relate (e.g., graph edges, ratings, social network links).
        slot_uri: d4d:relationships
        range: Relationships
        multivalued: true
        inlined_as_list: true
      splits:
        description: >-
          Recommended data splits for this dataset. List of Splits objects
          from the Composition module describing train/validation/test partitions
          and the rationale for each split strategy.
        slot_uri: d4d:splits
        range: Splits
        multivalued: true
        inlined_as_list: true
      # Collection module classes
      acquisition_methods:
        description: >-
          Methods used to acquire or obtain dataset instances. List of
          InstanceAcquisition objects from the Collection module describing
          how data was sourced, whether directly observed or derived.
        slot_uri: d4d:acquisitionMethods
        range: InstanceAcquisition
        multivalued: true
        inlined_as_list: true
      collection_mechanisms:
        description: >-
          Mechanisms, instruments, or tools used for data collection.
          List of CollectionMechanism objects from the Collection module
          describing sensors, surveys, APIs, or other collection instruments.
        slot_uri: d4d:collectionMechanisms
        range: CollectionMechanism
        multivalued: true
        inlined_as_list: true
      sampling_strategies:
        description: >-
          Strategies used to select data instances from a larger population.
          List of SamplingStrategy objects from the Collection module
          describing sampling methodology, inclusion criteria, and limitations.
        slot_uri: d4d:samplingStrategies
        range: SamplingStrategy
        multivalued: true
        inlined_as_list: true
      data_collectors:
        description: >-
          Individuals or organizations responsible for collecting the data.
          List of DataCollector objects from the Collection module describing
          who performed data collection and their roles.
        slot_uri: d4d:dataCollectors
        range: DataCollector
        multivalued: true
        inlined_as_list: true
      collection_timeframes:
        description: >-
          Time periods during which data was collected. List of
          CollectionTimeframe objects from the Collection module describing
          collection start and end dates, and any gaps in the collection period.
        slot_uri: d4d:collectionTimeframes
        range: CollectionTimeframe
        multivalued: true
        inlined_as_list: true
      direct_collection:
        description: >-
          Whether data was collected directly from individuals or via third parties.
          List of DirectCollection objects from the Collection module describing
          direct vs. indirect collection methods and sources.
        slot_uri: d4d:directCollection
        range: DirectCollection
        multivalued: true
        inlined_as_list: true
      collection_notifications:
        description: >-
          Notifications provided to individuals about data collection.
          List of CollectionNotification objects from the Ethics module describing
          how and when individuals were informed about the data collection.
        slot_uri: d4d:collectionNotifications
        range: CollectionNotification
        multivalued: true
        inlined_as_list: true
      collection_consents:
        description: >-
          Consent obtained from individuals for data collection and use.
          List of CollectionConsent objects from the Ethics module describing
          how consent was requested, provided, and documented.
        slot_uri: d4d:collectionConsents
        range: CollectionConsent
        multivalued: true
        inlined_as_list: true
      consent_revocations:
        description: >-
          Mechanisms for individuals to revoke previously given consent.
          List of ConsentRevocation objects from the Ethics module describing
          how revocation works and what happens to data after revocation.
        slot_uri: d4d:consentRevocations
        range: ConsentRevocation
        multivalued: true
        inlined_as_list: true
      missing_data_documentation:
        description: >-
          Documentation of missing data patterns and handling strategies.
        slot_uri: d4d:missingDataDocumentation
        range: MissingDataDocumentation
        multivalued: true
        inlined_as_list: true
      raw_data_sources:
        description: >-
          List of raw data sources before preprocessing. Each RawDataSource object
          describes where the original data came from and how it can be accessed.
        slot_uri: d4d:rawDataSources
        range: RawDataSource
        multivalued: true
        inlined_as_list: true
      # Ethics module classes
      ethical_reviews:
        description: >-
          Ethical reviews and institutional oversight for the dataset.
          List of EthicalReview objects from the Ethics module describing
          IRB approvals, ethics committee reviews, and compliance certifications.
        slot_uri: d4d:ethicalReviews
        range: EthicalReview
        multivalued: true
        inlined_as_list: true
      data_protection_impacts:
        description: >-
          Data protection impact assessments (DPIAs) conducted for the dataset.
          List of DataProtectionImpact objects from the Ethics module
          documenting privacy risk assessments and mitigation measures.
        slot_uri: d4d:dataProtectionImpacts
        range: DataProtectionImpact
        multivalued: true
        inlined_as_list: true
      # Human subjects module classes
      human_subject_research:
        slot_uri: d4d:humanSubjectResearch
        range: HumanSubjectResearch
        inlined: true
        description: >-
          Information about whether dataset involves human subjects research,
          including IRB approval, ethics review, and regulatory compliance.
      informed_consent:
        slot_uri: d4d:informedConsent
        range: InformedConsent
        multivalued: true
        inlined_as_list: true
        description: >-
          Details about informed consent procedures, including consent type,
          documentation, and withdrawal mechanisms.
      at_risk_populations:
        slot_uri: d4d:atRiskPopulations
        range: AtRiskPopulations
        inlined: true
        description: >-
          Information about protections for at-risk populations (e.g., minors,
          pregnant women, prisoners) including special safeguards and assent procedures.
      participant_privacy:
        slot_uri: d4d:participantPrivacy
        range: ParticipantPrivacy
        multivalued: true
        inlined_as_list: true
        description: >-
          Information about privacy protections and anonymization procedures
          for human research participants.
      participant_compensation:
        slot_uri: d4d:participantCompensation
        range: HumanSubjectCompensation
        multivalued: true
        inlined_as_list: true
        description: >-
          Information about compensation or incentives provided to human research participants.
      # Preprocessing module classes
      preprocessing_strategies:
        description: >-
          Preprocessing steps applied to the raw data. List of
          PreprocessingStrategy objects from the Preprocessing module
          describing normalization, transformation, and other preparation steps.
        slot_uri: d4d:preprocessingStrategies
        range: PreprocessingStrategy
        multivalued: true
        inlined_as_list: true
      cleaning_strategies:
        description: >-
          Data cleaning and quality control procedures applied to the dataset.
          List of CleaningStrategy objects from the Preprocessing module
          describing outlier removal, deduplication, and error correction steps.
        slot_uri: d4d:cleaningStrategies
        range: CleaningStrategy
        multivalued: true
        inlined_as_list: true
      labeling_strategies:
        description: >-
          Labeling or annotation methodologies applied to the data. List of
          LabelingStrategy objects from the Preprocessing module describing
          annotation procedures, annotator qualifications, and quality controls.
        slot_uri: d4d:labelingStrategies
        range: LabelingStrategy
        multivalued: true
        inlined_as_list: true
      raw_sources:
        description: >-
          Raw, unprocessed source data before any preprocessing was applied.
          List of RawData objects from the Preprocessing module describing
          original data sources and their formats.
        slot_uri: d4d:rawSources
        range: RawData
        multivalued: true
        inlined_as_list: true
      imputation_protocols:
        description: >-
          Data imputation protocols applied to handle missing values.
          List of ImputationProtocol objects from the Preprocessing module
          describing the imputation technique, affected variables, and rationale.
        slot_uri: d4d:imputation_protocols
        range: ImputationProtocol
        multivalued: true
        inlined_as_list: true
      annotation_analyses:
        description: >-
          Analysis of annotation quality and inter-annotator agreement.
        slot_uri: d4d:annotation_analyses
        range: AnnotationAnalysis
        multivalued: true
        inlined_as_list: true
      machine_annotation_tools:
        description: >-
          Automated annotation tools used in dataset creation.
        range: MachineAnnotationTools
        multivalued: true
        inlined_as_list: true
      # Uses module classes
      existing_uses:
        description: >-
          Known existing uses of the dataset at the time of publication.
          List of ExistingUse objects from the Uses module describing
          research, commercial, or other applications of the dataset.
        slot_uri: d4d:existingUses
        range: ExistingUse
        multivalued: true
        inlined_as_list: true
      use_repository:
        description: >-
          Repositories or registries tracking how the dataset has been used.
          List of UseRepository objects from the Uses module pointing to
          papers with code, citation indices, or other use-tracking resources.
        slot_uri: d4d:useRepository
        range: UseRepository
        multivalued: true
        inlined_as_list: true
      other_tasks:
        description: >-
          Additional tasks the dataset may support beyond its original intent.
          List of OtherTask objects from the Uses module describing potential
          applications not originally planned by the dataset creators.
        slot_uri: d4d:otherTasks
        range: OtherTask
        multivalued: true
        inlined_as_list: true
      future_use_impacts:
        description: >-
          Anticipated impacts of future uses, including risks and benefits.
          List of FutureUseImpact objects from the Uses module describing
          foreseeable consequences of using this dataset in new applications.
        slot_uri: d4d:futureUseImpacts
        range: FutureUseImpact
        multivalued: true
        inlined_as_list: true
      discouraged_uses:
        description: >-
          Uses that are not recommended for this dataset due to limitations,
          risks, or ethical concerns. List of DiscouragedUse objects from
          the Uses module explaining why certain applications should be avoided.
        slot_uri: d4d:discouragedUses
        range: DiscouragedUse
        multivalued: true
        inlined_as_list: true
      intended_uses:
        slot_uri: d4d:intendedUses
        range: IntendedUse
        multivalued: true
        inlined_as_list: true
        description: >-
          Explicit intended and recommended uses for this dataset.
          Complements future_use_impacts by focusing on positive applications.
      prohibited_uses:
        slot_uri: d4d:prohibitedUses
        range: ProhibitedUse
        multivalued: true
        inlined_as_list: true
        description: >-
          Explicitly prohibited or forbidden uses for this dataset.
          Stronger than discouraged_uses - these are not permitted.
      # Distribution module classes
      distribution_formats:
        description: >-
          Formats in which the dataset is distributed or made available.
          List of DistributionFormat objects from the Distribution module
          describing file formats, compression, and access methods.
        slot_uri: d4d:distributionFormats
        range: DistributionFormat
        multivalued: true
        inlined_as_list: true
      distribution_dates:
        description: >-
          Dates when the dataset was or will be distributed or released.
          List of DistributionDate objects from the Distribution module
          describing initial release dates, version release dates, and
          planned future releases.
        slot_uri: d4d:distributionDates
        range: DistributionDate
        multivalued: true
        inlined_as_list: true
      third_party_sharing:
        description: >-
          Third-party distribution policies for the dataset.
          List of ThirdPartySharing objects from the Distribution module describing
          whether and how the dataset is shared with entities outside the
          creating organization.
        slot_uri: d4d:thirdPartySharing
        range: ThirdPartySharing
        multivalued: true
        inlined_as_list: true
      # Data Governance module classes
      license_and_use_terms:
        description: >-
          License and usage terms governing dataset access and use.
          LicenseAndUseTerms object from the Data Governance module describing
          the applicable license, permitted uses, and any restrictions.
        slot_uri: schema:license
        range: LicenseAndUseTerms
        inlined: true
      ip_restrictions:
        description: >-
          Intellectual property restrictions on dataset use or redistribution.
          IPRestrictions object from the Data Governance module describing
          copyright, trademark, or other IP considerations.
        slot_uri: d4d:ipRestrictions
        range: IPRestrictions
        inlined: true
      regulatory_restrictions:
        description: >-
          Regulatory and export control restrictions applicable to the dataset.
          ExportControlRegulatoryRestrictions object from the Data Governance
          module describing compliance requirements such as ITAR, EAR, or GDPR.
        slot_uri: d4d:regulatoryRestrictions
        range: ExportControlRegulatoryRestrictions
        inlined: true
      # Maintenance module classes
      maintainers:
        description: >-
          Individuals or organizations responsible for maintaining the dataset.
          List of Maintainer objects from the Maintenance module describing
          maintenance contacts, roles, and support channels.
        slot_uri: d4d:maintainers
        range: Maintainer
        multivalued: true
        inlined_as_list: true
      errata:
        description: >-
          Known errors or corrections to the dataset since publication.
          List of Erratum objects from the Maintenance module describing
          discovered errors, affected records, and correction procedures.
        slot_uri: d4d:errata
        range: Erratum
        multivalued: true
        inlined_as_list: true
      updates:
        description: >-
          Plans for future updates or versioning of the dataset.
          UpdatePlan object from the Maintenance module describing update
          frequency, versioning policy, and planned enhancements.
        slot_uri: d4d:updates
        range: UpdatePlan
        inlined: true
      retention_limit:
        description: >-
          Data retention policies and limits for the dataset.
          RetentionLimits object from the Maintenance module describing
          how long the dataset will be available and any deletion schedules.
        slot_uri: d4d:retentionLimit
        range: RetentionLimits
        inlined: true
      version_access:
        description: >-
          Information about access to different versions of the dataset.
          VersionAccess object from the Maintenance module describing
          where older versions can be found and how version history is maintained.
        slot_uri: d4d:versionAccess
        range: VersionAccess
        inlined: true
      extension_mechanism:
        description: >-
          Mechanisms for extending or contributing to the dataset.
          ExtensionMechanism object from the Maintenance module describing
          how others can propose additions, corrections, or expansions.
        slot_uri: d4d:extensionMechanism
        range: ExtensionMechanism
        inlined: true
      # Variable/field metadata
      variables:
        description: >-
          Metadata describing individual variables, fields, or columns in the dataset.
        range: VariableMetadata
        multivalued: true
        inlined_as_list: true
        slot_uri: schema:variableMeasured
        exact_mappings:
          - schema:variableMeasured
      # Other attributes
      is_deidentified:
        description: >-
          De-identification status and procedures applied to the dataset.
          Deidentification object describing whether the dataset contains
          personal data, what de-identification methods were applied, and
          any residual re-identification risks.
        slot_uri: d4d:isDeidentified
        range: Deidentification
        inlined: true
      is_tabular:
        description: >-
          Whether the dataset is in tabular format (rows and columns).
          True if the data is structured as a table (e.g., CSV, TSV, relational
          database); false for unstructured formats such as images or free text.
        slot_uri: d4d:isTabular
        range: boolean
      # Dataset citation and relationships
      citation:
        description: >-
          Recommended citation for this dataset in DataCite or BibTeX format.
          Provides a standard way to cite the dataset in publications.
        range: string
        slot_uri: schema:citation
        exact_mappings:
          - schema:citation
      parent_datasets:
        description: >-
          Parent datasets that this dataset is part of or derived from.
          Enables hierarchical dataset composition (hasPart/isPartOf relationships).
        range: Dataset
        multivalued: true
        inlined_as_list: true
        slot_uri: schema:isPartOf
        exact_mappings:
          - schema:isPartOf
      related_datasets:
        description: >-
          Related datasets with typed relationships (e.g., supplements, derives from,
          is version of). Use DatasetRelationship class to specify relationship types.
        slot_uri: schema:isRelatedTo
        range: DatasetRelationship
        multivalued: true
        inlined_as_list: true

  DataSubset:
    description: >-
      A subset of a dataset, likely containing multiple files
      of multiple potential purposes and properties.
    is_a: Dataset
    attributes:
      is_data_split:
        description: >-
          Is this subset a split of the larger dataset,
          e.g., is it a set for model training, testing,
          or validation?
        range: boolean
      is_subpopulation:
        description: >-
          Is this subset a subpopulation of the larger dataset,
          e.g., is it a set of data for a specific demographic?
        range: boolean

  # All D4D-specific classes are now imported from their respective modules
  # Motivation: Purpose, Task, AddressingGap, Creator, FundingMechanism, Grantor, Grant
  # Composition: Instance, SamplingStrategy, MissingInfo, Relationships, Splits, DataAnomaly, ExternalResource, Confidentiality, ContentWarning, Subpopulation, Deidentification, SensitiveElement
  # Collection: InstanceAcquisition, CollectionMechanism, DataCollector, CollectionTimeframe, DirectCollection, CollectionNotification, CollectionConsent, ConsentRevocation
  # Ethics: EthicalReview, DataProtectionImpact
  # Preprocessing: PreprocessingStrategy, CleaningStrategy, LabelingStrategy, RawData
  # Uses: ExistingUse, UseRepository, OtherTask, FutureUseImpact, DiscouragedUse
  # Distribution: ThirdPartySharing, DistributionFormat, DistributionDate
  # Data Governance: LicenseAndUseTerms, IPRestrictions, ExportControlRegulatoryRestrictions
