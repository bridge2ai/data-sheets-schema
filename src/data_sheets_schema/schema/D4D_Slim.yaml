---
id: https://w3id.org/bridge2ai/data-sheets-schema/slim
name: data-sheets-schema-slim
title: D4D Slim Schema - RO-Crate Compatible Subset
description: |-
  A slimmed-down version of the Datasheets for Datasets (D4D) schema optimized
  for RO-Crate transformations. This schema includes only classes and attributes
  with ≥50% coverage in RO-Crate mappings.

  Coverage: 40% of full D4D schema (272/680 attributes)
  Included classes: 5 (Dataset, DataSubset, DatasetCollection, Information, Software)
  Excluded classes: 69 (all module-specific detail classes)

  This slim schema is suitable for:
  - RO-Crate JSON-LD to D4D YAML transformations
  - Minimal dataset documentation requirements
  - Progressive enhancement (add more fields as RO-Crate coverage grows)

  See full D4D schema at: https://w3id.org/bridge2ai/data-sheets-schema

license: MIT
see_also:
  - https://bridge2ai.github.io/data-sheets-schema
  - https://www.researchobject.org/ro-crate/

prefixes:
  linkml: https://w3id.org/linkml/
  d4dslim: https://w3id.org/bridge2ai/data-sheets-schema/slim#
  dcat: http://www.w3.org/ns/dcat#
  dcterms: http://purl.org/dc/terms/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#

default_prefix: d4dslim
default_range: string

imports:
  - linkml:types

## ENUMS ##

enums:

  CompressionEnum:
    description: Compression format enumerations
    permissible_values:
      GZIP:
        description: gzip compression (.gz)
      TAR:
        description: tar archive (.tar)
      ZIP:
        description: zip compression (.zip)
      BZIP2:
        description: bzip2 compression (.bz2)
      XZ:
        description: xz compression (.xz)
      ZSTD:
        description: Zstandard compression (.zst)

## CLASSES ##

classes:

  Information:
    description: >-
      Abstract base class for information resources. Provides common metadata
      fields for datasets, collections, and other information artifacts.
    abstract: true
    slots:
      - id
      - name
      - title
      - description
      - keywords
      - language
      - license
      - doi
      - page
      - download_url
      - publisher
      - version
      - issued
      - created_on
      - created_by
      - last_updated_on
      - modified_by
      - was_derived_from
      - conforms_to
      - conforms_to_schema
      - conforms_to_class
      - compression
      - status
    # Coverage: 82.6% (19/23 attributes from RO-Crate mapping)
    # Unmapped: id, name, conforms_to_class, conforms_to_schema
    comments:
      - "RO-Crate mapping coverage: 82.6% (19/23 attributes)"
      - "Unmapped attributes: id, name, conforms_to_class, conforms_to_schema"

  Software:
    description: >-
      Information about software used in dataset creation, processing, or analysis.
    is_a: Information
    slots:
      - id
      - name
      - description
      - version
      - license
      - url
    # Coverage: 50.0% (3/6 attributes from RO-Crate mapping)
    # Unmapped: id, name, url
    comments:
      - "RO-Crate mapping coverage: 50.0% (3/6 attributes)"
      - "Unmapped attributes: id, name, url"

  DatasetCollection:
    aliases:
      - file collection
      - dataset collection
      - data resource collection
    tree_root: true
    description: >-
      A collection of related datasets, likely containing multiple files
      of multiple potential purposes and properties. This is the top-level
      container for grouping related data resources.
    exact_mappings:
      - dcat:Dataset
    close_mappings:
      - dcat:Catalog
    is_a: Information
    slots:
      - resources
    slot_usage:
      resources:
        description: >-
          Sub-resources or component datasets within this collection.
          In D4D Slim, this is simplified to a list of strings (dataset identifiers).
          In full D4D, this would reference Dataset objects.
        range: string
        multivalued: true
        required: false
    # Coverage: 83.3% (20/24 attributes from RO-Crate mapping)
    # Unmapped: id, name, conforms_to_class, conforms_to_schema
    comments:
      - "RO-Crate mapping coverage: 83.3% (20/24 attributes)"
      - "Unmapped attributes: id, name, conforms_to_class, conforms_to_schema"
      - "Note: 'resources' simplified from Dataset objects to string list for D4D Slim"

  Dataset:
    aliases:
      - data resource
      - data file
      - data package
    class_uri: dcat:Distribution
    exact_mappings:
      - schema:DataDownload
    description: >-
      A single component of related observations and/or information that can be
      read, manipulated, transformed, and otherwise interpreted. Represents a
      single data file or coherent data resource.
    is_a: Information
    slots:
      # File/Format metadata
      - bytes
      - encoding
      - format
      - compression
      - hash
      - md5
      - sha256
      - media_type
      - is_tabular
      - dialect
      - path
      # Identity & Citation
      - id
      - name
      - title
      - description
      - citation
      - doi
      - keywords
      - language
      - page
      - download_url
      # Provenance
      - was_derived_from
      - parent_datasets
      - related_datasets
      - creators
      - created_on
      - created_by
      - issued
      - last_updated_on
      - modified_by
      - publisher
      - version
      - funders
      # Conformance
      - conforms_to
      - conforms_to_schema
      - conforms_to_class
      - status
      # Motivation
      - purposes
      - tasks
      - addressing_gaps
      # Composition
      - instances
      - variables
      - subsets
      - subpopulations
      - anomalies
      - sensitive_elements
      - confidential_elements
      - known_biases
      - known_limitations
      - content_warnings
      - external_resources
      # Collection
      - collection_mechanisms
      - acquisition_methods
      - collection_timeframes
      - data_collectors
      - sampling_strategies
      - missing_data_documentation
      - raw_sources
      - raw_data_sources
      # Preprocessing
      - preprocessing_strategies
      - cleaning_strategies
      - labeling_strategies
      - imputation_protocols
      - annotation_analyses
      - machine_annotation_tools
      # Uses
      - intended_uses
      - other_tasks
      - existing_uses
      - discouraged_uses
      - prohibited_uses
      - future_use_impacts
      # Distribution
      - distribution_formats
      - distribution_dates
      - license
      - license_and_use_terms
      - extension_mechanism
      - use_repository
      - version_access
      # Maintenance
      - maintainers
      - updates
      - errata
      - retention_limit
      # Ethics & Governance
      - ethical_reviews
      - data_protection_impacts
      - ip_restrictions
      - regulatory_restrictions
      # Human Subjects
      - human_subject_research
      - informed_consent
      - vulnerable_populations
      # Deidentification
      - is_deidentified
    # Coverage: 87.9% (80/91 attributes from RO-Crate mapping)
    # Unmapped: citation, conforms_to_class, conforms_to_schema, external_resources,
    #           format, id, machine_annotation_tools, name, parent_datasets,
    #           related_datasets, variables
    comments:
      - "RO-Crate mapping coverage: 87.9% (80/91 attributes)"
      - "Unmapped attributes: citation, conforms_to_class, conforms_to_schema, external_resources, format, id, machine_annotation_tools, name, parent_datasets, related_datasets, variables"
      - "Note: Complex type references simplified to strings for D4D Slim"
      - "Note: All attributes preserved from full schema for progressive enhancement"

  DataSubset:
    description: >-
      A subset of a dataset, potentially representing a split (train/test/validation),
      a subpopulation, or another logical partition of the data.
    is_a: Dataset
    slots:
      - is_data_split
      - is_subpopulation
    slot_usage:
      is_data_split:
        description: >-
          Indicates if this subset represents a data split (e.g., train, test, validation).
        range: boolean
      is_subpopulation:
        description: >-
          Indicates if this subset represents a specific subpopulation
          (e.g., demographic group, condition).
        range: boolean
    # Coverage: 86.0% (80/93 attributes from RO-Crate mapping)
    # Inherits all Dataset attributes plus 2 additional
    # Unmapped: (same as Dataset) + is_data_split, is_subpopulation
    comments:
      - "RO-Crate mapping coverage: 86.0% (80/93 attributes)"
      - "Unmapped attributes: (inherits Dataset unmapped) + is_data_split, is_subpopulation"

## SLOTS ##

slots:

  # Identity
  id:
    identifier: true
    description: Unique identifier for the resource
    range: uriorcurie
    # Unmapped in RO-Crate

  name:
    description: Short name or label for the resource
    range: string
    # Unmapped in RO-Crate

  title:
    description: Official title of the resource
    range: string
    slot_uri: dcterms:title
    # Mapped: RO-Crate 'name'

  description:
    description: Detailed description of the resource
    range: string
    slot_uri: dcterms:description
    # Mapped: RO-Crate 'description'

  # Keywords & Language
  keywords:
    description: Keywords or tags describing the resource
    range: string
    multivalued: true
    slot_uri: schema:keywords
    # Mapped: RO-Crate 'keywords'

  language:
    description: Language in which the information is expressed
    range: string
    slot_uri: schema:inLanguage
    # Mapped: RO-Crate 'language'

  # Citation & Identifiers
  citation:
    description: Bibliographic citation for the resource
    range: string
    # Unmapped in RO-Crate

  doi:
    description: Digital Object Identifier
    range: uriorcurie
    slot_uri: schema:identifier
    # Mapped: RO-Crate 'identifier'

  # URLs & Access
  page:
    description: Landing page or documentation URL
    range: uri
    slot_uri: schema:url
    # Mapped: RO-Crate 'url'

  download_url:
    description: Direct download URL for the data
    range: uri
    slot_uri: dcat:downloadURL
    # Mapped: RO-Crate 'contentUrl'

  url:
    description: URL for the resource (used in Software)
    range: uri
    slot_uri: schema:url
    # Unmapped in RO-Crate

  # Licensing
  license:
    description: License under which the resource is distributed
    range: string
    slot_uri: dcterms:license
    # Mapped: RO-Crate 'license'

  license_and_use_terms:
    description: >-
      Detailed licensing and terms of use information, including any fees.
      Simplified to string in D4D Slim.
    range: string
    multivalued: true
    # Mapped: RO-Crate 'license' + 'conditionsOfAccess'

  # Versioning & Status
  version:
    description: Version identifier for the resource
    range: string
    slot_uri: schema:version
    # Mapped: RO-Crate 'version'

  status:
    description: Status of the resource (e.g., draft, published, deprecated)
    range: uri
    # Mapped: RO-Crate 'status'

  # Provenance - Temporal
  issued:
    description: Date of formal issuance or publication
    range: date
    slot_uri: dcterms:issued
    # Mapped: RO-Crate 'dateCreated'

  created_on:
    description: Creation date
    range: date
    slot_uri: schema:dateCreated
    # Mapped: RO-Crate 'dateCreated'

  last_updated_on:
    description: Last modification date
    range: date
    slot_uri: schema:dateModified
    # Mapped: RO-Crate 'updatedDate'

  # Provenance - Agents
  created_by:
    description: Creator or author (simplified to string in D4D Slim)
    range: string
    multivalued: true
    slot_uri: schema:creator
    # Mapped: RO-Crate 'author' / 'owner'

  modified_by:
    description: Person or agent who modified the resource
    range: string
    multivalued: true
    # Mapped: Schema.org concept

  publisher:
    description: Publisher of the resource
    range: uri
    slot_uri: schema:publisher
    # Mapped: RO-Crate 'publisher'

  creators:
    description: >-
      Who created the dataset (team, research group) and on behalf of which entity.
      Simplified to string in D4D Slim.
    range: string
    multivalued: true
    # Mapped: RO-Crate 'author'

  funders:
    description: Funding sources (simplified to string in D4D Slim)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'funders'

  # Provenance - Derivation
  was_derived_from:
    description: Resource from which this was derived
    range: string
    slot_uri: prov:wasDerivedFrom
    # Mapped: RO-Crate 'generatedBy'

  parent_datasets:
    description: Parent or source datasets (simplified to strings in D4D Slim)
    range: string
    multivalued: true
    # Unmapped in RO-Crate

  related_datasets:
    description: Related datasets (simplified to strings in D4D Slim)
    range: string
    multivalued: true
    # Unmapped in RO-Crate

  # Conformance
  conforms_to:
    description: Standards or specifications this resource conforms to
    range: uri
    slot_uri: dcterms:conformsTo
    # Mapped: RO-Crate Spec URL

  conforms_to_schema:
    description: Schema this resource conforms to
    range: uri
    # Unmapped in RO-Crate

  conforms_to_class:
    description: Class or type this resource conforms to
    range: uriorcurie
    # Unmapped in RO-Crate

  # File/Format Metadata
  bytes:
    description: Size in bytes
    range: integer
    slot_uri: schema:contentSize
    # Mapped: RO-Crate 'contentSize'

  compression:
    description: Compression format
    range: CompressionEnum
    # Mapped: Conversion from RO-Crate 'evi:formats'

  encoding:
    description: Character encoding
    range: string
    slot_uri: schema:encoding
    # Mapped: RO-Crate 'evi:formats'

  format:
    description: File format (simplified to string in D4D Slim)
    range: string
    # Unmapped in RO-Crate

  media_type:
    description: MIME type of the data
    range: string
    slot_uri: schema:encodingFormat
    # Transformation possible from RO-Crate 'formats'

  hash:
    description: Hash value of the data
    range: string
    # Mapped: RO-Crate 'md5'

  md5:
    description: MD5 hash
    range: string
    # Mapped: RO-Crate 'md5'

  sha256:
    description: SHA-256 hash
    range: string
    # Mapped: RO-Crate 'sha256'

  is_tabular:
    description: Indicates if data is in tabular format
    range: boolean
    # Calculable from RO-Crate format info

  dialect:
    description: >-
      Format dialect information (CSV headers, delimiter, etc.).
      Simplified to string in D4D Slim.
    range: string
    # Transformation from RO-Crate 'format' + 'schema'

  path:
    description: File path within the dataset
    range: string
    # Unmapped in RO-Crate

  # Collection Section
  resources:
    description: Sub-resources or component datasets (simplified to strings)
    range: string
    multivalued: true
    # Transformation possible

  # Motivation
  purposes:
    description: Purpose for which the dataset was created
    range: string
    multivalued: true
    # Transformation from RO-Crate 'rai:dataUseCases'

  tasks:
    description: Specific task the dataset was intended for
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataUseCases'

  addressing_gaps:
    description: Specific gap the dataset was created to fill
    range: string
    multivalued: true
    # Mapped: RO-Crate '*addressingGaps'

  # Composition
  instances:
    description: >-
      What the instances in the dataset represent (e.g., documents, photos, people).
      Simplified to string in D4D Slim.
    range: string
    multivalued: true
    # Transformation possible from summary stats

  variables:
    description: Variables or features in the dataset (simplified to strings)
    range: string
    multivalued: true
    # Unmapped in RO-Crate

  subsets:
    description: Subsets within the dataset (simplified to strings)
    range: string
    multivalued: true
    # Gap in RO-Crate

  subpopulations:
    description: Subpopulations identified in the dataset (simplified to strings)
    range: string
    multivalued: true
    # Transformation possible from summary stats

  anomalies:
    description: Known anomalies in the data (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate '*anomalies'

  sensitive_elements:
    description: >-
      Sensitive data elements present (e.g., race, religion, biometrics).
      Simplified to string in D4D Slim.
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:personalSensitiveInformation'

  confidential_elements:
    description: Confidential data elements (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:personalSensitiveInformation'

  known_biases:
    description: Known biases in the data (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'dataBiases'

  known_limitations:
    description: Known limitations of the dataset (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'dataLimitations'

  content_warnings:
    description: >-
      Warnings about potentially offensive, threatening, or anxiety-provoking content.
      Simplified to string in D4D Slim.
    range: string
    multivalued: true
    # Mapped: RO-Crate '*contentWarnings'

  external_resources:
    description: External resources the dataset depends on (simplified to strings)
    range: string
    multivalued: true
    # Unmapped in RO-Crate

  # Collection Process
  collection_mechanisms:
    description: Mechanisms used to collect the data (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataCollection', 'rai:dataCollectionType'

  acquisition_methods:
    description: Acquisition methods used (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataCollection', 'rai:dataCollectionType'

  collection_timeframes:
    description: Timeframe over which data was collected (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'dataCollectionTimeframe'

  data_collectors:
    description: >-
      Who was involved in data collection and how they were compensated.
      Simplified to string in D4D Slim.
    range: string
    multivalued: true
    # Transformation possible

  sampling_strategies:
    description: Sampling strategies used (simplified to strings)
    range: string
    multivalued: true
    # Gap in RO-Crate

  missing_data_documentation:
    description: >-
      Documentation of missing data patterns and causes (simplified to strings).
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataCollectionMissingData'

  raw_sources:
    description: Raw data sources (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataCollectionRawData'

  raw_data_sources:
    description: >-
      Description of raw data sources before preprocessing (simplified to strings).
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataCollectionRawData'

  # Preprocessing
  preprocessing_strategies:
    description: Preprocessing steps applied (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataPreprocessingProtocol'

  cleaning_strategies:
    description: Data cleaning procedures (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataManipulationProtocol'

  labeling_strategies:
    description: Labeling/annotation procedures (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataAnnotationProtocol'

  imputation_protocols:
    description: Data imputation methodology (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:imputationProtocol'

  annotation_analyses:
    description: >-
      Analysis of annotation quality and inter-annotator agreement (simplified).
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataAnnotationAnalysis'

  machine_annotation_tools:
    description: Automated annotation tools used (simplified to strings)
    range: string
    multivalued: true
    # Unmapped in RO-Crate

  # Uses
  intended_uses:
    description: Intended uses for the dataset (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataUseCases'

  other_tasks:
    description: Other potential tasks for the dataset (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataUseCases'

  existing_uses:
    description: Tasks the dataset has already been used for (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataUseCases'

  discouraged_uses:
    description: Tasks the dataset should not be used for (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'prohibitedUses'

  prohibited_uses:
    description: >-
      Explicitly forbidden uses (stronger than discouraged). Simplified to strings.
    range: string
    multivalued: true
    # Mapped: RO-Crate 'prohibitedUses'

  future_use_impacts:
    description: >-
      Potential impacts or risks from future uses (simplified to strings).
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataSocialImpact'

  # Distribution
  distribution_formats:
    description: Distribution formats available (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'evi:formats'

  distribution_dates:
    description: Dates when the dataset will be distributed (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'dateCreated'

  extension_mechanism:
    description: >-
      Mechanism for extending or contributing to the dataset (simplified to string).
    range: string
    multivalued: true
    # Transformation from RO-Crate 'license', 'conditionsOfAccess'

  use_repository:
    description: >-
      Repository linking to papers/systems using the dataset (simplified to string).
    range: string
    multivalued: true
    # Transformation possible from RO-Crate software references

  version_access:
    description: >-
      Information about access to older versions (simplified to string).
    range: string
    multivalued: true
    # Transformation from RO-Crate 'version'

  # Maintenance
  maintainers:
    description: Who maintains/hosts the dataset (simplified to strings)
    range: string
    multivalued: true
    # Transformation possible

  updates:
    description: Update and maintenance plans (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataReleaseMaintenancePlan'

  errata:
    description: Known errors and corrections (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'correction'

  retention_limit:
    description: Data retention policy (simplified to string)
    range: string
    multivalued: true
    # Gap in RO-Crate

  # Ethics & Governance
  ethical_reviews:
    description: >-
      Ethical or compliance reviews conducted (e.g., IRB). Simplified to strings.
    range: string
    multivalued: true
    # Mapped: RO-Crate 'ethicalReview'

  data_protection_impacts:
    description: >-
      Data protection impact analysis conducted (simplified to strings).
    range: string
    multivalued: true
    # Mapped: RO-Crate 'rai:dataSocialImpact'

  ip_restrictions:
    description: Intellectual property restrictions (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'license', 'conditionsOfAccess'

  regulatory_restrictions:
    description: Regulatory restrictions on data use (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate 'confidentiality_level'

  # Human Subjects
  human_subject_research:
    description: >-
      Information about human subjects research involvement (simplified to string).
    range: string
    multivalued: true
    # Mapped: RO-Crate 'humanSubject'

  informed_consent:
    description: Informed consent procedures (simplified to strings)
    range: string
    multivalued: true
    # Mapped: RO-Crate '*informedConsent'

  vulnerable_populations:
    description: >-
      Protections for at-risk populations (simplified to strings).
    range: string
    multivalued: true
    # Mapped: RO-Crate 'atRiskPopulations'

  # Deidentification
  is_deidentified:
    description: Indicates if data has been deidentified
    range: boolean
    # Transformation from RO-Crate 'confidentiality_level'

  # DataSubset-specific
  is_data_split:
    description: Indicates if subset represents a data split (train/test/val)
    range: boolean
    # Unmapped in RO-Crate

  is_subpopulation:
    description: Indicates if subset represents a subpopulation
    range: boolean
    # Unmapped in RO-Crate
