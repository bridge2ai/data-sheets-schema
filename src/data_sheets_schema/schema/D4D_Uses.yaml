id: "https://w3id.org/bridge2ai/data-sheets-schema/uses"
name: "data-sheets-schema-uses"
title: "Datasheets for Datasets – Uses Module"
description: >
  Subschema for data uses–related information in Datasheets for Datasets.
  The questions in this section are intended to encourage dataset creators
  to reflect on the tasks for which the dataset should (and should not) be used.
annotations:
  "d4d:section_question": "Has the dataset been used for any tasks already?"
license: MIT
see_also:
  - "https://bridge2ai.github.io/data-sheets-schema"


imports:
  - D4D_Base_import


# Subsets are defined in the main schema


prefixes:
  d4d: "https://w3id.org/bridge2ai/data-sheets-schema/"
  linkml: "https://w3id.org/linkml/"
  d4duses: "https://w3id.org/bridge2ai/data-sheets-schema/uses#"
  schema: "http://schema.org/"
  dcterms: "http://purl.org/dc/terms/"


default_prefix: "d4duses"


# ------------------------------------------------------------------------------
# Classes
# ------------------------------------------------------------------------------


classes:


  ExistingUse:
    description: >
      Has the dataset been used for any tasks already?
    is_a: DatasetProperty
    attributes:
      examples:
        description: "List of examples of known/previous uses of the dataset."
        slot_uri: schema:example
        range: string
        multivalued: true
        annotations:
          "d4d:docExample": "Used in NEJM 2024 paper on CGM patterns in T2DM (DOI: 10.1056/NEJMoa2404007)"


  UseRepository:
    description: >-
      A repository or registry of known uses of this dataset by third parties. Documents where the dataset has been applied, enabling discoverability of downstream use cases and impact tracking.
    is_a: DatasetProperty
    attributes:
      repository_url:
        description: "URL to a repository of known dataset uses."
        range: uri
        annotations:
          "d4d:docExample": "https://paperswithcode.com/dataset/ai-readi"
      repository_details:
        description: >
          Free-text description of the repository of known dataset uses, including
          how it is maintained and how to contribute new use cases.
        range: string
        multivalued: true
        slot_uri: dcterms:description


  OtherTask:
    description: >
      What other tasks could the dataset be used for?
    is_a: DatasetProperty
    attributes:
      task_details:
        description: >
          Free-text description of other potential tasks the dataset could support,
          including any prerequisites or limitations for those uses.
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "Longitudinal disease trajectory modeling"


  FutureUseImpact:
    description: >
      Is there anything about the dataset's composition or collection
      that might impact future uses or create risks/harm (e.g., unfair
      treatment, legal or financial risks)? If so, describe these
      impacts and any mitigation strategies.
    is_a: DatasetProperty
    exact_mappings:
      - rai:dataSocialImpact
    attributes:
      impact_details:
        description: >
          Free-text description of potential future impacts or risks arising from the
          dataset's composition or collection (e.g., unfair treatment, privacy violations,
          legal or financial risks), and any recommended mitigation strategies.
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "Models trained on this data may reinforce existing health disparities if deployed without fairness audits"


  DiscouragedUse:
    description: >
      Are there tasks for which the dataset should not be used?
    is_a: DatasetProperty
    attributes:
      discouragement_details:
        description: >
          Free-text description of tasks or applications for which the dataset is
          not recommended, with explanation of why (e.g., out-of-scope, risk of harm,
          poor coverage).
        range: string
        multivalued: true
        slot_uri: dcterms:description
        annotations:
          "d4d:docExample": "Not recommended for clinical diagnosis without additional validation"


  IntendedUse:
    description: >
      Explicit statement of intended uses for this dataset. Complements
      FutureUseImpact by focusing on positive, recommended applications
      rather than risks. Aligns with RO-Crate "Intended Use" field.
    is_a: DatasetProperty
    exact_mappings:
      - rai:dataUseCases
    attributes:
      examples:
        description: >-
          List of example intended uses for this dataset.
        range: string
        multivalued: true
        annotations:
          "d4d:docExample": "Training fairness-aware ML models for T2DM prediction"
      usage_notes:
        description: >-
          A note or caveat about using the dataset for its intended purposes.
        range: string
        annotations:
          "d4d:docExample": "Models should be evaluated for fairness across racial/ethnic subgroups before clinical deployment"
      use_category:
        description: >-
          One or more categories of intended use (e.g., research, clinical, educational,
          commercial, policy).
        slot_uri: d4d:useCategory
        range: string
        multivalued: true
        annotations:
          "d4d:docExample": "academic research"


  ProhibitedUse:
    description: >
      Explicit statement of prohibited or forbidden uses for this dataset.
      Stronger than DiscouragedUse - these are uses that are explicitly
      not permitted by license, ethics, or policy. Aligns with RO-Crate
      "Prohibited Uses" field.
    is_a: DatasetProperty
    attributes:
      prohibition_reason:
        description: >-
          One or more reasons why this use is prohibited (e.g., license restriction,
          ethical concern, privacy risk, legal constraint).
        slot_uri: d4d:prohibitionReason
        range: string
        multivalued: true
        annotations:
          "d4d:docExample": "Re-identification of participants is strictly prohibited"