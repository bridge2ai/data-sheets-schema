---
id: "https://w3id.org/bridge2ai/data-sheets-schema/base"
name: "data-sheets-schema-base"
title: "Datasheets for Datasets – Base Schema"
description: >
  Base schema containing reusable classes, slots, types, and enums shared
  across all D4D modules. This provides common definitions for DatasetProperty,
  Person, Organization, Software, and other foundational elements.
license: MIT
see_also:
  - "https://bridge2ai.github.io/data-sheets-schema"

prefixes:
  biolink: https://w3id.org/biolink/vocab/
  d4d: https://w3id.org/bridge2ai/data-sheets-schema/
  data_sheets_schema: https://w3id.org/bridge2ai/data-sheets-schema/
  datasets: https://w3id.org/linkml/report
  dcat: http://www.w3.org/ns/dcat#
  dcterms: http://purl.org/dc/terms/
  example: https://example.org/
  linkml: https://w3id.org/linkml/
  mediatypes: https://www.iana.org/assignments/media-types/
  prov: http://www.w3.org/ns/prov#
  qudt: http://qudt.org/schema/qudt/
  rai: http://mlcommons.org/croissant/RAI/
  schema: http://schema.org/
  sh: https://w3id.org/shacl/
  skos: http://www.w3.org/2004/02/skos/core#
  AIO: https://w3id.org/aio/

default_prefix: data_sheets_schema
default_range: string

imports:
  - linkml:types

## SUBSETS ##
subsets:
  Motivation:
    description: >-
      The questions in this section are primarily intended to encourage dataset
      creators to clearly articulate their reasons for creating the dataset and
      to promote transparency about funding interests. The latter may be
      particularly relevant for datasets created for research purposes.
  Composition:
    description: >-
      The questions in this section are intended to provide dataset consumers
      with the information they need to make informed decisions about using the
      dataset for their chosen tasks. Some of the questions are designed to
      elicit information about compliance with applicable data protection
      regulations and privacy requirements.
  Collection:
    description: >-
      The questions in this section are designed to elicit information that may
      help researchers and practitioners to create alternative datasets with
      similar characteristics.
  Preprocessing-Cleaning-Labeling:
    description: >-
      The questions in this section are intended to provide dataset consumers
      with the information they need to determine whether the "raw" data has
      been processed in ways that are compatible with their chosen tasks.
  Uses:
    description: >-
      The questions in this section are intended to encourage dataset creators
      to reflect on the tasks for which the dataset should and should not be
      used.
  Distribution:
    description: >-
      The questions in this section pertain to dataset distribution.
  Maintenance:
    description: >-
      The questions in this section are intended to encourage dataset creators
      to plan for dataset maintenance and communicate this plan to dataset
      consumers.
  Ethics:
    description: >-
      The questions in this section address ethical and data-protection concerns,
      including review by institutional bodies, consent and notification to data
      subjects, and potential impacts on data-protection rights.
  DataGovernance:
    description: >-
      The questions in this section relate to how the dataset is governed:
      how it is distributed, licensed, and maintained over time, plus
      third-party restrictions and update policies.

## BASE CLASSES ##
classes:

  # Core base class for all identifiable entities
  NamedThing:
    description: >-
      A generic grouping for any identifiable entity.
    attributes:
      id:
        identifier: true
        slot_uri: schema:identifier
        range: uriorcurie
        description: A unique identifier for a thing.
        annotations:
          "d4d:docExample": "https://example.org/dataset/my-dataset-001"
      name:
        slot_uri: schema:name
        description: A human-readable name for a thing.
        range: string
      description:
        slot_uri: schema:description
        description: A human-readable description for a thing.
        range: string
    class_uri: schema:Thing

  Organization:
    is_a: NamedThing
    class_uri: schema:Organization
    description: >-
      Represents a group or organization.

  # Base class for all dataset properties and components
  # Note: Does NOT inherit from NamedThing to avoid required id constraint
  DatasetProperty:
    description: "Represents a single property of a dataset, or a set of related properties."
    attributes:
      id:
        slot_uri: schema:identifier
        range: uriorcurie
        description: An optional identifier for this property.
        annotations:
          "d4d:docExample": "https://example.org/dataset/property-001"
      name:
        slot_uri: schema:name
        description: A human-readable name for this property.
        range: string
      description:
        slot_uri: schema:description
        description: A human-readable description for this property.
        range: string
      used_software:
        description: "What software was used as part of this dataset property?"
        slot_uri: d4d:usedSoftware
        range: Software
        multivalued: true
        inlined_as_list: true

  Software:
    description: "A software program or library."
    is_a: NamedThing
    class_uri: schema:SoftwareApplication
    exact_mappings:
      - schema:SoftwareApplication
    attributes:
      version:
        description: The version identifier of the software (e.g., "1.0.0", "2.3.1-beta").
        range: string
        slot_uri: schema:softwareVersion
      license:
        description: >-
          The license under which the software is distributed (e.g., "MIT", "Apache-2.0", "GPL-3.0").
        range: string
        slot_uri: schema:license
      url:
        description: URL where the software can be found (e.g., homepage, repository, or documentation).
        range: uri
        slot_uri: schema:url

  Person:
    description: >-
      An individual human being. This class represents a person in the context
      of a specific dataset. Attributes like affiliation and email represent
      the person's current or most relevant contact information for this dataset.
      For stable cross-dataset identification, use the ORCID field. Note that
      contributor roles (CRediT) are specified in the usage context (e.g., Creator class)
      rather than on the Person directly, since roles vary by dataset.
    is_a: NamedThing
    class_uri: schema:Person
    attributes:
      affiliation:
        description: >-
          The organization(s) to which the person belongs in the context of this dataset.
          May vary across datasets; multivalued to support multiple affiliations.
        range: Organization
        multivalued: true
        slot_uri: schema:affiliation
      email:
        description: >-
          The email address of the person. Represents current/preferred contact
          information in the context of this dataset.
        range: string
        slot_uri: schema:email
      orcid:
        description: >-
          ORCID (Open Researcher and Contributor ID) - a persistent digital identifier
          for researchers. Format: 0000-0000-0000-0000 (16 digits in groups of 4).
          Use this for stable cross-dataset identification.
        range: string
        pattern: "^\\d{4}-\\d{4}-\\d{4}-\\d{3}[0-9X]$"
        slot_uri: d4d:orcidIdentifier
        annotations:
          "d4d:docExample": "0000-0001-2345-6789"
        broad_mappings:
          - schema:identifier

  Information:
    description: "Grouping for datasets and data files"
    close_mappings:
      - schema:CreativeWork
    is_a: NamedThing
    slots:
      - compression
      - conforms_to
      - conforms_to_class
      - conforms_to_schema
      - created_by
      - created_on
      - doi
      - download_url
      - issued
      - keywords
      - language
      - last_updated_on
      - license
      - modified_by
      - page
      - publisher
      - status
      - title
      - version
      - was_derived_from

  # From linkml Datasets schema
  FormatDialect:
    description: Additional format information for a file.
    attributes:
      comment_prefix:
        description: Character(s) used to indicate comment lines (e.g., "#" for CSV comments).
      delimiter:
        description: Field delimiter character (e.g., "," for CSV, "\t" for TSV).
      double_quote:
        description: >-
          Whether quotes within quoted fields are escaped by doubling them.
          Expected values: "true" or "false" (as strings per CSV dialect specification).
          Follows the W3C CSV-on-the-Web dialect specification.
      header:
        description: >-
          Whether the first row of the file contains column headers.
          Expected values: "true" or "false" (as strings per CSV dialect specification).
          Follows the W3C CSV-on-the-Web dialect specification.
      quote_char:
        description: Character used for quoting fields (e.g., '"' for CSV).

## SHARED SLOTS ##
slots:

  # The majority of these slots are adapted from
  # the linkml Datasets schema - see
  # https://github.com/linkml/linkml-model/blob/main/linkml_model/model/schema/datasets.yaml

  title:
    description: The official title of the element.
    slot_uri: dcterms:title

  language:
    description: Language in which the information is expressed.
    slot_uri: dcterms:language
    exact_mappings:
      - schema:inLanguage

  publisher:
    description: The organization or entity responsible for making the resource available.
    slot_uri: dcterms:publisher
    range: uriorcurie
    annotations:
      "d4d:docExample": "ror:04t3en479  # use a ROR ID, DOI, or URL — not a plain name"

  issued:
    description: Date of formal issuance or publication of the resource.
    slot_uri: dcterms:issued
    range: datetime

  page:
    description: A landing page or web page providing access to or information about the resource.
    slot_uri: dcat:landingPage

  dialect:
    description: Specific format dialect or variation (e.g., CSV dialect, JSON-LD profile).
    slot_uri: schema:encodingFormat

  bytes:
    description: Size of the data in bytes.
    range: integer
    slot_uri: dcat:byteSize

  path:
    description: The file path or URL where the content is located.
    slot_uri: schema:contentUrl

  download_url:
    description: >-
      URL from which the data can be downloaded. This is not the same as the
      landing page, which is a page that describes the dataset. Rather, this
      URL points directly to the data itself.
    range: uri
    slot_uri: dcat:downloadURL
    exact_mappings:
      - schema:url

  format:
    description: >-
      The file format, physical medium, or dimensions of a resource. This should
      be a file extension or MIME type.
    range: FormatEnum
    slot_uri: dcterms:format

  encoding:
    description: The character encoding of the data.
    range: EncodingEnum
    slot_uri: d4d:characterEncoding

  compression:
    description: Compression format used, if any (e.g., gzip, bzip2, zip).
    range: CompressionEnum
    slot_uri: dcat:compressFormat

  media_type:
    description: >-
      The media type of the data. This should be a MIME type.
    range: MediaTypeEnum
    slot_uri: dcat:mediaType
    exact_mappings:
      - schema:encodingFormat

  hash:
    description: >-
      Cryptographic hash value of the data for integrity verification
      (e.g., SHA-256: 'e3b0c44298fc1c149afb...', MD5: 'd41d8cd98f00b204e9800998ecf8427e').
    slot_uri: d4d:hashValue
    broad_mappings:
      - dcterms:identifier

  md5:
    description: MD5 hash value of the data (128-bit cryptographic hash).
    slot_uri: d4d:md5Checksum
    broad_mappings:
      - dcterms:identifier

  sha256:
    description: SHA-256 hash value of the data (256-bit cryptographic hash, recommended).
    slot_uri: schema:sha256

  conforms_to:
    description: An established standard, specification, or schema to which the resource conforms.
    slot_uri: dcterms:conformsTo

  conforms_to_schema:
    description: The schema or data model to which the resource conforms.
    slot_uri: d4d:conformsToSchema
    broad_mappings:
      - dcterms:conformsTo

  conforms_to_class:
    description: The specific class or type within a schema to which the resource conforms.
    slot_uri: d4d:conformsToClass
    broad_mappings:
      - dcterms:conformsTo

  license:
    description: The legal license under which the resource is made available (e.g., "MIT", "CC-BY-4.0").
    slot_uri: dcterms:license

  keywords:
    description: Keywords or tags describing the resource for discovery and classification.
    multivalued: true
    slot_uri: dcat:keyword

  version:
    description: The version identifier of the resource (e.g., "1.0", "2.3.1").
    slot_uri: schema:version

  created_by:
    description: The person or organization primarily responsible for creating the resource.
    slot_uri: dcterms:creator

  created_on:
    description: The date and time when the resource was created.
    slot_uri: dcterms:created
    range: datetime

  last_updated_on:
    description: The date and time when the resource was most recently modified or updated.
    slot_uri: dcterms:modified
    range: datetime

  modified_by:
    description: A person or organization that contributed to modifying or updating the resource.
    slot_uri: dcterms:contributor

  status:
    description: The status of the resource (e.g., draft, published, deprecated).
    slot_uri: d4d:publicationStatus

  was_derived_from:
    description: A resource from which this resource was derived, in whole or in part.
    slot_uri: prov:wasDerivedFrom
    exact_mappings:
      - dcterms:source

  doi:
    description: >-
      Digital Object Identifier (DOI) in format 10.xxxx/xxxxx providing persistent identification
      (e.g., '10.1038/s41586-020-2649-2', '10.5281/zenodo.1234567').
    slot_uri: d4d:doiIdentifier
    pattern: "10\\.\\d{4,}\\/.+"
    broad_mappings:
      - dcterms:identifier
    exact_mappings:
      - schema:identifier

  external_resources:
    description: >-
      Links or identifiers for external resources. Can be used either as a list
      of ExternalResource objects (in Dataset) or as a list of URL strings
      (within ExternalResource class).
    multivalued: true
    slot_uri: dcterms:references

  resources:
    description: >-
      Sub-resources or component items. In DatasetCollection, contains Dataset objects.
      In Dataset, contains nested Dataset objects. In FileCollection, contains nested
      FileCollection objects. The specific range is defined via slot_usage in each class.
    range: Dataset
    multivalued: true
    slot_uri: schema:hasPart

## SHARED ENUMS ##
enums:

  FormatEnum:
    description: Common file format extensions for data files and documents.
    permissible_values:
      CSV:
        description: Comma-Separated Values - tabular data format.
      TSV:
        description: Tab-Separated Values - tabular data format with tab delimiters.
      XML:
        description: Extensible Markup Language - structured markup format.
      JSON:
        description: JavaScript Object Notation - structured data interchange format.
      JSONL:
        description: JSON Lines - newline-delimited JSON format.
      YAML:
        description: YAML Ain't Markup Language - human-readable data serialization format.
      HTML:
        description: HyperText Markup Language - web page markup format.
      PDF:
        description: Portable Document Format - fixed-layout document format.
      DOCX:
        description: Microsoft Word Open XML Document - word processing document.
      XLSX:
        description: Microsoft Excel Open XML Spreadsheet - spreadsheet format.
      PPTX:
        description: Microsoft PowerPoint Open XML Presentation - presentation format.
      TXT:
        description: Plain text file.
      MD:
        description: Markdown - lightweight markup language.
      ZIP:
        description: ZIP archive - compressed file container.
      TAR:
        description: Tape Archive - file archive format.
      GZ:
        description: Gzip compressed file.
      BZ2:
        description: Bzip2 compressed file.
      XZ:
        description: XZ compressed file.

  MediaTypeEnum:
    description: MIME media types (Internet Media Types) for file content identification.
    permissible_values:
      text/csv:
        description: MIME type for CSV (Comma-Separated Values) files.
      text/tab-separated-values:
        description: MIME type for TSV (Tab-Separated Values) files.
      application/json:
        description: MIME type for JSON (JavaScript Object Notation) files.
      application/xml:
        description: MIME type for XML (Extensible Markup Language) files.
      text/xml:
        description: Alternative MIME type for XML files (text variant).
      application/yaml:
        description: MIME type for YAML files.
      text/yaml:
        description: Alternative MIME type for YAML files (text variant).
      text/html:
        description: MIME type for HTML (HyperText Markup Language) files.
      application/pdf:
        description: MIME type for PDF (Portable Document Format) files.
      application/vnd.openxmlformats-officedocument.wordprocessingml.document:
        description: MIME type for Microsoft Word DOCX files.
      application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
        description: MIME type for Microsoft Excel XLSX files.
      application/vnd.openxmlformats-officedocument.presentationml.presentation:
        description: MIME type for Microsoft PowerPoint PPTX files.
      text/plain:
        description: MIME type for plain text files.
      text/markdown:
        description: MIME type for Markdown files.
      application/zip:
        description: MIME type for ZIP archive files.
      application/x-tar:
        description: MIME type for TAR archive files.
      application/gzip:
        description: MIME type for Gzip compressed files.
      application/x-bzip2:
        description: MIME type for Bzip2 compressed files.
      application/x-xz:
        description: MIME type for XZ compressed files.

  CompressionEnum:
    description: Compression algorithms and formats for file compression.
    permissible_values:
      gzip:
        description: GNU zip compression (commonly used with .gz extension).
      bzip2:
        description: Burrows-Wheeler block-sorting compression (commonly used with .bz2 extension).
      zip:
        description: ZIP archive compression format.
      tar:
        description: Tape Archive format (typically combined with gzip or bzip2).
      xz:
        description: XZ Utils compression using LZMA2 algorithm.
      lzma:
        description: Lempel-Ziv-Markov chain algorithm compression.
      compress:
        description: Unix compress utility (LZW compression).

  EncodingEnum:
    description: Character encoding schemes for text representation in different languages and scripts.
    permissible_values:
      ASCII:
        description: American Standard Code for Information Interchange (7-bit, English characters only).
      Big5:
        description: Traditional Chinese character encoding (primarily Taiwan and Hong Kong).
      EUC-JP:
        description: Extended Unix Code for Japanese.
      EUC-KR:
        description: Extended Unix Code for Korean.
      EUC-TW:
        description: Extended Unix Code for Traditional Chinese.
      GB2312:
        description: Simplified Chinese character encoding standard.
      HZ-GB-2312:
        description: 7-bit encoding for Simplified Chinese (GB2312)
      ISO-2022-CN-EXT:
        description: Extended ISO-2022 encoding for Chinese (includes both Simplified and Traditional).
      ISO-2022-CN:
        description: ISO-2022 encoding for Chinese.
      ISO-2022-JP-2:
        description: Extended ISO-2022 encoding for Japanese (includes additional character sets).
      ISO-2022-JP:
        description: ISO-2022 encoding for Japanese.
      ISO-2022-KR:
        description: ISO-2022 encoding for Korean.
      ISO-8859-10:
        description: Latin-6 (Nordic languages - Danish, Norwegian, Swedish, Icelandic).
      ISO-8859-11:
        description: Latin/Thai encoding.
      ISO-8859-13:
        description: Latin-7 (Baltic Rim languages).
      ISO-8859-14:
        description: Latin-8 (Celtic languages).
      ISO-8859-15:
        description: Latin-9 (Western European with Euro sign).
      ISO-8859-16:
        description: Latin-10 (South-Eastern European languages).
      ISO-8859-1:
        description: Latin-1 (Western European languages).
      ISO-8859-2:
        description: Latin-2 (Central European languages).
      ISO-8859-3:
        description: Latin-3 (South European languages - Turkish, Maltese, Esperanto).
      ISO-8859-4:
        description: Latin-4 (North European languages).
      ISO-8859-5:
        description: Latin/Cyrillic encoding.
      ISO-8859-6:
        description: Latin/Arabic encoding.
      ISO-8859-7:
        description: Latin/Greek encoding.
      ISO-8859-8:
        description: Latin/Hebrew encoding.
      ISO-8859-9:
        description: Latin-5 (Turkish).
      KOI8-R:
        description: Russian character encoding (Kod Obmena Informatsiey).
      KOI8-U:
        description: Ukrainian character encoding.
      Shift_JIS:
        description: Japanese character encoding (Microsoft and other systems).
      UTF-16:
        description: Unicode Transformation Format 16-bit (variable-width encoding).
      UTF-32:
        description: Unicode Transformation Format 32-bit (fixed-width encoding).
      UTF-7:
        description: Unicode Transformation Format 7-bit (for 7-bit channels).
      UTF-8:
        description: Unicode Transformation Format 8-bit (variable-width, most common Unicode encoding).
      Windows-1250:
        description: Windows code page for Central European languages.
      Windows-1251:
        description: Windows code page for Cyrillic script.
      Windows-1252:
        description: Windows code page for Western European languages.
      Windows-1253:
        description: Windows code page for Greek.
      Windows-1254:
        description: Windows code page for Turkish.
      Windows-1255:
        description: Windows code page for Hebrew.
      Windows-1256:
        description: Windows code page for Arabic.
      Windows-1257:
        description: Windows code page for Baltic languages.
      Windows-1258:
        description: Windows code page for Vietnamese.

  CRediTRoleEnum:
    description: >-
      Contributor roles based on the CRediT (Contributor Roles Taxonomy).
      See https://credit.niso.org/
    permissible_values:
      conceptualization:
        description: Ideas; formulation or evolution of overarching research goals and aims.
      methodology:
        description: Development or design of methodology; creation of models.
      software:
        description: Programming, software development; designing computer programs.
      validation:
        description: Verification of the overall replication/reproducibility of results.
      formal_analysis:
        description: Application of statistical, mathematical, or other formal techniques.
      investigation:
        description: Conducting the research and investigation process.
      resources:
        description: Provision of study materials, reagents, patients, laboratory samples, etc.
      data_curation:
        description: Management activities to annotate, scrub data and maintain research data.
      writing_original_draft:
        description: Preparation, creation and/or presentation of the published work.
      writing_review_editing:
        description: Critical review, commentary or revision of the work.
      visualization:
        description: Preparation, creation and/or presentation of visualizations/data presentation.
      supervision:
        description: Oversight and leadership responsibility for the research activity.
      project_administration:
        description: Management and coordination responsibility for the research activity.
      funding_acquisition:
        description: Acquisition of the financial support for the project.

  BiasTypeEnum:
    description: >-
      Types of bias that may be present in datasets. Values are mapped to the
      Artificial Intelligence Ontology (AIO) bias taxonomy from BioPortal.
      See https://bioportal.bioontology.org/ontologies/AIO
    permissible_values:
      selection_bias:
        description: >-
          Bias arising from non-random selection of data or participants.
        broad_mappings:
          - AIO:SelectionAndSamplingBias
      measurement_bias:
        description: >-
          Bias in how data is measured or recorded. Occurs when features and
          labels are proxies for desired quantities, potentially leading to
          differential performance.
        meaning: AIO:MeasurementBias
      historical_bias:
        description: >-
          Bias reflecting historical inequities or societal biases. Long-standing
          biases encoded in society over time.
        meaning: AIO:HistoricalBias
      representation_bias:
        description: >-
          Certain groups are over- or under-represented in the data. Results from
          non-random sampling of subgroups making trends non-generalizable to
          new populations.
        meaning: AIO:RepresentationBias
      aggregation_bias:
        description: >-
          Bias from inappropriately combining distinct groups. Related to making
          inferences about individuals based on their group membership.
        broad_mappings:
          - AIO:EcologicalFallacyBias
      algorithmic_bias:
        description: >-
          Bias introduced or amplified by algorithmic processing. Computational
          bias from data analysis processes and methods.
        broad_mappings:
          - AIO:ProcessingBias
          - AIO:ComputationalBias
      sampling_bias:
        description: >-
          Bias from sampling methodology not representative of the population.
        broad_mappings:
          - AIO:SelectionAndSamplingBias
      annotation_bias:
        description: >-
          Bias introduced during data labeling or annotation. Occurs when
          annotators rely on heuristics or exhibit systematic patterns in
          labeling.
        broad_mappings:
          - AIO:AnnotatorReportingBias
      confirmation_bias:
        description: >-
          Bias from seeking data that confirms pre-existing beliefs. Tendency
          to prefer information that confirms existing beliefs, influencing the
          search for, interpretation of, and recall of information.
        meaning: AIO:ConfirmationBias

  LimitationTypeEnum:
    description: >-
      Types of limitations that may affect dataset use or interpretation.
      Distinct from biases (systematic errors) and anomalies (data quality issues).
    permissible_values:
      scope_limitation:
        description: >-
          Dataset does not cover all intended use cases or populations.
          The scope of the dataset is narrower than the intended application domain.
      temporal_limitation:
        description: >-
          Dataset is limited to specific time periods. Data may not reflect
          current conditions or may not be applicable to other time periods.
      coverage_limitation:
        description: >-
          Dataset has incomplete coverage of target domain. Missing data points,
          categories, or geographic regions within the intended scope.
      methodological_limitation:
        description: >-
          Data collection methodology introduces constraints. Limitations arising
          from how data was gathered, measured, or processed.
      representativeness_limitation:
        description: >-
          Dataset may not be representative of target population. Sample may not
          accurately reflect the broader population of interest.
      resolution_limitation:
        description: >-
          Data granularity or resolution is insufficient for some uses. Level of
          detail may not support fine-grained analysis or specific applications.
      integration_limitation:
        description: >-
          Challenges in combining with other data sources. Incompatibilities in
          formats, identifiers, or schemas that hinder data integration.

  VersionTypeEnum:
    description: >-
      Type of version change using semantic versioning principles.
      See https://semver.org/
    permissible_values:
      MAJOR:
        description: Incompatible changes, breaking backward compatibility.
      MINOR:
        description: Backward-compatible new functionality or enhancements.
      PATCH:
        description: Backward-compatible bug fixes or minor corrections.

  CreatorOrMaintainerEnum:
    description: >-
      Types of agents (persons or organizations) involved in dataset creation or
      maintenance. Mapped to schema.org organization types.
    permissible_values:
      data_subject:
        description: >-
